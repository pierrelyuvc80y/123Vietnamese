      color: #f0c04a;
      padding: 6px 10px;

  </style>

  "5": {"title": "Cái này bao nhiêu tiền?", "title_en": "How much does this cost?", "dialogue": "Anh ơi, cho tôi xem cái mũ kia.\nVâng. Của chị đây.\nMũ này có màu khác không anh?\nCó màu vàng và xanh lá cây chị ạ.\nCho tôi đội thử cái mũ màu vàng. Mũ này bao nhiêu tiền ạ?\n50.000 chị ạ.\nĐắt quá! Anh giảm giá đi!\nTôi không bớt được. Giá rẻ lắm rồi. .\nÀ, anh cho tôi mặc thử cái áo kia nhé.\nVâng.\nAnh ơi, có cỡ rộng hơn không?\nCó cỡ M đấy chị. Áo này đúng giá 250.000 đồng.\nTôi mua mũ và áo nên anh bớt một chút nhé.\nKhông chị ạ. Tôi không bán mặc cả.\nVậy tôi lấy mũ thôi.\nCám ơn chị!", "vocabulary": [{"vn": "mũ", "en": "hat"}, {"vn": "đắt", "en": "expensive"}, {"vn": "màu", "en": "color"}, {"vn": "mặc", "en": "to wear"}, {"vn": "màu vàng", "en": "yellow"}, {"vn": "áo", "en": "shirt"}, {"vn": "màu xanh lá cây", "en": "green"}, {"vn": "cỡ", "en": "size"}, {"vn": "đi", "en": "to wear"}, {"vn": "đúng giá", "en": "fair price"}, {"vn": "thử", "en": "to try"}, {"vn": "mặc cả", "en": "to bargain"}, {"vn": "giảm giá", "en": "to discount"}, {"vn": "bán", "en": "to sell"}, {"vn": "bớt", "en": "to reduce"}, {"vn": "lấy", "en": "to take"}, {"vn": "rẻ", "en": "cheap"}], "grammar": ["Bao nhiêu tiền? (How much money?)", "Structure: Cho tôi + verb", "Structure: verb + thử", "Questions about colors: ... màu gì?", "Verbs with clothes (mặc, đi, đeo, ci, ...)"]}, 
  "6": {"title": "Bây giờ là mấy giờ?", "title_en": "What time is it now?", "dialogue": "Chị An ơi! Bây giờ là mấy giờ?\nBây giờ là 8 giờ rưỡi. Anh sẽ họp với giám đốc lúc mấy giờ?\nTôi sẽ họp lúc 3 giờ chiều.\nMấy giờ cuộc họp sẽ kết thúc, anh Minh?\n6 giờ hoặc 7 giờ tối. Chị thường về nhà lúc mấy giờ?\nLúc 5 giờ vì tôi phải đón con.\nTôi hiểu rồi. Hẹn gặp lại chị ngày mai.\nVâng. Chào anh.", "vocabulary": [{"vn": "bây giờ", "en": "now"}, {"vn": "mấy giờ", "en": "what time"}, {"vn": "giờ", "en": "hour, o'clock"}, {"vn": "phút", "en": "minute"}, {"vn": "sáng", "en": "morning"}, {"vn": "trưa", "en": "noon"}, {"vn": "chiều", "en": "afternoon"}, {"vn": "tối", "en": "evening"}, {"vn": "đêm", "en": "night"}, {"vn": "giờ rưỡi", "en": "half past"}, {"vn": "kém", "en": "to"}, {"vn": "cuộc họp", "en": "meeting"}, {"vn": "họp", "en": "to have a meeting"}, {"vn": "về nhà", "en": "to go home"}, {"vn": "thường", "en": "often"}, {"vn": "buổi tối", "en": "evening"}, {"vn": "giám đốc", "en": "director"}, {"vn": "kết thúc", "en": "to finish"}, {"vn": "phải", "en": "to have to"}, {"vn": "đón", "en": "to pick up"}], "grammar": ["Asking and answering about time", "Time expressions (sáng, trưa, chiều, tối, đêm)", "Asking for time of action: lúc mấy giờ?", "Frequency adverbs: luôn luôn, hay, thường, thỉnh thoảng...", "hay vs hoặc (or)"]}, 
  "7": {"title": "Hôm nay là ngày bao nhiêu?", "title_en": "What date is today?", "dialogue": "Minh ơi, hôm nay là ngày bao nhiêu?Hôm nay là ngày 16 tháng 5. Sao thế Linh?À, sắp đến sinh nhật mẹ tớ.Khi nào sinh nhật mẹ Linh?Thứ Ba tuần sau. Tớ sẽ làm bánh ga tô tặng mẹ.Bạn giỏi quá!Không có gì, làm bánh cũng đơn giản.", "vocabulary": [{"vn": "sắp", "en": "is going to, about to"}, {"vn": "tuần sau", "en": "next week"}, {"vn": "sinh nhật", "en": "birthday"}, {"vn": "bánh ga tô", "en": "gateau, cake"}, {"vn": "tặng", "en": "to present, to give a gift"}, {"vn": "giỏi", "en": "good"}, {"vn": "ngày", "en": "day"}, {"vn": "tháng", "en": "month"}, {"vn": "năm", "en": "year"}, {"vn": "thứ Hai", "en": "Monday"}, {"vn": "thứ Ba", "en": "Tuesday"}, {"vn": "thứ Tư", "en": "Wednesday"}, {"vn": "thứ Năm", "en": "Thursday"}, {"vn": "thứ Sáu", "en": "Friday"}, {"vn": "thứ Bảy", "en": "Saturday"}, {"vn": "Chủ nhật", "en": "Sunday"}], "grammar": ["Days, months, years (ngày, tháng, năm)", "Difference between 'sắp' and 'sẽ'", "Bao giờ / khi nào / lúc nào - When", "Time markers: hôm kia, hôm qua, hôm nay, ngày mai, ngày kia"]}, 
  "8": {"title": "Anh đã có nhà riêng chưa?", "title_en": "Do you have your own house yet?", "dialogue": "Chào anh Minh. Lâu lắm không gặp. Dạo này anh thế nào?\nTôi khỏe. Còn anh?\nTôi cũng khỏe. Vợ chồng anh vẫn sống với bố mẹ à?\nVâng. Còn anh, anh đã có nhà riêng chưa?\nChưa. Tôi cũng sống cùng bố mẹ vì nhà rất rộng.\nTốt quá. Anh đã ăn trưa chưa?\nChưa. Tôi chưa ăn.\nTôi cũng chưa ăn. Chúng ta đi ăn đi. Anh thích ăn ở đâu?\nTôi biết một nhà hàng gần công ty tôi, rất ngon.\nĐược. Chúng ta đi nhé!", "vocabulary": [{"vn": "lâu", "en": "long time"}, {"vn": "dạo này", "en": "recently"}, {"vn": "vẫn", "en": "still"}, {"vn": "nhà hàng", "en": "restaurant"}, {"vn": "công ty", "en": "company"}, {"vn": "nhà riêng", "en": "private house"}, {"vn": "chưa", "en": "not yet"}, {"vn": "rồi", "en": "already"}, {"vn": "cũng", "en": "also"}, {"vn": "đều", "en": "all"}], "grammar": ["Structure: ... chưa? (Have ... yet?)", "Vẫn, cũng, đều (Still, also, both)", "Difference between 'ở đâu' and 'ở đâu?'"]}, 
  "9": {"title": "Khi rỗi, chị thường làm gì?", "title_en": "What do you usually do when you are free?", "dialogue": "Khi rỗi, chị thường làm gì, chị Lan?\nTôi thường nghe nhạc, đi xem phim, hoặc đi chơi với bạn. Còn anh, anh thích làm gì, anh Nam?\nTôi chỉ xem phim, đặc biệt là phim hành động Mĩ.\nAnh đã đến Mĩ bao giờ chưa?\nChưa. Tôi chưa bao giờ đến Mĩ. Hy vọng tôi sẽ có cơ hội đến đó một lần.\nAnh làm việc ở công ty này bao lâu rồi?\n3 năm rồi. Nghe nói chị sắp nghỉ việc.\nChị sẽ làm bao lâu nữa?\nTôi chỉ làm khoảng 3 tuần nữa. Vì nhà tôi xa công ty quá nên tôi muốn làm gần nhà.\nTrước khi chị nghỉ, chúng ta sẽ tổ chức liên hoan nhé. (Cười)", "vocabulary": [{"vn": "rảnh rỗi", "en": "free"}, {"vn": "cơ hội", "en": "opportunity"}, {"vn": "xem", "en": "to watch"}, {"vn": "nghỉ việc", "en": "to quit job"}, {"vn": "đặc biệt là", "en": "especially"}, {"vn": "khoảng", "en": "about"}, {"vn": "phim hành động", "en": "action movie"}, {"vn": "trước khi", "en": "before"}, {"vn": "hy vọng", "en": "to hope"}, {"vn": "tổ chức", "en": "to organize"}, {"vn": "chưa bao giờ", "en": "never"}, {"vn": "liên hoan", "en": "party"}], "grammar": ["Conjunctions: nhưng, nên, cho nên", "Structure: ... bao giờ chưa? (Have you ever...?)", "Bao lâu, bao lâu rồi, bao lâu nữa, lâu chưa", "Adverbs rất, quá, lắm with adjectives", "Structure: chỉ ... thôi (only)"]}, 
  "10": {"title": "Anh đi thẳng đường này", "title_en": "Go straight along this road", "dialogue": "Chị ơi! Chị có biết trung tâm 123VIETNAMESE ở đâu không?\nAnh đi thẳng đường này. Đến ngã tư anh rẽ trái, đi khoảng 500m, trung tâm ở bên phải nhé.\nVâng, cám ơn chị. Ở gần đây có chợ không, hả chị?\nCó. Chợ gần đây lắm. Anh đi bộ khoảng 5 phút thôi.\nChị tốt bụng quá. Thế từ đây đến hồ Hoàn Kiếm mất bao lâu?\nAnh đi bằng gì ạ?\nBằng taxi.\nVậy khoảng 15 phút.\nVâng. Cám ơn chị. Chào chị!\nVâng. Không có gì. Chào anh!", "vocabulary": [{"vn": "đi thẳng", "en": "to go straight"}, {"vn": "tốt bụng", "en": "kind"}, {"vn": "đường", "en": "road"}, {"vn": "trung tâm", "en": "center"}, {"vn": "rẽ trái", "en": "to turn left"}, {"vn": "gần", "en": "near"}, {"vn": "bên phải", "en": "on the right"}, {"vn": "chợ", "en": "market"}, {"vn": "đi bộ", "en": "to walk"}, {"vn": "ngã tư", "en": "intersection"}], "grammar": ["Structure: từ ... đến (from ... to)", "A cách B bao xa? (How far from A to B?)", "... bằng gì? (By what transportation?)", "... mất bao lâu? (How long does it take?)", "Khoảng, độ, chừng (approximately)"]}, 
  "11": {"title": "Anh có thể nói tiếng Việt được không?", "title_en": "Can you speak Vietnamese?", "dialogue": "Chào anh Nam.\nChào Peter. Anh có thể nói tiếng Việt được không?\nVâng. Tôi nói được một chút.\nAnh đã học tiếng Việt bao lâu rồi?\n2 năm rồi. Tôi thường tự học tiếng Việt.\nAnh đến Việt Nam để làm việc phải không Peter?\nVâng. Tôi đến đây vừa để làm việc, vừa để tìm hiểu về văn hóa Việt Nam.\nTôi nghĩ nếu anh muốn tìm hiểu về văn hóa Việt Nam, anh có thể đến các bảo tàng.\nÝ kiến của anh hay quá, anh Nam. Tôi sẽ đến khi có thời gian rồi.", "vocabulary": [{"vn": "có thể", "en": "can"}, {"vn": "được", "en": "can"}, {"vn": "nói", "en": "to speak"}, {"vn": "tự", "en": "oneself"}, {"vn": "học", "en": "to study"}, {"vn": "vừa...vừa", "en": "both...and"}], "grammar": ["Ability: có thể, được, có", "Structure: Tự + verb", "Question for purpose: ... làm gì?", "Structure: vừa A vừa B (both A and B)"]}, 
  "12": {"title": "Quyển sách ở trên bàn", "title_en": "The book is on the table", "dialogue": "Chị Mai ơi, chị có biết quyển sách tiếng Việt của em ở đâu không?\nỞ trên bàn, trong phòng khách.\nVâng ạ.\nEm đang học bài bao nhiêu hả Mary?\nEm học xong bài 10 rồi ạ.\nTrong lớp em có học viên người Thái Lan nào không?\nKhông, không có học viên người Thái Lan nào.\nEm nói tiếng Việt rất tốt. Cố gắng nhé.\nVâng. Em cám ơn chị!", "vocabulary": [{"vn": "trên", "en": "on"}, {"vn": "dưới", "en": "under"}, {"vn": "trong", "en": "in"}, {"vn": "ngoài", "en": "outside"}, {"vn": "giữa", "en": "between"}, {"vn": "cạnh", "en": "next to"}], "grammar": ["Prepositions of place (trên, dưới, trong, ngoài, giữa, cạnh...)", "Structure: có ... nào không? (any...?)", "Negative group: không có, đừng, cấm"]}, 
  "13": {"title": "Cho chúng tôi xem thực đơn.", "title_en": "Please show us the menu.", "dialogue": "Chào anh chị! Anh chị dùng gì ạ?\nCho chúng tôi xem thực đơn.\nVâng. Đây ạ.\nPeter, anh thích ăn món gì?\nMón gì cũng được nhưng tôi rất thích nem rán. (cười)\nTôi hiểu rồi. Em ơi, cho chị một đĩa nem rán, một sa lát, hai thịt bò bít tết nhé.\nChị có gọi thêm đồ uống gì không ạ?\nAnh uống gì, Peter?\nCho tôi một Pepsi lạnh.\nCho chị thêm một Pepsi lạnh, một nước chanh nữa nhé.\n......\nAnh chị có muốn dùng tráng miệng không?\nCho chị hai chè sen. Tính tiền cho chị nhé.\nVâng ạ. Chị đợi em một lát.", "vocabulary": [{"vn": "thực đơn", "en": "menu"}, {"vn": "gọi món", "en": "to order"}, {"vn": "phục vụ", "en": "to serve"}, {"vn": "đồ uống", "en": "drinks"}, {"vn": "món ăn", "en": "dish"}, {"vn": "ngon", "en": "delicious"}], "grammar": ["Ordering in restaurant/hotel", "Structure: ... thêm ... nữa (more ... additional)", "Nào cũng, ai cũng, gì cũng, đâu cũng (all, every)"]}, 
  "14": {"title": "Hôm nay trời nắng và nóng.", "title_en": "Today is sunny and hot.", "dialogue": "John, anh sống ở Hà Nội lâu chưa?\nHơn một năm rồi.\nAnh thấy Hà Nội thế nào?\nHà Nội nhỏ nhưng khá đẹp. Tuy nhiên, tôi sợ mùa hè ở Hà Nội lắm.\nThế à? Mùa hè ở New York có giống mùa hè ở Hà Nội không?\nMùa hè ở New York khác mùa hè ở Hà Nội. Tôi nghĩ mát hơn ở đây. Hôm nay, thời tiết thế nào, anh Minh?\nHôm nay trời nắng và nóng, nhiệt độ khoảng 40 độ C. Nếu không có việc gì thì anh đừng đi ra ngoài.\nVâng. Tôi chỉ ở văn phòng thôi. Cả tôi và vợ tôi đều không thích mùa hè Hà Nội.\nVậy trong bốn mùa: xuân, hè, thu, đông, anh thích mùa nào nhất?\nTôi thích mùa thu nhất vì trời mát và khô.", "vocabulary": [{"vn": "thời tiết", "en": "weather"}, {"vn": "nóng", "en": "hot"}, {"vn": "nắng", "en": "sunny"}, {"vn": "mát", "en": "cool"}, {"vn": "lạnh", "en": "cold"}, {"vn": "mưa", "en": "rainy"}, {"vn": "gió", "en": "windy"}], "grammar": ["Asking about weather", "Structure: Có A lẫn cả B (both A and B)", "Comparisons: hơn, nhất, bằng, không bằng"]}, 
  "15": {"title": "Cho tôi một phòng đơn.", "title_en": "Give me a single room.", "dialogue": "Xin chào! Khách sạn Sofitel nghe đây ạ. Tôi có thể giúp gì cho anh?\nVâng. Tôi muốn đặt phòng.\nAnh muốn phòng đơn hay phòng đôi?\nCho tôi một phòng đơn. Trong phòng có đầy đủ tiện nghi chứ?\nVâng, đầy đủ. Anh sẽ ở trong bao lâu ạ?\nTôi ở từ 15 tháng 8 đến 17 tháng 8. Giá phòng thế nào hả chị?\nPhòng đơn là hai triệu đồng một ngày đêm.\nGiá phòng ngày càng đắt phải không chị?\nKhông đắt đâu anh. Giá này đã bao gồm bữa sáng chưa chị?\nCó rồi anh ạ.\nCho tôi hỏi phòng đó có thể nhìn ra hồ được không?\nXin lỗi anh. Tuy phòng đó không nhìn ra hồ được nhưng vẫn ngắm thành phố được, đẹp lắm.\nĐược rồi. 5 ngày nữa tôi sẽ đến. Thế nào chị cũng phải giữ phòng đẹp cho tôi nhé.\nVâng. Chắc chắn rồi. À, xin lỗi, anh tên là gì?\nTôi là Nam Cường. Cám ơn chị. Hẹn gặp lại.\nChào anh. Hẹn gặp lại anh.", "vocabulary": [{"vn": "phòng đơn", "en": "single room"}, {"vn": "phòng đôi", "en": "double room"}, {"vn": "khách sạn", "en": "hotel"}, {"vn": "đặt phòng", "en": "to book"}, {"vn": "hủy", "en": "to cancel"}, {"vn": "tiện nghi", "en": "facilities"}], "grammar": ["Structure: thế nào ... cũng / thế nào cũng ...", "Structure: Dù / tuy / mặc dù ... nhưng (although ... but)", "Structure: ngày càng / càng ngày càng (more and more)"]}, 
  "16": {"title": "Hôm nay trông anh có vẻ mệt.", "title_en": "You look tired today.", "dialogue": "Anh Hoàng ơi, hôm nay trông anh có vẻ mệt. Anh làm sao thế?\nVâng. Có lẽ tôi bị đau dạ dày.\nVậy à? Anh uống thuốc chưa?\nTôi uống rồi.\nBây giờ anh cảm thấy trong người thế nào?\nTôi vẫn còn hơi đau.\nThế thì anh nên đi bệnh viện rồi về nhà nghỉ ngơi.\nVâng. Hôm nay tôi phải về sớm thôi.\nChào bác sĩ!\nChào anh! Anh bị làm sao?\nHình như tôi bị đau dạ dày. Mấy hôm nay, khi đói hoặc ăn đồ chua tôi thấy rất khó chịu.\nVậy à? Để tôi khám cho anh.\n.......\nAnh chỉ bị đau dạ dày nhẹ thôi nhưng nên giữ gìn cẩn thận.\nThật hả bác sĩ? Tôi thấy hơi đau.\nAnh mua thuốc theo đơn này. Anh nhớ không ăn chua, cay, không được uống rượu, cà phê, và thức khuya.\nÔi! Kiêng nhiều thế ạ? Tôi là người rất thích cà phê.\nCố gắng anh ạ. Hai tuần nữa anh đến khám lại nhé.\nVâng. Cám ơn bác sĩ. Chào bác sĩ.\nChào anh.", "vocabulary": [{"vn": "mệt", "en": "tired"}, {"vn": "bị", "en": "to suffer from"}, {"vn": "được", "en": "to receive"}, {"vn": "đau đầu", "en": "headache"}, {"vn": "sốt", "en": "fever"}, {"vn": "ho", "en": "cough"}, {"vn": "khám bệnh", "en": "to examine"}, {"vn": "thuốc", "en": "medicine"}], "grammar": ["Passive structure: bị, được", "Asking about illness", "Passive markers with verbs", "Sau, sau khi, sau đó, trước, trước khi (before, after)"]}
};

const TRANSLATIONS = {
  "1": "Hello. / Hello. Excuse me, what is your name? / My name is Peter. What is your name? / My name is Yumi. / Where are you from? / I am Japanese. Where are you from? / I am English. Nice to meet you. / Nice to meet you.",
  "2": "Hello. My name is Kim. / Hello. Nice to meet you. My name is Thu. / Nice to meet you. / You are Korean, right? / Yes. I am Korean. What do you do? / I am a teacher. And you? / I am a doctor. Where do you work? / I teach at 123VIETNAMESE center. / Really? I work at the Franco-Vietnamese Hospital.",

  "4": "Hello. How have you been lately? / I am fine. Thank you. / Are you free tomorrow? / No, I am free tomorrow. What is it? / Oh, I want to invite you to my new house. / Thank you. I will come tomorrow. / ....... / Your house is very beautiful and spacious. / Let me show you: this is the living room, that is the bedroom. / You have a very beautiful painting! / Yes! That is the painting I bought in Thailand.",
  "5": "Excuse me, let me see that hat. / Here you are. / Does this hat come in other colors? / There is yellow and green. / Let me try the yellow hat. How much is this hat? / 50,000 dong. / Too expensive! Please give me a discount! / I cannot reduce the price. It is already very cheap. / Let me try on that shirt. / Of course. / Do you have a bigger size? / There is size M. This shirt is exactly 250,000 dong. / I am buying both the hat and shirt, so give me a little discount. / I cannot. I do not bargain. / Then I will just take the hat. / Thank you!",
  "6": "Sister An! What time is it now? / It is 8:30. What time will you meet with the director? / I will have a meeting at 3 in the afternoon. / What time will the meeting end, Mr Minh? / 6 or 7 in the evening. What time do you usually go home? / At 5 because I have to pick up my child. / I see. See you tomorrow. / Yes. Goodbye.",
  "7": "Minh, what date is today? Today is May 16th. What's wrong, Linh? Oh, my mom's birthday is coming soon. When is your mom's birthday? Next Tuesday. I will make a cake for her. You are so talented! It's nothing, making cakes is easy too.",
  "8": "Hello Minh. Long time no see. How have you been lately? / I am fine. And you? / I am fine too. Are you and your wife still living with your parents? / Yes. And you, do you have your own house yet? / Not yet. I also live with my parents because the house is very spacious. / Great. Have you had lunch yet? / Not yet. I have not eaten. / I have not eaten either. Let us go eat. Where do you like to eat? / I know a restaurant near my office, very delicious. / Alright. Let us go!",
  "9": "What do you usually do when you are free, Ms Lan? / I usually listen to music, watch movies, or hang out with friends. And you, what do you like to do, Mr Nam? / I only watch movies, especially American action movies. / Have you ever been to America? / No. I have never been to America. I hope I will have a chance to go there someday. / How long have you worked at this company? / 3 years. I heard you are about to quit. / How much longer will you work? / Only about 3 more weeks. My home is so far from the office that I want to work closer to home. / Before you leave, let us have a farewell party. (Laughing)",
  "10": "Excuse me! Do you know where the 123VIETNAMESE center is? / Go straight along this road. At the intersection turn left, go about 500m, the center is on the right. / Yes, thank you. Is there a market nearby? / Yes. The market is very close. Just about 5 minutes on foot. / You are so kind. How long does it take from here to Hoan Kiem Lake? / How are you going? / By taxi. / Then about 15 minutes. / Yes. Thank you. Goodbye! / No problem. Goodbye!",
  "11": "Hello Nam. / Hello Peter. Can you speak Vietnamese? / Yes. I can speak a little. / How long have you been studying Vietnamese? / 2 years. I usually study Vietnamese on my own. / You came to Vietnam for work, right Peter? / Yes. I came here both to work and to learn about Vietnamese culture. / I think if you want to learn about Vietnamese culture, you can visit the museums. / What a great idea, Mr Nam. I will go when I have time.",
  "12": "Ms Mai, do you know where my Vietnamese book is? / On the table in the living room. / Yes. / Which lesson are you on, Mary? / I have finished lesson 10. / Are there any Thai students in your class? / No, there are no Thai students. / You speak Vietnamese very well. Keep it up. / Thank you!",
  "13": "Hello! What would you like? / Please show us the menu. / Yes, here you are. / Peter, what would you like to eat? / Anything is fine but I really like spring rolls. (laughing) / I see. Please bring a plate of spring rolls, a salad, and two beef steaks. / Would you like to order any drinks? / What would you like, Peter? / Give me a cold Pepsi. / One more cold Pepsi and one lemonade please. / ...... / Would you like to have dessert? / Give us two lotus sweet soups. Please bring the bill. / Yes. Please wait a moment.",
  "14": "John, how long have you lived in Hanoi? / More than a year. / What do you think of Hanoi? / Hanoi is small but quite beautiful. However, I am very afraid of summer in Hanoi. / Really? Is summer in New York similar to summer in Hanoi? / Summer in New York is different from summer in Hanoi. I think it is cooler here. How is the weather today, Mr Minh? / Today is sunny and hot, temperature about 40 degrees Celsius. If you have nothing to do, do not go outside. / Yes. I will just stay in the office. Both my wife and I do not like Hanoi summer. / Of the four seasons: spring, summer, autumn, winter, which do you like most? / I like autumn most because it is cool and dry.",
  "15": "Hello! This is the Sofitel Hotel. How can I help you? / Yes. I would like to book a room. / Would you like a single or double room? / Give me a single room. Does the room have all facilities? / Yes, all complete. How long will you be staying? / I will stay from August 15th to 17th. What is the room rate? / A single room is two million dong per night. / Room prices are getting more expensive, right? / Not at all. Does this price include breakfast? / Yes it does. / May I ask if the room can overlook the lake? / Sorry. Although the room cannot overlook the lake, you can still see the city view, very beautiful. / Alright. I will arrive in 5 days. Make sure you keep a nice room for me. / Yes. Of course. Oh, sorry, what is your name? / I am Nam Cuong. Thank you. See you again. / Goodbye. See you again.",
  "16": "Hoang, you look tired today. What is wrong with you? / Yes. Maybe I have a stomachache. / Really? Have you taken medicine yet? / I have. / How do you feel now? / I still feel a little pain. / Then you should go to the hospital and go home to rest. / Yes. Today I have to leave early. / Hello doctor! / Hello! What is the matter? / I think I have a stomachache. These past few days, when I am hungry or eat sour food I feel very uncomfortable. / Really? Let me examine you. / ....... / You only have mild gastritis but you should take care of yourself. / Really, doctor? I feel a little pain. / Buy medicine according to this prescription. Remember not to eat sour or spicy food, do not drink alcohol or coffee, and do not stay up late. / Oh! So many restrictions? I love coffee. / Do your best. Come back for a checkup in two weeks. / Yes. Thank you, doctor. Goodbye. / Goodbye."
};

  "3": ["<strong>Asking for age</strong>: Subject + bao nhiêu tuổi? For children (<10): Subject + mấy tuổi?", "<strong>Yes/No question with 'có...không'</strong>: Subject + có + verb/adjective + không? Ex: Anh có khỏe không?", "<strong>Tense markers</strong>: đang (present continuous), đã (past), sẽ (future).", "<strong>Distinguish 'còn' and 'và'</strong>: 'và' connects words; 'còn' connects sentences or shows contrast."],
  "4": ["<strong>Demonstrative pronouns</strong>: đây (this near speaker), đó/kia (that far).", "<strong>Demonstrative adjectives</strong>: này (this), đó/kia (that) - placed AFTER noun.", "<strong>Classifiers</strong>: cái (objects), con (animals), quả (fruits), bức (pictures), quyển (books).", "<strong>Possession with 'của'</strong>: noun + của + owner. Ex: nhà của tôi."],
  "5": ["<strong>Asking price</strong>: Cái này bao nhiêu tiền? (How much is this?)", "<strong>Polite request 'Cho tôi + verb'</strong>: Show me, give me... Ex: Cho tôi xem cái mũ.", "<strong>Trying something with 'thử'</strong>: verb + thử or thử + verb.", "<strong>Asking about colors</strong>: Cái này màu gì? (What color is this?)"],
  "6": ["<strong>Asking for time</strong>: Bây giờ là mấy giờ? (What time is it now?)", "<strong>Time expressions</strong>: Half past: giờ rưỡi (6:30). Time to: kém (7:45 = 8 giờ kém 15).", "<strong>Time periods</strong>: sáng (morning), trưa (noon), chiều (afternoon), tối (evening), đêm (night).", "<strong>Asking for action time</strong>: Subject + verb + lúc mấy giờ?"],

  "8": ["<strong>Question with 'chưa' - Yet?</strong>: Subject + đã + verb + chưa? Answer: Rồi (already) or Chưa (not yet).", "<strong>'Vẫn' - Still</strong>: Expresses continuing action.", "<strong>'Cũng' - Also</strong>: 'Đều' - Both/all: Chúng tôi đều là sinh viên.", "<strong>'Đâu' vs 'Ở đâu'</strong>: 'Đâu' with movement verbs, 'Ở đâu' with other verbs."],

const DAYS_VN = ['Chủ nhật','thứ Hai','thứ Ba','thứ Tư','thứ Năm','thứ Sáu','thứ Bảy'];
const DAYS_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_VN = ['tháng Một','tháng Hai','tháng Ba','tháng Tư','tháng Năm','tháng Sáu','tháng Bảy','tháng Tám','tháng Chín','tháng Mười','tháng Mười một','tháng Mười hai'];

// Convert a number (0-9999) to Vietnamese words
function numToVietnameseWords(n) {
  n = parseInt(n, 10);
  if (n === 0) return 'không';
  const ones = ['','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  const onesAfterTen = ['','mốt','hai','ba','bốn','lăm','sáu','bảy','tám','chín'];
  function under100(num, isInThousands) {
    if (num < 10) return ones[num];
    if (num < 20) {
      const u = num % 10;
      return 'mười' + (u === 0 ? '' : ' ' + onesAfterTen[u]);
    }
    const tens = Math.floor(num / 10);
    const u = num % 10;
    let s = ones[tens] + ' mươi';
    if (u === 1) s += ' mốt';
    else if (u === 5) s += ' lăm';
    else if (u !== 0) s += ' ' + ones[u];
    return s;
  }
  function under1000(num) {
    if (num < 100) return under100(num);
    const h = Math.floor(num / 100);
    const rest = num % 100;
    let s = ones[h] + ' trăm';
    if (rest === 0) return s;
    if (rest < 10) s += ' lẻ ' + ones[rest];
    else s += ' ' + under100(rest);
    return s;
  }
  if (n < 1000) return under1000(n);
  const th = Math.floor(n / 1000);
  const rest = n % 1000;
  let s = (th < 10 ? ones[th] : under1000(th)) + ' nghìn';
  if (rest === 0) return s;
  if (rest < 100) s += ' không trăm ' + (rest < 10 ? 'lẻ ' + ones[rest] : under100(rest));
  else s += ' ' + under1000(rest);
  return s;
}

function buildDatesFlashcards() {
  const cards = [];
  // Days: English name → Vietnamese
  DAYS_EN.forEach((d, i) => {
    cards.push({ front: d, back: DAYS_VN[i], hint: 'Day of the week' });
  });
  // Days: number (2–7, CN) → Vietnamese
  [2,3,4,5,6,7].forEach(n => {
    cards.push({ front: 'Day ' + n, back: 'thứ ' + ['Hai','Ba','Tư','Năm','Sáu','Bảy'][n-2], hint: 'Day number → Vietnamese' });
  });
  cards.push({ front: 'Day 1 (Sunday)', back: 'Chủ nhật', hint: 'Sunday is special: Chủ nhật' });
  // Dates: DD/MM → Vietnamese (numbers written in words)
  const dateExamples = [
    ['1/1',   [1,1]],   ['15/2',  [15,2]],
    ['20/10', [20,10]], ['3/3',   [3,3]],
    ['8/3',   [8,3]],   ['2/9',   [2,9]],
    ['30/4',  [30,4]],  ['25/12', [25,12]],
    ['31/7',  [31,7]],  ['14/2',  [14,2]],
  ];
  dateExamples.forEach(([f, [d, m]]) => cards.push({
    front: f,
    back: 'ngày ' + numToVietnameseWords(d) + ' tháng ' + numToVietnameseWords(m),
    hint: 'Date DD/MM → Vietnamese'
  }));
  // Years (written in words)
  const yearExamples = [1975, 2000, 1945, 2024, 1986, 2010, 1999, 2035];
  yearExamples.forEach(y => cards.push({
    front: String(y),
    back: 'năm ' + numToVietnameseWords(y),
    hint: 'Year → Vietnamese'
  }));
  // Full dates with year (numbers written in words)
  const fullDates = [
    ['20/10/1954', [20,10,1954]],
    ['2/9/1945',   [2,9,1945]],
    ['15/3/2001',  [15,3,2001]],
    ['1/1/2000',   [1,1,2000]],
  ];
  fullDates.forEach(([f, [d, m, y]]) => cards.push({
    front: f,
    back: 'ngày ' + numToVietnameseWords(d) + ' tháng ' + numToVietnameseWords(m) + ' năm ' + numToVietnameseWords(y),
    hint: 'Full date DD/MM/YYYY → Vietnamese'
  }));
  return shuffleArr(cards);
}

// Check if a thematic quiz key matches the current lesson filter
function thMatchesLessonFilter(key) {
  const lessonFilter = state.practiceLesson;
  if (lessonFilter === 'all') return true;
  const scope = state.practiceScope;
  const num = Number(lessonFilter);
  const lessons = state.thLessonMap[key];
  if (!lessons) return true; // unknown = always show
  if (scope === 'single') return lessons.includes(num);
  if (scope === 'up-to') return lessons.some(l => l <= num);
  return true;
}

function shuffleArr(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  function doSpeak() {
    const voices = window.speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    const viVoice = voices.find(v => v.lang && v.lang.startsWith('vi'));
    if (viVoice) { u.lang = viVoice.lang; u.voice = viVoice; }
    else { u.lang = 'vi-VN'; }
    u.onerror = () => {};
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { doSpeak(); }
  else {
    window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
    setTimeout(() => { if (!window.speechSynthesis.speaking) doSpeak(); }, 500);
  }
}

// Generate fake tone variants of a Vietnamese word (same base, different tones)
function generateToneVariants(viet, base) {
  // Vietnamese tones applied to the main vowel groups
  // We apply different tones to the last syllable's main vowel
  const toneGroups = {
    'a':  ['a','à','á','ả','ã','ạ'],
    'ă':  ['ă','ằ','ắ','ẳ','ẵ','ặ'],
    'â':  ['â','ầ','ấ','ẩ','ẫ','ậ'],
    'e':  ['e','è','é','ẻ','ẽ','ẹ'],
    'ê':  ['ê','ề','ế','ể','ễ','ệ'],
    'i':  ['i','ì','í','ỉ','ĩ','ị'],
    'o':  ['o','ò','ó','ỏ','õ','ọ'],
    'ô':  ['ô','ồ','ố','ổ','ỗ','ộ'],
    'ơ':  ['ơ','ờ','ớ','ở','ỡ','ợ'],
    'u':  ['u','ù','ú','ủ','ũ','ụ'],
    'ư':  ['ư','ừ','ứ','ử','ữ','ự'],
    'y':  ['y','ỳ','ý','ỷ','ỹ','ỵ'],
  };
  // All toned vowels to base vowel map
  const toBase = {};
  for (const [b, variants] of Object.entries(toneGroups)) {
    variants.forEach(v => { toBase[v] = b; });
  }

  // Find which toned vowel(s) are in `viet` and generate 3 variants with different tones
  // Strategy: find the toned vowel in viet, get its base group, pick 3 other tone indices
  const chars = [...viet];
  let toneVowelIdx = -1;
  let toneGroup = null;
  let currentToneIdx = -1;
  // scan last syllable first (work backwards)
  for (let i = chars.length - 1; i >= 0; i--) {
    const b = toBase[chars[i]];
    if (b && toneGroups[b]) {
      toneVowelIdx = i;
      toneGroup = toneGroups[b];
      currentToneIdx = toneGroup.indexOf(chars[i]);
      break;
    }
  }
  if (toneVowelIdx === -1 || toneGroup === null) {
    // No toned vowel found — word has no tone (ngang), pick from base vowel in base string
    for (let i = base.length - 1; i >= 0; i--) {
      const b = base[i];
      if (toneGroups[b]) {
        // Find this char in viet
        toneGroup = toneGroups[b];
        currentToneIdx = 0;
        // Find position in viet
        const vietChars = [...viet];
        for (let j = vietChars.length - 1; j >= 0; j--) {
          if (toBase[vietChars[j]] === b || vietChars[j] === b) { toneVowelIdx = j; break; }
        }
        break;
      }
    }
  }
  if (toneVowelIdx === -1 || !toneGroup) return [viet]; // fallback: no variants possible

  // Generate 3 variants with different tone indices
  const variants = new Set();
  const otherTones = [0,1,2,3,4,5].filter(i => i !== currentToneIdx);
  // pick 3 shuffled
  const picked = shuffleArr(otherTones).slice(0, 3);
  for (const toneIdx of picked) {
    const newViet = [...chars];
    newViet[toneVowelIdx] = toneGroup[toneIdx];
    variants.add(newViet.join(''));
  }
  return shuffleArr([viet, ...variants]);
}
function stripVietnameseTones(str) {
  const map = {
    'à':'a','á':'a','ả':'a','ã':'a','ạ':'a',
    'ầ':'â','ấ':'â','ẩ':'â','ẫ':'â','ậ':'â',
    'ằ':'ă','ắ':'ă','ẳ':'ă','ẵ':'ă','ặ':'ă',
    'è':'e','é':'e','ẻ':'e','ẽ':'e','ẹ':'e',
    'ề':'ê','ế':'ê','ể':'ê','ễ':'ê','ệ':'ê',
    'ì':'i','í':'i','ỉ':'i','ĩ':'i','ị':'i',
    'ò':'o','ó':'o','ỏ':'o','õ':'o','ọ':'o',
    'ồ':'ô','ố':'ô','ổ':'ô','ỗ':'ô','ộ':'ô',
    'ờ':'ơ','ớ':'ơ','ở':'ơ','ỡ':'ơ','ợ':'ơ',
    'ù':'u','ú':'u','ủ':'u','ũ':'u','ụ':'u',
    'ừ':'ư','ứ':'ư','ử':'ư','ữ':'ư','ự':'ư',
    'ỳ':'y','ý':'y','ỷ':'y','ỹ':'y','ỵ':'y',
    'À':'A','Á':'A','Ả':'A','Ã':'A','Ạ':'A',
    'Ầ':'Â','Ấ':'Â','Ẩ':'Â','Ẫ':'Â','Ậ':'Â',
    'Ằ':'Ă','Ắ':'Ă','Ẳ':'Ă','Ẵ':'Ă','Ặ':'Ă',
    'È':'E','É':'E','Ẻ':'E','Ẽ':'E','Ẹ':'E',
    'Ề':'Ê','Ế':'Ê','Ể':'Ê','Ễ':'Ê','Ệ':'Ê',
    'Ì':'I','Í':'I','Ỉ':'I','Ĩ':'I','Ị':'I',
    'Ò':'O','Ó':'O','Ỏ':'O','Õ':'O','Ọ':'O',
    'Ồ':'Ô','Ố':'Ô','Ổ':'Ô','Ỗ':'Ô','Ộ':'Ô',
    'Ờ':'Ơ','Ớ':'Ơ','Ở':'Ơ','Ỡ':'Ơ','Ợ':'Ơ',
    'Ù':'U','Ú':'U','Ủ':'U','Ũ':'U','Ụ':'U',
    'Ừ':'Ư','Ứ':'Ư','Ử':'Ư','Ữ':'Ư','Ự':'Ư',
    'Ỳ':'Y','Ý':'Y','Ỷ':'Y','Ỹ':'Y','Ỵ':'Y'
  };
  return str.split('').map(c => map[c] || c).join('');
}

// Build vocabulary quiz from lessons
function buildVocabQuiz() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  const allVocab = [];
  for (const lessonNum in LESSONS) {
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter), ln = Number(lessonNum);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    LESSONS[lessonNum].vocabulary.forEach(word => allVocab.push({...word}));
  }
  const shuffled = allVocab.sort(() => Math.random() - 0.5);
  const questions = [];
  for (let i = 0; i < Math.min(state.practiceCount, shuffled.length); i++) {
    const correct = shuffled[i];
    if (state.practiceDirection === 'vn-en') {
      const wrongOptions = allVocab.filter(w => w.en !== correct.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [...wrongOptions, correct].sort(() => Math.random() - 0.5);
      questions.push({
        question: correct.vn,
        correct: correct.en,
        options: options.map(o => o.en),
        // No phases for VN→EN
        phase: 'single'
      });
    } else {
      // EN→VN: two phases — word (base, no accent) then tone
      const correctBase = stripVietnameseTones(correct.vn);
      const wrongWords = allVocab.filter(w => stripVietnameseTones(w.vn) !== correctBase).sort(() => Math.random() - 0.5).slice(0, 3);
      const wordOptions = shuffleArr([correctBase, ...wrongWords.map(w => stripVietnameseTones(w.vn))]);
      // Tone options: correct + 3 variants with different tones on the same base word
      const toneOptions = generateToneVariants(correct.vn, correctBase);
      questions.push({
        question: correct.en,
        correct: correct.vn,
        correctBase,
        wordOptions,
        toneOptions,
        options: toneOptions, // fallback
        phase: 'word' // starts at word phase
      });
    }
  }
  state.quizQuestions = questions;
  state.currentQuestion = 0; state.score = 0; state.answered = false;
  state.quizPhase = 'word'; state.quizSelectedWord = null; state.selectedAnswer = null;
}

// Build grammar quiz with lesson filtering
function buildGrammarQuiz() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  let filteredQuestions = [...GRAMMAR_QUESTIONS];
  
  if (lessonFilter !== 'all') {
    const num = Number(lessonFilter);
    filteredQuestions = GRAMMAR_QUESTIONS.filter(q => {
      if (scope === 'single') return q.lesson === num;
      if (scope === 'up-to') return q.lesson <= num;
      return true;
    });
  }
  
  if (filteredQuestions.length === 0) {
    // Fallback: use all questions
    filteredQuestions = [...GRAMMAR_QUESTIONS];
  }
  
  const shuffled = filteredQuestions.sort(() => Math.random() - 0.5);
  state.grammarQuestions = shuffled.slice(0, Math.min(state.practiceCount, shuffled.length));
  state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false;
}

function startQuiz(type) {
  state.quizType = type;
  if (type === 'vocab') buildVocabQuiz();
  else if (type === 'audio') {
    state.thView = 'audio';
    state.thDeck = getFilteredAudioQuestions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else if (type === 'conversation') {
    state.thView = 'conversation';
    state.thDeck = getFilteredConvQuestions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else buildGrammarQuiz();
  if (type !== 'audio' && type !== 'conversation') state.view = 'quiz';
  render();
}

// ==================== THEMATIC QUIZ HELPERS ====================
function thInitDeck(words) {
  state.thDeck = shuffleArr(words);
  state.thIndex = 0; state.thScore = 0; state.thPhase = 'word';
  state.thSelected = null; state.thSelectedWord = null; state.thDone = false;
  thSetWordToneOptions();
}

function thSetWordToneOptions() {
  const q = state.thDeck[state.thIndex];
  if (!q) return;
  const allWords = state.thDeck;
  const others = allWords.filter(w => w.viet !== q.viet).sort(() => Math.random() - 0.5).slice(0, 3).map(w => ({viet: w.viet, base: w.base}));
  state.thWordOptions = shuffleArr([{viet: q.viet, base: q.base}, ...others]);
  // Always generate tone variants dynamically (correct tone nucleus placement)
  const variants = makeToneVariants(q.viet);
  state.thToneOptions = shuffleArr([q.viet, ...variants]);
}

function thSetAdjOptions() {
  const q = state.thDeck[state.thIndex];
  if (!q || !state.thAdjMode) return;
  if (state.thAdjMode === 'viet-to-en') {
    const others = shuffleArr(ADJECTIVES_WORDS.filter(w => w.english !== q.english)).slice(0, 3);
    state.thAdjOptions = shuffleArr([q, ...others]).map(w => w.english);
  } else {
    // en-to-viet: phase 'word' options = base (no accent)
    const others = shuffleArr(ADJECTIVES_WORDS.filter(w => w.base !== q.base)).slice(0, 3);
    state.thAdjOptions = shuffleArr([q, ...others]).map(w => w.base);
    // tone options for phase 2 — generate dynamically
    state.thToneOptions = shuffleArr([q.viet, ...makeToneVariants(q.viet)]);
  }
}

function thAddMistake(m) {
  const key = m.type + '|' + m.question;
  if (!state.thMistakes.find(x => x.type + '|' + x.question === key)) state.thMistakes.push(m);
}

function thInitReview() {
  state.thReviewDeck = shuffleArr([...state.thMistakes]);
  state.thIndex = 0; state.thScore = 0; state.thDone = false;
  state.thReviewSelected = null;
  thSetReviewOptions();
}

function thSetReviewOptions() {
  const q = state.thReviewDeck[state.thIndex];
  if (!q) return;
  const pool = state.thMistakes.filter(m => m.correct !== q.correct).map(m => m.correct);
  state.thReviewOptions = shuffleArr([q.correct, ...shuffleArr(pool).slice(0, 3)]);
}

function thStartColors(mode) {
  state.colorsMode = mode;
  state.colorsIndex = 0;
  state.colorsScore = 0;
  state.colorsSelected = null;
  state.colorsAnswered = false;
  if (mode === 'tone') {
    state.thDeck = shuffleArr(COLORS_WORDS);
    state.thView = 'colors_tone';
    state.thPhase = 'word';
    state.thSelected = null;
    state.thSelectedWord = null;
    state.thDone = false;
    thSetWordToneOptions();
  } else if (mode === 'match') {
    state.colorsQuestions = shuffleArr([...COLOR_MATCH_QUESTIONS]);
    state.thView = 'colors_match';
  }
  render();
}

// Helper: filter by lesson and scope
function getFilteredAudioQuestions() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  let allQ = [];
  for (const lessonNum in AUDIO_QUESTIONS_BY_LESSON) {
    const ln = Number(lessonNum);
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    AUDIO_QUESTIONS_BY_LESSON[lessonNum].forEach(q => allQ.push({...q, lesson: ln}));
  }
  return shuffleArr(allQ).slice(0, state.practiceCount);
}

function getFilteredConvQuestions() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  let allQ = [];
  for (const lessonNum in MINI_CONVERSATIONS_BY_LESSON) {
    const ln = Number(lessonNum);
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    MINI_CONVERSATIONS_BY_LESSON[lessonNum].forEach(q => allQ.push({...q, lesson: ln}));
  }
  return shuffleArr(allQ).slice(0, state.practiceCount);
}

// Helper to shuffle options for a single question (used in audio and conversation quizzes)
function shuffleQuestionOptions(q) {
  const shuffledOptions = shuffleArr([...q.options]);
  return {
    ...q,
    options: shuffledOptions
  };
}

// Override the getFiltered functions to shuffle options for each question
function getFilteredAudioQuestionsWithShuffledOptions() {
  const questions = getFilteredAudioQuestions();
  return questions.map(q => shuffleQuestionOptions(q));
}

function getFilteredConvQuestionsWithShuffledOptions() {
  const questions = getFilteredConvQuestions();
  return questions.map(q => shuffleQuestionOptions(q));
}

// Update the startQuiz function to use shuffled options
function startQuizWithShuffledOptions(type) {
  state.quizType = type;
  if (type === 'vocab') buildVocabQuiz();
  else if (type === 'audio') {
    state.thView = 'audio';
    state.thDeck = getFilteredAudioQuestionsWithShuffledOptions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else if (type === 'conversation') {
    state.thView = 'conversation';
    state.thDeck = getFilteredConvQuestionsWithShuffledOptions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else buildGrammarQuiz();
  if (type !== 'audio' && type !== 'conversation') state.view = 'quiz';
  render();
}

// Override the global startQuiz function
window.startQuiz = startQuizWithShuffledOptions;

      { id:"l6ex2", type:"speaking_prompt", title:"Bài 2. Nhìn tranh và hoàn thành câu theo mẫu:", instruction:"(Look at the pictures and complete the following sentences)", example:"Mẫu: Anh ấy thức dậy lúc 7 giờ kém 10.", items:["(1) ăn sáng / 7 giờ 15","(2) đi làm / 8 giờ sáng","(3) học / 7 giờ","(4) chạy / 5 giờ 30","(5) đá bóng / 5 giờ kém 10","(6) xem ti vi / 8 giờ tối","(7) đi ngủ / 11 giờ 10"], answers:["Anh ấy ăn sáng lúc 7 giờ 15.","Anh ấy đi làm lúc 8 giờ sáng.","Anh ấy học lúc 7 giờ.","Anh ấy chạy lúc 5 giờ 30.","Anh ấy đá bóng lúc 5 giờ kém 10.","Anh ấy xem ti vi lúc 8 giờ tối.","Anh ấy đi ngủ lúc 11 giờ 10."] },
      { id:"l6ex3", type:"question_formation", title:"Bài 3. Trả lời các câu hỏi sau:", instruction:"(Answer the following questions)", example:"", items:[{answer_sentence:"1. Hàng ngày, bạn ăn sáng lúc mấy giờ?",hint:""},{answer_sentence:"2. Hôm qua, bạn đi ngủ lúc mấy giờ?",hint:""},{answer_sentence:"3. Bạn thích uống trà hay uống cà phê?",hint:""},{answer_sentence:"4. Hôm qua, bạn đã về nhà lúc mấy giờ?",hint:""},{answer_sentence:"5. Bạn có hay đi du lịch không?",hint:""}], answers:["(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)"] },
      { id:"l6ex4", type:"matching", title:"Bài 4. Nối câu ở cột A với câu tương ứng ở cột B:", instruction:"(Match A with B)", columnA:["1. Anh thường thức dậy lúc mấy giờ?","2. Chị hay đi làm lúc mấy giờ?","3. Buổi tối, anh thường đọc báo hay xem TV?","4. Anh luôn luôn đi ngủ sớm, phải không?","5. Chị có hay đọc báo không?"], columnB:["a. Tôi thường đi làm lúc 8 giờ.","b. Vâng, tôi thường đi ngủ lúc 10 giờ.","c. Tôi thường thức dậy lúc 6 giờ.","d. Tôi thường đọc báo.","e. Có, tôi thường đọc báo buổi tối."], answers:["c","a","d","b","e"] },
      { id:"l6ex5", type:"question_formation", title:"Bài 5. Đặt câu hỏi cho từ/cụm từ gạch chân trong các câu sau:", instruction:"(Make questions for the underlined words/phrases)", example:"Mẫu: Hàng ngày, bạn ăn sáng lúc mấy giờ? — Hàng ngày, tôi ăn sáng lúc 7 giờ.", items:[{answer_sentence:"– Sáng nay, tôi thức dậy lúc 6 giờ.",hint:""},{answer_sentence:"– Chị Nga thường mua thức ăn ở siêu thị Intimex.",hint:""},{answer_sentence:"– Anh ấy sẽ họp lúc 5 giờ chiều.",hint:""},{answer_sentence:"– Anna sẽ học tiếng Việt lúc 8 giờ sáng.",hint:""},{answer_sentence:"– Anh Nam gặp khách hàng lúc 10 giờ sáng.",hint:""}], answers:["Sáng nay, bạn thức dậy lúc mấy giờ?","Chị Nga thường mua thức ăn ở đâu?","Anh ấy sẽ họp lúc mấy giờ?","Anna sẽ học tiếng Việt lúc mấy giờ?","Anh Nam gặp khách hàng lúc mấy giờ?"] },
      { id:"l6ex6", type:"question_formation", title:"Bài 6. Đọc đoạn văn sau và trả lời câu hỏi:", instruction:"(Read the following paragraph and answer the questions)", example:"Mike là người Mĩ. Anh ấy là kĩ sư của công ty AVC. Hàng ngày, Mike dậy lúc 6 giờ rưỡi. Đầu tiên, anh ấy đánh răng, rửa mặt. Sau đó, Mike ăn sáng lúc 7 giờ 15 phút. Anh ấy thường ra khỏi nhà lúc 8 giờ. Công ty của anh ấy bắt đầu làm việc lúc 8 giờ rưỡi. Hàng ngày, anh ấy thường về nhà lúc 7 giờ tối. Một tuần anh ấy học tiếng Việt 3 buổi ở Trung tâm 123VIETNAMESE.", items:[{answer_sentence:"1. Mike có phải là người Mĩ không?",hint:""},{answer_sentence:"2. Mike đang làm việc ở đâu?",hint:""},{answer_sentence:"3. Mike thường ăn sáng lúc 8 giờ, phải không?",hint:""},{answer_sentence:"4. Công ty của Mike bắt đầu làm việc lúc mấy giờ?",hint:""},{answer_sentence:"5. Mike thường về nhà lúc mấy giờ?",hint:""},{answer_sentence:"6. Mike học tiếng Việt mấy buổi một tuần?",hint:""}], answers:["Vâng, Mike là người Mĩ.","Mike đang làm việc ở công ty AVC.","Không, Mike thường ăn sáng lúc 7 giờ 15 phút.","Công ty của Mike bắt đầu làm việc lúc 8 giờ rưỡi.","Mike thường về nhà lúc 7 giờ tối.","Mike học tiếng Việt 3 buổi một tuần."] }

  "7": {
    title: "Hôm nay là ngày bao nhiêu?",
    title_en: "What is today's date?",
    exercises: [
      { id:"l7ex1", type:"speaking_prompt", title:'Bài 1. Dùng "khi nào/bao giờ" để hỏi và trả lời theo mẫu:', instruction:'(Use "khi nào/bao giờ" to make questions and answers)', example:"Mẫu: Chị/đi Đà Nẵng/tháng sau — Khi nào/Bao giờ chị đi Đà Nẵng? — Tháng sau, tôi sẽ đi Đà Nẵng.", items:["1. Anh/đi Hạ Long/tuần sau","2. Em Lan/đi du học/tháng sau","3. Chúng ta/họp/buổi chiều (bây giờ là buổi sáng)","4. Anh Kim/bắt đầu làm việc ở công ty mới/tuần trước","5. Họ/đi công tác/tháng Hai (bây giờ là tháng Năm)","6. Họ/cưới/năm sau","7. Anh ấy/sân bay/đón đồng nghiệp/ngày kia/đi"], answers:["Khi nào anh đi Hạ Long? — Tuần sau, tôi sẽ đi Hạ Long.","Khi nào em Lan đi du học? — Tháng sau, em Lan sẽ đi du học.","Khi nào chúng ta họp? — Chúng ta sẽ họp buổi chiều.","Khi nào anh Kim bắt đầu làm việc ở công ty mới? — Anh Kim đã bắt đầu làm việc tuần trước.","Khi nào họ đi công tác? — Họ đã đi công tác tháng Hai.","Khi nào họ cưới? — Năm sau, họ sẽ cưới.","Khi nào anh ấy đi sân bay đón đồng nghiệp? — Ngày kia, anh ấy sẽ đi sân bay đón đồng nghiệp."] },
      { id:"l7ex2", type:"question_formation", title:"Bài 2. Dùng từ gợi ý trong ngoặc để trả lời các câu hỏi sau:", instruction:"(Use the given words to answer the questions)", example:"Mẫu: Hôm nay là ngày bao nhiêu? (15) → Hôm nay là ngày mười lăm.", items:[{answer_sentence:"1. Thầy Luck sinh năm bao nhiêu? (1979)",hint:""},{answer_sentence:"2. Chị Elena đến Việt Nam khi nào? (tháng Ba năm ngoái)",hint:""},{answer_sentence:"3. Bao giờ công ty anh Minh bắt đầu nghỉ Tết? (thứ Năm tuần sau)",hint:""},{answer_sentence:"4. Chị Nathalee kết hôn khi nào? (mùa xuân năm nay)",hint:""},{answer_sentence:"5. Bao giờ anh Dũng đi du lịch Nha Trang? (hai tuần sau)",hint:""},{answer_sentence:"6. Tháng mấy anh ấy sẽ bắt đầu công việc mới? (hai tháng nữa)",hint:""},{answer_sentence:"7. Ngày mai là ngày bao nhiêu? (ngày mùng 8)",hint:""}], answers:["Thầy Luck sinh năm 1979.","Chị Elena đến Việt Nam tháng Ba năm ngoái.","Thứ Năm tuần sau công ty anh Minh bắt đầu nghỉ Tết.","Chị Nathalee kết hôn vào mùa xuân năm nay.","Hai tuần sau anh Dũng đi du lịch Nha Trang.","Hai tháng nữa anh ấy sẽ bắt đầu công việc mới.","Ngày mai là ngày mùng 8."] },
      { id:"l7ex3", type:"mcq_inline", title:"Bài 3. Chọn đáp án đúng cho các câu sau:", instruction:"(Choose the correct answers)", questions:[{question:"1. Tuần trước, anh ấy (đã/đang) đi ăn với bạn.",options:["đã","đang"],answer:"đã"},{question:"2. Tháng Ba năm sau, tôi (sẽ/rồi) đi du học ở Pháp.",options:["sẽ","rồi"],answer:"sẽ"},{question:"3. (Hôm qua/Ngày mai) chị Yuki đã ăn cơm với giám đốc.",options:["Hôm qua","Ngày mai"],answer:"Hôm qua"},{question:"4. (Tháng này/Tháng sau) anh Thành sẽ đi nghỉ mát ở Đà Lạt.",options:["Tháng này","Tháng sau"],answer:"Tháng sau"},{question:"5. Bây giờ, trời (đang/sẽ) mưa.",options:["đang","sẽ"],answer:"đang"},{question:"6. Chị (đã/sẽ) đến Việt Nam khi nào? — Tôi đến Việt Nam 2 tháng trước.",options:["đã","sẽ"],answer:"đã"}] },
      { id:"l7ex4", type:"word_ordering", title:"Bài 4. Sắp xếp các từ sau thành câu đúng:", instruction:"(Arrange the given words to make meaningful sentences)", items:["sẽ / tuần sau / anh ấy / nhà / về / .","Mary / làm việc / công ty An Phú / từ / ở / tuần trước / bắt đầu / .","vợ anh / Việt Nam / và / anh / về / khi nào / ?","sinh nhật / bao nhiêu / của / em ấy / là / ngày / ?","tôi / đã / hai / đi / Hạ Long / du lịch / tuần / .","tôi / tiếng Việt / ngày kia / trung tâm / ở / học / 123VIETNAMESE / ."], answers:["Tuần sau anh ấy sẽ về nhà.","Mary bắt đầu làm việc ở công ty An Phú từ tuần trước.","Khi nào vợ anh và anh về Việt Nam?","Sinh nhật của em ấy là ngày bao nhiêu?","Tôi đã đi du lịch Hạ Long hai tuần.","Ngày kia tôi học tiếng Việt ở trung tâm 123VIETNAMESE."] },
      { id:"l7ex5", type:"question_formation", title:"Bài 5. Đặt câu hỏi cho từ/cụm từ gạch chân trong các câu sau:", instruction:"(Make questions for the underlined words/phrases)", example:"Mẫu: Cái áo này bao nhiêu tiền? — Cái áo này 125.000 đồng.", items:[{answer_sentence:"– Chị Kim đến Việt Nam vào tháng Mười năm 2015.",hint:""},{answer_sentence:"– Chủ nhật tuần trước, tôi đã đi siêu thị Aeon với em gái tôi.",hint:""},{answer_sentence:"– Năm nay là năm 2016.",hint:""},{answer_sentence:"– Công ty anh Trần sẽ nghỉ Tết 9 ngày.",hint:""},{answer_sentence:"– Không, hôm qua tôi không gặp anh Phương.",hint:""},{answer_sentence:"– Anh ấy sẽ đi du lịch vào tháng Tám.",hint:""},{answer_sentence:"– Họ sẽ làm việc ở Việt Nam từ ngày 26.",hint:""}], answers:["Chị Kim đến Việt Nam khi nào?","Chủ nhật tuần trước, bạn đã đi đâu?","Năm nay là năm bao nhiêu?","Công ty anh Trần sẽ nghỉ Tết mấy ngày?","Hôm qua bạn có gặp anh Phương không?","Anh ấy sẽ đi du lịch vào tháng mấy?","Họ sẽ làm việc ở Việt Nam từ ngày bao nhiêu?"] },
      { id:"l7ex6", type:"question_formation", title:"Bài 6. Nhìn sơ đồ và trả lời các câu hỏi sau:", instruction:"(Use the information in the chart to answer the questions — Năm nay là năm 2015)\nTimeline: 2007 Tốt nghiệp Đại học | 2012 Kết hôn | 2014 Đến Việt Nam | 2015 Làm việc ở Công ty Alatca | 2016 Đi du lịch Mỹ", items:[{answer_sentence:"1. Anh Sato đã tốt nghiệp đại học năm nào?",hint:""},{answer_sentence:"2. Bao giờ anh Sato sẽ đi du lịch ở Mỹ?",hint:""},{answer_sentence:"3. Anh Sato đã đến Việt Nam khi nào?",hint:""},{answer_sentence:"4. Anh Sato đã kết hôn năm 2012 phải không?",hint:""},{answer_sentence:"5. Anh Sato bắt đầu làm việc ở công ty Alatca từ khi nào?",hint:""}], answers:["Anh Sato đã tốt nghiệp đại học năm 2007.","Năm sau (2016), anh Sato sẽ đi du lịch ở Mỹ.","Anh Sato đã đến Việt Nam năm 2014.","Vâng, anh Sato đã kết hôn năm 2012.","Anh Sato bắt đầu làm việc ở công ty Alatca từ năm 2015."] },
      { id:"l7ex8", type:"true_false", title:"Bài 8. Nghe và chọn câu đúng hoặc sai:", instruction:"(Listen and decide the following sentences are true or false)", passage:"(Listening exercise about David's trip to Vietnam)", items:["David đến Việt Nam vào sáng mai.","Anh ấy sẽ ở Hà Nội 3 ngày.","Anh ấy đi Huế ngày 12 tháng Mười.","David sẽ không đi thành phố Hồ Chí Minh.","David quay trở về Mĩ vào thứ Năm."], answers:["Sai","Sai","Đúng","Sai","Đúng"] },
      { id:"l7ex9", type:"writing_prompt", title:"Bài 9. Viết về cuộc sống của bạn ở Việt Nam.", instruction:"(Write a paragraph about your life in Vietnam)", placeholder:"Viết bài của bạn ở đây... / Write your paragraph here..." }

  "8": {
    title: "Anh đã có nhà riêng chưa?",
    title_en: "Do you have your own house yet?",
    exercises: [
      { id:"l8ex1", type:"speaking_prompt", title:"Bài 1. Dựa vào từ gợi ý trong ngoặc để thực hành theo mẫu:", instruction:"(Use the given words to practice speaking as follow)", example:"Mẫu: Anh/ăn cơm (rồi) → Anh đã ăn cơm chưa? — Rồi, tôi đã ăn cơm rồi.", items:["1. Mary/mua xe đạp (rồi)","2. Anh ấy/làm bài tập (rồi)","3. Peter/gọi điện thoại cho mẹ (chưa)","4. Họ/đi Huế (rồi)","5. Các anh/xem phim này (chưa)","6. Em ấy/gặp bạn (chưa)","7. Chị ấy/họp với giám đốc (rồi)"], answers:["Mary đã mua xe đạp chưa? — Rồi, cô ấy đã mua rồi.","Anh ấy đã làm bài tập chưa? — Rồi, anh ấy đã làm rồi.","Peter đã gọi điện thoại cho mẹ chưa? — Chưa, Peter chưa gọi.","Họ đã đi Huế chưa? — Rồi, họ đã đi rồi.","Các anh đã xem phim này chưa? — Chưa, chúng tôi chưa xem.","Em ấy đã gặp bạn chưa? — Chưa, em ấy chưa gặp.","Chị ấy đã họp với giám đốc chưa? — Rồi, chị ấy đã họp rồi."] },
      { id:"l8ex2", type:"question_formation", title:"Bài 2. Dùng từ gợi ý để trả lời các câu hỏi sau:", instruction:"(Use the given words to answer the questions)", example:"Mẫu: Bà Lệ đã đi Trung Quốc chưa? → Rồi, bà ấy đã đi Trung Quốc rồi.", items:[{answer_sentence:"1. Giám đốc đã họp xong chưa? (Chưa)",hint:"Chưa"},{answer_sentence:"2. Anh Toàn đã đến Hàn Quốc chưa? (Rồi)",hint:"Rồi"},{answer_sentence:"3. Bạn ấy đã ngủ chưa? (Rồi)",hint:"Rồi"},{answer_sentence:"4. Bữa tiệc cuối năm đã bắt đầu chưa? (Chưa)",hint:"Chưa"},{answer_sentence:"5. Anh John đã mua đôi giày mới cho con trai chưa? (Rồi)",hint:"Rồi"}], answers:["Chưa, giám đốc chưa họp xong.","Rồi, anh Toàn đã đến Hàn Quốc rồi.","Rồi, bạn ấy đã ngủ rồi.","Chưa, bữa tiệc cuối năm chưa bắt đầu.","Rồi, anh John đã mua đôi giày mới cho con trai rồi."] },
      { id:"l8ex3", type:"fill_blank_grammar", title:'Bài 3. Điền "đều/vẫn/cũng" vào chỗ trống:', instruction:'(Fill in the blanks with "đều/vẫn/cũng")', items:[{sentence:"Hôm nay là chủ nhật nhưng tôi ___ đi làm.",answer:"vẫn"},{sentence:"Tôi thích xem phim. Bố mẹ tôi ___ thích xem phim. Gia đình tôi ___ thích xem phim.",answer:"cũng / đều"},{sentence:"Anh Nam là kĩ sư. Em trai anh ấy ___ là kĩ sư. Họ ___ là kĩ sư.",answer:"cũng / đều"},{sentence:"Sáng nay, tôi ___ chưa làm xong báo cáo.",answer:"vẫn"},{sentence:"Các anh ấy ___ đã kết hôn.",answer:"đều"},{sentence:"Tôi thích uống cà phê và người yêu tôi ___ rất thích uống cà phê.",answer:"cũng"},{sentence:"Hôm nay trời mưa và rất lạnh nhưng các con tôi ___ đến trường.",answer:"vẫn"},{sentence:"A: Dạo này chị làm việc ở đâu? B: Chị ___ dạy tiếng Việt ở Trung tâm 123VIETNAMESE.",answer:"vẫn"}] },
      { id:"l8ex4", type:"question_formation", title:"Bài 4. Đặt câu hỏi cho các câu trả lời sau:", instruction:"(Make questions for the following sentences)", example:"", items:[{answer_sentence:"– Chưa, mẹ chưa mua bánh mì.",hint:""},{answer_sentence:"– Rồi, tôi mua bia rồi.",hint:""},{answer_sentence:"– Chưa, cô ấy chưa đi chợ.",hint:""},{answer_sentence:"– Vâng, tôi quen với cuộc sống ở Hà Nội rồi.",hint:""},{answer_sentence:"– Chưa, taxi chưa đến.",hint:""},{answer_sentence:"– Rồi, ông ấy đã ăn sáng rồi.",hint:""}], answers:["Mẹ đã mua bánh mì chưa?","Anh/chị đã mua bia chưa?","Cô ấy đã đi chợ chưa?","Anh/chị đã quen với cuộc sống ở Hà Nội chưa?","Taxi đã đến chưa?","Ông ấy đã ăn sáng chưa?"] },
      { id:"l8ex5", type:"true_false", title:"Bài 5. Chọn đúng hoặc sai vào các câu sau:", instruction:"(Choose the following sentences are true or false — based on the dialogue)", passage:"Các đoạn hội thoại:\n1. A: Bạn đã ăn bún chả lần nào chưa? B: Rồi, tôi ăn nhiều lần rồi. Ngon lắm.\n2. A: Chị làm việc với anh Hùng chưa? B: Chưa, ngày mai.\n3. A: Cô ấy chưa gặp ông giám đốc, phải không? B: Không, cô ấy chưa gặp.\n4. A: Anh đến Hội An chưa? B: Chưa, tôi đã đến Hội An 3 lần rồi.\n5. A: Ann đã học tiếng Việt không? B: Chưa. Ann chưa học.", items:["Dialogue 1: B says it was delicious (is this sentence correct?)","Dialogue 2: B says she already worked with anh Hùng","Dialogue 3: A says cô ấy hasn't met the director yet","Dialogue 4: B says he hasn't been to Hội An","Dialogue 5: Ann hasn't studied Vietnamese yet"], answers:["Đúng","Sai","Đúng","Sai","Đúng"] },

      { id:"l11ex1", type:"word_ordering", title:'Bài 1. Viết lại các câu sau theo mẫu, dùng cấu trúc "vừa...vừa":', instruction:'(Rewrite the sentences using the structure "vừa...vừa")', items:["1. Bài tập này dễ và hay, tôi có thể làm được.","2. Nhà hàng này ngon và rẻ.","3. Đường phố ở Hà Nội chật và đông, nên tôi không thể đi xe máy được.","4. Anh ấy là nhà báo và giáo viên.","5. Đà Nẵng là thành phố đẹp và sạch sẽ.","6. Em ấy học cả tiếng Anh và tiếng Nhật.","7. Em gái tôi đang nấu ăn và nghe nhạc."], answers:["Bài tập này vừa dễ vừa hay, tôi có thể làm được.","Nhà hàng này vừa ngon vừa rẻ.","Đường phố ở Hà Nội vừa chật vừa đông, nên tôi không thể đi xe máy được.","Anh ấy vừa là nhà báo vừa là giáo viên.","Đà Nẵng là thành phố vừa đẹp vừa sạch sẽ.","Em ấy học vừa tiếng Anh vừa tiếng Nhật.","Em gái tôi vừa nấu ăn vừa nghe nhạc."] },
      { id:"l11ex2", type:"word_ordering", title:"Bài 2. Dựa vào từ gợi ý, viết lại các câu sau sao cho nghĩa không thay đổi:", instruction:"(Use the given words to rewrite the sentences without changing the meaning)", items:["1. Tôi nói tiếng Nhật được. (có thể)","2. Anh ấy không thể đi xe máy. (được)","3. Anh ấy biết nói cả tiếng Anh và tiếng Pháp. (vừa...vừa)","4. Phòng này to và rộng. (vừa...vừa)","5. Anh Lâm đã đến Việt Nam. Anh ấy sẽ làm việc ở đây 2 năm. (để)","6. Em ấy thường nấu ăn một mình, không cần ai giúp. (tự)"], answers:["Tôi có thể nói tiếng Nhật.","Anh ấy đi xe máy không được.","Anh ấy biết nói vừa tiếng Anh vừa tiếng Pháp.","Phòng này vừa to vừa rộng.","Anh Lâm đã đến Việt Nam để làm việc ở đây 2 năm.","Em ấy thường tự nấu ăn, không cần ai giúp."] },
      { id:"l11ex3", type:"question_formation", title:"Bài 3. Đặt câu hỏi cho từ/cụm từ gạch chân trong các câu sau:", instruction:"(Make questions for the underlined words/phrases)", example:"", items:[{answer_sentence:"– Tôi đến đây để gặp anh Long.",hint:""},{answer_sentence:"– Học sinh của lớp này vừa thông minh vừa chăm chỉ.",hint:""},{answer_sentence:"– Vâng, anh ấy uống rượu được.",hint:""},{answer_sentence:"– Tuấn vừa học vừa nghe nhạc.",hint:""},{answer_sentence:"– Chúng tôi có thể nói tiếng Anh và tiếng Việt.",hint:""},{answer_sentence:"– Không, ngày mai tôi không đến được.",hint:""},{answer_sentence:"– Bạn gái anh ấy vừa nấu ăn ngon vừa làm việc nhà giỏi.",hint:""}], answers:["Anh/chị đến đây để làm gì?","Học sinh của lớp này như thế nào?","Anh ấy uống rượu được không?","Tuấn vừa làm gì vừa làm gì?","Chúng tôi có thể nói những tiếng gì?","Ngày mai anh/chị có đến được không?","Bạn gái anh ấy như thế nào?"] },
      { id:"l11ex4", type:"question_formation", title:"Bài 4. Hoàn thành các câu sau:", instruction:"(Complete the following sentences)", example:"", items:[{answer_sentence:"1. Tôi đến trung tâm 123VIETNAMESE để...",hint:""},{answer_sentence:"2. Anh Kim gặp giám đốc để...",hint:""},{answer_sentence:"3. Sinh viên đến thư viện để...",hint:""},{answer_sentence:"4. Anh ấy đến nhà bạn để...",hint:""},{answer_sentence:"5. Em trai tôi học tiếng Anh để...",hint:""},{answer_sentence:"6. Chị Anna đến ngân hàng để...",hint:""},{answer_sentence:"7. Họ muốn đi Hạ Long để...",hint:""},{answer_sentence:"8. Tôi phải đến sân bay để...",hint:""}], answers:["...học tiếng Việt.","...nói chuyện về công việc.","...đọc sách và mượn tài liệu.","...chơi/thăm bạn.","...có thể xin việc ở công ty nước ngoài.","...rút tiền/gửi tiền.","...tham quan và nghỉ ngơi.","...đón người thân/bạn bè."] },
      { id:"l11ex5", type:"fill_blank_grammar", title:"Bài 5. Chọn các từ sau đây để điền vào chỗ trống trong các câu cho thích hợp:", instruction:"(Fill in the blanks with suitable words: ý kiến / văn hóa / thú vị / có thể / thời gian / bảo tàng / tìm hiểu)", items:[{sentence:"a. Việt Nam là một đất nước rất ___.",answer:"thú vị"},{sentence:"b. Nếu tôi có ___, tôi sẽ đến Đà Nẵng thăm bạn.",answer:"thời gian"},{sentence:"c. Kì nghỉ này chúng ta đi du lịch Nha Trang nhé! — ___ đó rất hay.",answer:"Ý kiến"},{sentence:"d. Nếu muốn biết về ___ của Việt Nam, bạn phải đến ___.",answer:"văn hóa / bảo tàng"},{sentence:"e. Chị ___ hát tiếng Hàn được không? — Một chút thôi!",answer:"có thể"},{sentence:"f. Tôi sang Việt Nam vì muốn ___ về văn hóa Việt Nam.",answer:"tìm hiểu"}] },
      { id:"l11ex6", type:"true_false", title:"Bài 6. Những câu sau đây, câu nào đúng, câu nào sai? Chữa lại những câu sai:", instruction:"(Choose the following sentences are true or false, correct the false sentences)", passage:"(Grammar exercises about ability, purpose, and double verb structures)", items:["1. Tôi nói không thể tiếng Việt.","2. Ở Việt Nam anh ấy chưa đủ 18 tuổi nên có thể đi xe máy.","3. Tôi đến Hàn Quốc cho du lịch.","4. Tôi không thể tự nấu cơm, giặt quần áo.","5. Vợ anh ấy vừa xinh đẹp vừa giỏi giang.","6. Anh ấy học tự tiếng Việt lấy.","7. Cuối tuần, tôi thích tự nấu ăn.","8. Nếu em chăm chỉ học thì em sẽ không đỗ đại học."], answers:["Sai","Sai","Sai","Sai","Đúng","Sai","Đúng","Sai"] }
    ]
  },
  "12": {
    title: "Quyển sách ở trên bàn",
    title_en: "The book is on the table",
    exercises: [
      { id:"l12ex1", type:"speaking_prompt", title:'Bài 1. Nhìn các tranh sau, sử dụng cấu trúc "không được/đừng/cấm + động từ" để thực hành nói:', instruction:'(Look at the pictures, practice speaking with structure "không được/đừng/cấm + verb")', example:"Mẫu: (1). Đừng ăn kem.", items:["(2) đi xe máy nhanh","(3) uống rượu lái xe","(4) hút thuốc lá","(5) ra ngoài khi mưa","(6) bơi ở đây","(7) ngủ trong lớp","(8) dùng điện thoại khi lái xe"], answers:["Đừng đi xe máy nhanh.","Không được uống rượu lái xe.","Cấm hút thuốc lá.","Đừng ra ngoài khi mưa.","Cấm bơi ở đây.","Đừng ngủ trong lớp.","Không được dùng điện thoại khi lái xe."] },
      { id:"l12ex2", type:"matching", title:"Bài 2. Nối các câu ở cột A với các câu tương ứng ở cột B:", instruction:"(Match A with B)", columnA:["1. Con chó ấy nặng bao nhiêu kg?","2. Từ Hà Nội đến Sa Pa bao nhiêu km?","3. Tòa nhà này cao bao nhiêu mét?","4. Rừng Cúc Phương rộng bao nhiêu héc ta?","5. Siêu thị này rộng bao nhiêu mét vuông?","6. Cái bàn này dài mấy mét?","7. Anh trai bạn cao bao nhiêu?"], columnB:["a. 400 km","b. 100 m²","c. 11.350 ha","d. 3m20","e. 6 kg","f. 50 m","g. 1m70"], answers:["e","a","f","c","b","d","g"] },
      { id:"l12ex3", type:"speaking_prompt", title:"Bài 3. Nhìn tranh và hoàn thành câu theo mẫu:", instruction:"(Look at the pictures and complete the sentences)", example:"Mẫu: 1. Em Nam / 50 kg → Em Nam nặng 50 kg.", items:["2. Sông này / 1194 km","3. Cái cây / 2m","4. Ngôi nhà / 120 m²","5. Cầu kia / 15 km","6. Hồ Tây / 550 ha"], answers:["Sông này dài 1194 km.","Cái cây cao 2m.","Ngôi nhà rộng 120 m².","Cầu kia dài 15 km.","Hồ Tây rộng 550 ha."] },
      { id:"l12ex4", type:"mcq_inline", title:"Bài 4. Chọn đáp án đúng cho những câu sau:", instruction:"(Choose the correct answers)", questions:[{question:"1. Con mèo ở ___ hay ___ bàn hả Mary?",options:["trong/bên cạnh","bên cạnh/trong","trên/dưới","trong/dưới"],answer:"trong/dưới"},{question:"2. Thức ăn ở ___ tủ lạnh.",options:["trên","trong","bên cạnh","dưới"],answer:"trong"},{question:"3. Dưới giường có đôi giày ___ không?",options:["nào","ở đâu","gì","đâu"],answer:"nào"},{question:"4. Trong tủ có quần áo của anh ___?",options:["gì","nào","ai","phải không"],answer:"không"},{question:"5. ___ nói chuyện khi đang làm việc.",options:["đừng","đứng","dừng","dựng"],answer:"đừng"},{question:"6. ___ hút thuốc lá nữa.",options:["đừng","đúng","dừng","dùng"],answer:"đừng"},{question:"7. ___ đi làm muộn.",options:["được không","không gì","không được","có không"],answer:"không được"},{question:"8. Tôi không ___ lắm.",options:["dài","sâu","rộng","nặng"],answer:"cao"},{question:"9. Bể bơi này ___ bao nhiêu?",options:["tốt","sâu","nhẹ","nặng"],answer:"sâu"},{question:"10. Nhà máy bánh kẹo Tràng An ___ bao nhiêu?",options:["cao","sâu","rộng","nặng"],answer:"rộng"}] },
      { id:"l12ex5", type:"fill_blank_grammar", title:'Bài 5. Điền "đừng/không được/cấm" vào các câu sau:', instruction:'(Fill in the blanks with "không được/đừng/cấm")', items:[{sentence:"Bây giờ trời đang mưa to lắm. Em ___ đi ra ngoài.",answer:"đừng/không được"},{sentence:"Nam, em ___ ngủ trong lớp học.",answer:"đừng/không được"},{sentence:"Xin lỗi anh, ở đây ___ hút thuốc.",answer:"cấm"},{sentence:"Anh Giang, anh ___ lái xe nhanh quá.",answer:"đừng/không được"},{sentence:"___ lái xe sau khi uống rượu, bia.",answer:"Không được/Cấm"},{sentence:"Con đang bị viêm họng, con ___ ăn kem.",answer:"không được"},{sentence:"___ bơi ở đây vì rất nguy hiểm.",answer:"Cấm/Không được"},{sentence:"___ sử dụng điện thoại khi đang lái xe.",answer:"Không được/Cấm"}] },
      { id:"l12ex6", type:"question_formation", title:"Bài 6. Đặt câu hỏi cho câu trả lời sau:", instruction:"(Make questions for the following sentences)", example:"", items:[{answer_sentence:"– Anh Tuấn cao 1m65 và nặng 60 kg.",hint:""},{answer_sentence:"– Không, không có quyển sách nào trong cặp.",hint:""},{answer_sentence:"– Trong phòng có cô giáo và 2 học sinh.",hint:""},{answer_sentence:"– Anh Dũng đang ở trong phòng ngủ.",hint:""},{answer_sentence:"– Suối nước nóng không sâu lắm.",hint:""},{answer_sentence:"– Trên bàn có 2 quả táo và 1 bông hoa hồng.",hint:""},{answer_sentence:"– Tôi đang ở trong taxi.",hint:""}], answers:["Anh Tuấn cao bao nhiêu và nặng bao nhiêu kg?","Trong cặp có quyển sách nào không?","Trong phòng có ai?","Anh Dũng đang ở đâu?","Suối nước nóng có sâu không?","Trên bàn có gì?","Anh/chị đang ở đâu?"] }
    ]
  },
  "13": {
    title: "Cho chúng tôi xem thực đơn",
    title_en: "Please show us the menu",
    exercises: [
      { id:"l13ex1", type:"speaking_prompt", title:"Bài 1. Dùng tính từ thích hợp để nói về đặc điểm của các vật sau:", instruction:"(Using suitable adjectives to describe the things below)", example:"Mẫu: 1. ớt — cay", items:["2. cà phê","3. kẹo","4. muối","5. quả dưa hấu","6. quả chanh"], answers:["đắng","ngọt","mặn","ngọt/mát","chua"] },
      { id:"l13ex2", type:"question_formation", title:"Bài 2. Thêm danh từ vào sau các loại từ cho phù hợp:", instruction:"(Add suitable nouns to the following noun qualifiers)", example:"", items:[{answer_sentence:"1. cốc (glass): nước, ___",hint:"add more nouns"},{answer_sentence:"2. chai (bottle): bia, ___",hint:""},{answer_sentence:"3. bát (bowl): cơm, ___",hint:""},{answer_sentence:"4. hộp (box): bánh, ___",hint:""},{answer_sentence:"5. quả (fruit): cam, ___",hint:""}], answers:["cốc trà, cốc nước cam, cốc cà phê","chai nước, chai rượu, chai nước ngọt","bát phở, bát bún, bát súp","hộp sôcôla, hộp kẹo, hộp bánh quy","quả xoài, quả táo, quả chuối"] },
      { id:"l13ex3", type:"question_formation", title:"Bài 3. Đặt câu hỏi cho từ/cụm từ gạch chân trong các câu sau:", instruction:"(Make questions for the underlined words/phrases)", example:"", items:[{answer_sentence:"– Em gái Nam thích ăn phở bò chín, không thích ăn tái.",hint:""},{answer_sentence:"– Cho tôi 2 bún chả và 1 bún bò Nam Bộ.",hint:""},{answer_sentence:"– Ở nhà hàng này, tráng miệng có hoa quả và kem.",hint:""},{answer_sentence:"– Tôi muốn gọi thêm 1 đĩa nem rán nữa.",hint:""},{answer_sentence:"– Cho tôi 2 ly rượu vang đỏ nhé!",hint:""}], answers:["Em gái Nam thích ăn phở như thế nào?","Cho tôi gì?","Ở nhà hàng này, tráng miệng có gì?","Anh/chị muốn gọi thêm gì?","Cho tôi gì?"] },
      { id:"l13ex4", type:"matching", title:"Bài 4. Nối các câu ở cột A với các câu tương ứng ở cột B:", instruction:"(Match A with B)", columnA:["1. Chị đi mấy người?","2. Anh chị dùng gì ạ?","3. Em ơi, tính tiền.","4. Chị muốn uống gì không ạ?","5. Chị gọi thêm gì nữa không ạ?","6. Ở đây có món gì đặc biệt không?","7. Cho tôi xem thực đơn."], columnB:["a. Không, thế này thôi.","b. Của anh chị hết 435.000. Đây là hóa đơn ạ.","c. Cho hai pizza hải sản cỡ vừa nhé.","d. Dạ, chúng em có món phở cuốn ngon lắm ạ.","e. Đây ạ. Mời anh xem.","g. Cho hai coca nhé.","h. Hai người."], answers:["h","c","b","g","a","d","e"] },
      { id:"l13ex5", type:"question_formation", title:"Bài 5. Hoàn thành các câu sau:", instruction:"(Complete the following sentences)", example:"", items:[{answer_sentence:"1. Người Việt Nam, ai cũng...",hint:""},{answer_sentence:"2. Sáng nào mẹ tôi cũng...",hint:""},{answer_sentence:"3. Ở nông thôn, nhà nào cũng...",hint:""},{answer_sentence:"4. Phụ nữ, ai cũng...",hint:""},{answer_sentence:"5. Cuối tuần nào tôi cũng...",hint:""},{answer_sentence:"6. Trong siêu thị, hàng hóa nào cũng...",hint:""}], answers:["thích ăn phở.","dậy sớm nấu ăn.","có vườn rau.","thích mua sắm.","đi chơi với bạn bè.","có giá cả rõ ràng."] },
      { id:"l13ex7", type:"fill_blank_dialogue", title:"Bài 7. Nghe và điền từ thích hợp vào đoạn hội thoại sau:", instruction:"(Listen and fill words in the blanks)", dialogues:[{label:"Dialogue at restaurant (Thảo & Hùng ordering)",text:'Người phục vụ: Xin chào anh chị. Anh chị đã đặt bàn (1)___a?\nThảo: (2)___, chị (3)___ chiều qua rồi. Bàn (4)___ 2 người.\nNgười phục vụ: Chị cho em (5)___ tên chị ạ.\nThảo: Chị tên (6)___ Thảo.\nNgười phục vụ: Vâng, bàn của anh chị bên này ạ. (7)___ anh chị ngồi. Xin mời anh chị (8)___ thực đơn.\nThảo: Anh muốn gọi món (9)___?\nHùng: Món khai vị trước.\nThảo: Cho chị sa-lát dưa chuột, cà chua, rau với dấm và súp bí đỏ trước.\nNgười phục vụ: Dạ vâng, món chính chị (10)___ gì ạ?\nThảo: (11)___ chị 2 thịt bò bít-tết. Tái một chút nhé.\nNgười phục vụ: Dạ vâng, em nhớ rồi.\nThảo: Anh thích (12)___ bia (13)___ nước hoa quả hả anh Hùng?\nHùng: Cho anh bia đi.\nThảo: Em cũng uống (14)___.\nNgười phục vụ: Dạ vâng, 2 bia. Anh chị gọi (15)___ gì (16)___ không ạ?\nThảo: Không, cảm ơn em.\nNgười phục vụ: Xin anh chị đợi một lát.',blanks:["chưa","Rồi","đặt","cho","biết","là","Mời","xem","gì","muốn","Cho","uống","hay","vậy","thêm","nữa"]}] },
      { id:"l13ex8", type:"writing_prompt", title:"Bài 8. Viết về một món ăn Việt Nam bạn thích nhất.", instruction:"(Write a paragraph to talk about the Vietnamese food that you like most)", placeholder:"Viết bài của bạn ở đây... / Write your paragraph here..." }

  "14": {
    title: "Hôm nay trời nắng và nóng",
