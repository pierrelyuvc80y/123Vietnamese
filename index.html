      color: #f0c04a;

  "5": {"title": "Cái này bao nhiêu tiền?", "title_en": "How much is this?", "dialogue": "Anh ơi, cho tôi xem cái mũ kia.\nVâng. Của chị đây.\nMũ này có màu khác không anh?\nCó màu vàng và xanh lá cây chị ạ.\nCho tôi đi thử cái mũ màu vàng.\nMũ này bao nhiêu tiền à?\n50.000 chị ạ.\nĐắt quá! Anh giảm giá đi!\nTôi không bớt được. Giá rẻ lắm rồi.\nỜ, à, anh cho tôi mặc thử cái áo kia nhé.\nVâng.\nAnh ơi, có cỡ rộng hơn không?\nCó cỡ M đây chị.\nÁo này đúng giá 250.000 đồng.\nTôi mua mũ và áo nên anh bớt một chút nhé.\nKhông chị ạ. Tôi không bán mặc cả.\nVậy tôi lấy mũ thôi.\nCảm ơn chị!", "vocabulary": [{"vn": "mũ", "en": "hat"}, {"vn": "đắt", "en": "expensive"}, {"vn": "màu", "en": "color"}, {"vn": "mặc", "en": "to wear"}, {"vn": "màu vàng", "en": "yellow"}, {"vn": "áo", "en": "shirt"}, {"vn": "màu xanh lá cây", "en": "green"}, {"vn": "cỡ", "en": "size"}, {"vn": "đi", "en": "to wear"}, {"vn": "đúng giá", "en": "fair price"}, {"vn": "thử", "en": "to try"}, {"vn": "mặc cả", "en": "to bargain"}, {"vn": "giảm giá", "en": "to discount"}, {"vn": "bán", "en": "to sell"}, {"vn": "bớt", "en": "to reduce"}, {"vn": "lấy", "en": "to take"}, {"vn": "rẻ", "en": "cheap"}], "grammar": ["Bao nhiêu tiền? (How much money?)", "Structure: Cho tôi + verb", "Structure: verb + thử", "Questions about colors: ... màu gì?", "Verbs with clothes (mặc, đi, đeo, ci, ...)"]}, 
  "6": {"title": "Bây giờ là mấy giờ?", "title_en": "What time is it now?", "dialogue": "Chị ơi, bây giờ là mấy giờ rồi?\nBây giờ là 8 giờ sáng.\nCảm ơn chị.\nAnh Nam ơi, cuộc họp lúc mấy giờ thế?\nCuộc họp lúc 9 giờ 30.\nThế thì tôi còn 30 phút nữa.\nHàng ngày anh thường đi làm lúc mấy giờ?\nTôi thường đi làm lúc 7 giờ 15.\nThế à? Tôi thường đi làm lúc 8 giờ kém 15.\nBuổi tối anh thường làm gì?\nTôi thường xem ti vi hoặc đọc sách.", "vocabulary": [{"vn": "bây giờ", "en": "now"}, {"vn": "mấy giờ", "en": "what time"}, {"vn": "giờ", "en": "hour, o'clock"}, {"vn": "phút", "en": "minute"}, {"vn": "sáng", "en": "morning"}, {"vn": "trưa", "en": "noon"}, {"vn": "chiều", "en": "afternoon"}, {"vn": "tối", "en": "evening"}, {"vn": "đêm", "en": "night"}, {"vn": "giờ rưỡi", "en": "half past"}, {"vn": "kém", "en": "to"}, {"vn": "cuộc họp", "en": "meeting"}, {"vn": "họp", "en": "to have a meeting"}, {"vn": "về nhà", "en": "to go home"}, {"vn": "thường", "en": "often"}, {"vn": "buổi tối", "en": "evening"}, {"vn": "giám đốc", "en": "director"}, {"vn": "kết thúc", "en": "to finish"}, {"vn": "phải", "en": "to have to"}, {"vn": "đón", "en": "to pick up"}], "grammar": ["Asking and answering about time", "Time expressions (sáng, trưa, chiều, tối, đêm)", "Asking for time of action: lúc mấy giờ?", "Frequency adverbs: luôn luôn, hay, thường, thỉnh thoảng...", "hay vs hoặc (or)"]}, 
  "7": {"title": "Hôm nay là ngày bao nhiêu?", "title_en": "What date is today?", "dialogue": "Chào anh. Hôm nay là ngày bao nhiêu thế?\nHôm nay là ngày 15 tháng 10.\nTháng 10 rồi à? Sắp đến sinh nhật tôi rồi.\nSinh nhật anh khi nào thế?\nNgày 20 tháng 10. Tuần sau.\nThế à? Tôi sẽ tặng anh một cái bánh ga tô.\nAnh giỏi quá! Cảm ơn anh nhé.\nHôm qua là ngày bao nhiêu?\nHôm qua là ngày 14.\nThế còn ngày kia?\nNgày kia là ngày 17.", "vocabulary": [{"vn": "sắp", "en": "about to"}, {"vn": "tuần sau", "en": "next week"}, {"vn": "sinh nhật", "en": "birthday"}, {"vn": "bánh ga tô", "en": "cake"}, {"vn": "tặng", "en": "to give"}, {"vn": "giỏi", "en": "good, talented"}, {"vn": "ngày", "en": "day"}, {"vn": "tháng", "en": "month"}, {"vn": "năm", "en": "year"}, {"vn": "thứ Hai", "en": "Monday"}, {"vn": "thứ Ba", "en": "Tuesday"}, {"vn": "thứ Tư", "en": "Wednesday"}, {"vn": "thứ Năm", "en": "Thursday"}, {"vn": "thứ Sáu", "en": "Friday"}, {"vn": "thứ Bảy", "en": "Saturday"}, {"vn": "Chủ nhật", "en": "Sunday"}], "grammar": ["Days, months, years (ngày, tháng, năm)", "Difference between 'sắp' and 'sẽ'", "Bao giờ / khi nào / lúc nào - When", "Time markers: hôm kia, hôm qua, hôm nay, ngày mai, ngày kia"]}, 
  "8": {"title": "Anh có nhà riêng chưa?", "title_en": "Do you have your own house yet?", "dialogue": "Chào anh Minh. Lâu lắm không gặp. Dạo này anh thế nào?\nTôi khỏe. Còn anh?\nTôi cũng khỏe. Gia đình anh vẫn sống với bố mẹ à?\nVâng. Còn anh, anh đã có nhà riêng chưa?\nChưa. Tôi cũng sống cùng bố mẹ vì nhà rất rộng.\nTốt quá. Anh đã ăn trưa chưa?\nChưa. Tôi chưa ăn.\nTôi cũng chưa ăn. Chúng ta đi ăn đi.\nAnh thích ăn ở đâu?\nTôi biết một nhà hàng gần công ty tôi, rất ngon.\nĐược. Chúng ta đi nhé!", "vocabulary": [{"vn": "lâu", "en": "long time"}, {"vn": "dạo này", "en": "recently"}, {"vn": "vẫn", "en": "still"}, {"vn": "nhà hàng", "en": "restaurant"}, {"vn": "công ty", "en": "company"}, {"vn": "nhà riêng", "en": "private house"}, {"vn": "chưa", "en": "not yet"}, {"vn": "rồi", "en": "already"}, {"vn": "cũng", "en": "also"}, {"vn": "đều", "en": "all"}], "grammar": ["Structure: ... chưa? (Have ... yet?)", "Vẫn, cũng, đều (Still, also, both)", "Difference between 'ở đâu' and 'ở đâu?'"]}, 
  "9": {"title": "Khi rảnh chị thường làm gì?", "title_en": "What do you usually do when free?", "dialogue": "Chị Hoa ơi, khi rảnh chị thường làm gì?\nTôi thường xem phim hoặc đọc sách.\nChị thích xem phim gì?\nTôi thích xem phim hành động. Đặc biệt là phim Hàn Quốc.\nThế à? Tôi cũng thích xem phim lắm.\nChị đã xem phim 'Em là bà nội của anh' bao giờ chưa?\nRồi. Tôi xem rồi. Phim hay quá!\nTôi cũng nghĩ vậy. Thôi, tôi phải về đây.\nHẹn gặp lại chị nhé.", "vocabulary": [{"vn": "rảnh rỗi", "en": "free"}, {"vn": "cơ hội", "en": "opportunity"}, {"vn": "xem", "en": "to watch"}, {"vn": "nghỉ việc", "en": "to quit job"}, {"vn": "đặc biệt là", "en": "especially"}, {"vn": "khoảng", "en": "about"}, {"vn": "phim hành động", "en": "action movie"}, {"vn": "trước khi", "en": "before"}, {"vn": "hy vọng", "en": "to hope"}, {"vn": "tổ chức", "en": "to organize"}, {"vn": "chưa bao giờ", "en": "never"}, {"vn": "liên hoan", "en": "party"}], "grammar": ["Conjunctions: nhưng, nên, cho nên", "Structure: ... bao giờ chưa? (Have you ever...?)", "Bao lâu, bao lâu rồi, bao lâu nữa, lâu chưa", "Adverbs rất, quá, lắm with adjectives", "Structure: chỉ ... thôi (only)"]}, 
  "10": {"title": "Anh đi thẳng đường này", "title_en": "Go straight this way", "dialogue": "Chị ơi! Chị có biết trung tâm 123VIETNAMESE ở đâu không?\nAnh đi thẳng đường này. Đến ngã tư anh rẽ trái, đi khoảng 500m, trung tâm ở bên phải nhé.\nVâng, cảm ơn chị. Ở gần đây có chợ không ạ?\nCó. Chợ gần đây lắm. Anh đi bộ khoảng 5 phút thôi.\nChị tốt bụng quá. Thế từ đây đến hồ Hoàn Kiếm mất bao lâu?\nAnh đi bằng gì ạ?\nBằng taxi.\nVậy khoảng 15 phút.\nVâng. Cảm ơn chị. Chào chị!", "vocabulary": [{"vn": "đi thẳng", "en": "to go straight"}, {"vn": "tốt bụng", "en": "kind"}, {"vn": "đường", "en": "road"}, {"vn": "trung tâm", "en": "center"}, {"vn": "rẽ trái", "en": "to turn left"}, {"vn": "gần", "en": "near"}, {"vn": "bên phải", "en": "on the right"}, {"vn": "chợ", "en": "market"}, {"vn": "đi bộ", "en": "to walk"}, {"vn": "ngã tư", "en": "intersection"}], "grammar": ["Structure: từ ... đến (from ... to)", "A cách B bao xa? (How far from A to B?)", "... bằng gì? (By what transportation?)", "... mất bao lâu? (How long does it take?)", "Khoảng, độ, chừng (approximately)"]}, 
  "11": {"title": "Anh có thể nói tiếng Việt được không?", "title_en": "Can you speak Vietnamese?", "dialogue": "Chào anh Nam.\nChào Peter. Anh có thể nói tiếng Việt được không?\nVâng. Tôi nói được một chút.\nAnh đã học tiếng Việt bao lâu rồi?\n2 năm rồi. Tôi thường tự học tiếng Việt.\nAnh đến Việt Nam để làm gì?\nTôi đến đây vừa để làm việc, vừa để tìm hiểu về văn hóa Việt Nam.\nTôi nghĩ nếu anh muốn tìm hiểu văn hóa, anh có thể đến các bảo tàng.\nÝ kiến của anh hay quá. Tôi sẽ đến khi có thời gian.", "vocabulary": [{"vn": "có thể", "en": "can"}, {"vn": "được", "en": "can"}, {"vn": "nói", "en": "to speak"}, {"vn": "tự", "en": "oneself"}, {"vn": "học", "en": "to study"}, {"vn": "vừa...vừa", "en": "both...and"}], "grammar": ["Ability: có thể, được, có", "Structure: Tự + verb", "Question for purpose: ... làm gì?", "Structure: vừa A vừa B (both A and B)"]}, 
  "12": {"title": "Quyển sách trên bàn", "title_en": "The book on the table", "dialogue": "Chị Mai ơi, chị có biết quyển sách tiếng Việt của em ở đâu không?\nỞ trên bàn, trong phòng khách.\nVâng ạ.\nEm đang học bài bao nhiêu hả Mary?\nEm học xong bài 11 rồi ạ.\nTrong lớp em có học viên người Thái Lan nào không?\nKhông, không có học viên người Thái Lan nào.\nEm nói tiếng Việt rất tốt. Cố gắng nhé.\nVâng. Em cảm ơn chị!", "vocabulary": [{"vn": "trên", "en": "on"}, {"vn": "dưới", "en": "under"}, {"vn": "trong", "en": "in"}, {"vn": "ngoài", "en": "outside"}, {"vn": "giữa", "en": "between"}, {"vn": "cạnh", "en": "next to"}], "grammar": ["Prepositions of place (trên, dưới, trong, ngoài, giữa, cạnh...)", "Structure: có ... nào không? (any...?)", "Negative group: không có, đừng, cấm"]}, 
  "13": {"title": "Cho chúng tôi xem thực đơn", "title_en": "Show us the menu", "dialogue": "Chào anh chị! Anh chị dùng gì ạ?\nCho chúng tôi xem thực đơn.\nVâng. Đây ạ.\nPeter, anh thích ăn món gì?\nMón gì cũng được nhưng tôi rất thích nem rán.\nTôi hiểu rồi. Em ơi, cho chị một đĩa nem rán, một sa lát, hai thịt bò bít tết nhé.\nChị có gọi thêm đồ uống gì không ạ?\nAnh uống gì, Peter?\nCho tôi một Pepsi lạnh.\nCho chị thêm một Pepsi lạnh, một nước chanh nữa nhé.\nAnh chị có muốn dùng tráng miệng không?\nCho chị hai chè sen. Tính tiền cho chị nhé.", "vocabulary": [{"vn": "thực đơn", "en": "menu"}, {"vn": "gọi món", "en": "to order"}, {"vn": "phục vụ", "en": "to serve"}, {"vn": "đồ uống", "en": "drinks"}, {"vn": "món ăn", "en": "dish"}, {"vn": "ngon", "en": "delicious"}], "grammar": ["Ordering in restaurant/hotel", "Structure: ... thêm ... nữa (more ... additional)", "Nào cũng, ai cũng, gì cũng, đâu cũng (all, every)"]}, 
  "14": {"title": "Hôm nay trời nóng và nắng", "title_en": "Today is hot and sunny", "dialogue": "John, anh sống ở Hà Nội lâu chưa?\nHơn một năm rồi.\nAnh thấy thời tiết Hà Nội thế nào?\nHà Nội nhỏ nhưng khá đẹp. Tuy nhiên, tôi sợ mùa hè ở Hà Nội lắm.\nMùa hè ở New York có giống mùa hè ở Hà Nội không?\nMùa hè ở New York khác mùa hè ở Hà Nội. Tôi nghĩ mát hơn.\nHôm nay thời tiết thế nào anh Minh?\nHôm nay trời nắng và nóng, nhiệt độ khoảng 40 độ C.\nNếu không có việc gì thì anh đừng đi ra ngoài.\nCả tôi và vợ tôi đều không thích mùa hè Hà Nội.\nThế trong bốn mùa, anh thích mùa nào nhất?\nTôi thích mùa thu nhất vì trời mát và khô.", "vocabulary": [{"vn": "thời tiết", "en": "weather"}, {"vn": "nóng", "en": "hot"}, {"vn": "nắng", "en": "sunny"}, {"vn": "mát", "en": "cool"}, {"vn": "lạnh", "en": "cold"}, {"vn": "mưa", "en": "rainy"}, {"vn": "gió", "en": "windy"}], "grammar": ["Asking about weather", "Structure: Có A lẫn cả B (both A and B)", "Comparisons: hơn, nhất, bằng, không bằng"]}, 
  "15": {"title": "Cho tôi một phòng đơn", "title_en": "Give me a single room", "dialogue": "Xin chào! Khách sạn Sofitel nghe đây ạ. Tôi có thể giúp gì cho anh?\nVâng. Tôi muốn đặt phòng.\nAnh muốn phòng đơn hay phòng đôi?\nCho tôi một phòng đơn. Trong phòng có đầy đủ tiện nghi chứ?\nVâng, đầy đủ. Anh sẽ ở trong bao lâu ạ?\nTôi ở từ 15 tháng 8 đến 17 tháng 8.\nPhòng đơn là hai triệu đồng một ngày đêm.\nGiá phòng ngày càng đắt phải không chị?\nKhông đắt đâu anh. Giá này đã bao gồm bữa sáng.\nCho tôi hỏi phòng đó có thể nhìn ra hồ được không?\nXin lỗi, phòng đó không nhìn ra hồ nhưng vẫn ngắm thành phố được.\nĐược rồi. 5 ngày nữa tôi sẽ đến.", "vocabulary": [{"vn": "phòng đơn", "en": "single room"}, {"vn": "phòng đôi", "en": "double room"}, {"vn": "khách sạn", "en": "hotel"}, {"vn": "đặt phòng", "en": "to book"}, {"vn": "hủy", "en": "to cancel"}, {"vn": "tiện nghi", "en": "facilities"}], "grammar": ["Structure: thế nào ... cũng / thế nào cũng ...", "Structure: Dù / tuy / mặc dù ... nhưng (although ... but)", "Structure: ngày càng / càng ngày càng (more and more)"]}, 
  "16": {"title": "Hôm nay trông anh có vẻ mệt", "title_en": "Today you look tired", "dialogue": "Anh Hoàng ơi, hôm nay trông anh có vẻ mệt. Anh làm sao thế?\nVâng. Có lẽ tôi bị đau dạ dày.\nThế à? Anh uống thuốc chưa?\nTôi uống rồi. Bây giờ anh cảm thấy thế nào?\nTôi vẫn còn hơi đau.\nThế thì anh nên đi bệnh viện rồi về nhà nghỉ ngơi.\nVâng. Hôm nay tôi phải về sớm thôi.", "vocabulary": [{"vn": "mệt", "en": "tired"}, {"vn": "bị", "en": "to suffer from"}, {"vn": "được", "en": "to receive"}, {"vn": "đau đầu", "en": "headache"}, {"vn": "sốt", "en": "fever"}, {"vn": "ho", "en": "cough"}, {"vn": "khám bệnh", "en": "to examine"}, {"vn": "thuốc", "en": "medicine"}], "grammar": ["Passive structure: bị, được", "Asking about illness", "Passive markers with verbs", "Sau, sau khi, sau đó, trước, trước khi (before, after)"]}
};

const TRANSLATIONS = {
  "1": "Hello sister. Hello brother. Excuse me, what is your name? My name is Peter. What is your name? My name is Yumi. What country are you from? I'm from Japan. What country are you from? I'm from England. Nice to meet you. Nice to meet you too.",
  "2": "Hello sister. My name is Kim. Hello brother. Nice to meet you. My name is Thu. Nice to meet you. Are you Korean? Yes. I'm Korean. What do you do? I'm a teacher. And you? I'm a doctor. Where do you work? I teach at 123VIETNAMESE center. Oh really? I work at Viet Phap hospital.",

  "4": "Hello. How are you today? I'm fine. Thank you. Are you free tomorrow? No, tomorrow I'm not free. What's up? Well, I want to invite you to my new house. Thank you. Tomorrow I'll come. This house is very nice and spacious. Let me introduce, this is the living room, that is the bedroom. You have a beautiful painting! Yes! That's a painting I bought in Thailand.",
  "5": "Brother, show me that hat. Yes. Here you are. Does this hat have other colors? There's yellow and green, sister. Let me try the yellow hat. How much is this hat? 50,000 dong, sister. Too expensive! Discount please! I can't reduce. The price is already very cheap. Well, let me try that shirt. Yes. Brother, do you have a bigger size? There's size M, sister. This shirt costs 250,000 dong. I buy the hat and shirt so you reduce a bit. I can't, sister. I don't bargain. Okay, I'll just take the hat. Thank you, sister!",
  "6": "Sister, what time is it now? It is 8 o'clock in the morning. Thank you. Mr. Nam, what time is the meeting? The meeting is at 9:30. So I have 30 more minutes. What time do you usually go to work? I usually go to work at 7:15. Really? I usually go to work at 7:45. What do you usually do in the evening? I usually watch TV or read books.",
  "7": "Hello. What date is today? Today is October 15th. October already? My birthday is coming soon. When is your birthday? October 20th. Next week. Really? I will give you a cake. You are so talented! Thank you. What was yesterday's date? Yesterday was the 14th. And the day after tomorrow? The day after tomorrow is the 17th.",
  "8": "Hello Minh. Long time no see. How have you been lately? I'm fine. And you? I'm fine too. Does your family still live with your parents? Yes. And you, do you have your own house yet? Not yet. I also live with my parents because the house is very spacious. Great. Have you had lunch yet? Not yet. I haven't eaten. I haven't eaten either. Let's go eat. Where do you like to eat? I know a restaurant near my office, very delicious. Alright. Let's go!",
  "9": "Hoa, what do you usually do when you're free? I usually watch movies or read books. What kind of movies do you like? I like action movies. Especially Korean movies. Really? I love watching movies too. Have you ever seen the movie 'Sweet 20'? Yes. I've seen it. The movie is so good! I think so too. Well, I have to go now. See you again!",
  "10": "Excuse me! Do you know where the 123VIETNAMESE center is? Go straight on this road. At the intersection turn left, go about 500m, the center is on the right. Yes, thank you. Is there a market nearby? Yes. The market is very close. Just 5 minutes on foot. You are so kind. How long does it take from here to Hoan Kiem Lake? How are you going? By taxi. So about 15 minutes. I see. Thank you. Goodbye!",
  "11": "Hello Nam. Hello Peter. Can you speak Vietnamese? Yes. I can speak a little. How long have you been studying Vietnamese? 2 years. I usually self-study Vietnamese. Why did you come to Vietnam? I came here both to work and to explore Vietnamese culture. I think if you want to explore the culture, you can visit the museums. Your idea is great. I will go when I have time.",

// Check if a thematic quiz key matches the current lesson filter
function thMatchesLessonFilter(key) {
  const lessonFilter = state.practiceLesson;
  if (lessonFilter === 'all') return true;
  const scope = state.practiceScope;
  const num = Number(lessonFilter);
  const lessons = state.thLessonMap[key];
  if (!lessons) return true; // unknown = always show
  if (scope === 'single') return lessons.includes(num);
  if (scope === 'up-to') return lessons.some(l => l <= num);
  return true;
}

function shuffleArr(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  function doSpeak() {
    const voices = window.speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    const viVoice = voices.find(v => v.lang && v.lang.startsWith('vi'));
    if (viVoice) { u.lang = viVoice.lang; u.voice = viVoice; }
    else { u.lang = 'vi-VN'; }
    u.onerror = () => {};
    window.speechSynthesis.speak(u);
  }
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { doSpeak(); }
  else {
    window.speechSynthesis.addEventListener('voiceschanged', doSpeak, { once: true });
    setTimeout(() => { if (!window.speechSynthesis.speaking) doSpeak(); }, 500);
  }
}

// Generate fake tone variants of a Vietnamese word (same base, different tones)
function generateToneVariants(viet, base) {
  // Vietnamese tones applied to the main vowel groups
  // We apply different tones to the last syllable's main vowel
  const toneGroups = {
    'a':  ['a','à','á','ả','ã','ạ'],
    'ă':  ['ă','ằ','ắ','ẳ','ẵ','ặ'],
    'â':  ['â','ầ','ấ','ẩ','ẫ','ậ'],
    'e':  ['e','è','é','ẻ','ẽ','ẹ'],
    'ê':  ['ê','ề','ế','ể','ễ','ệ'],
    'i':  ['i','ì','í','ỉ','ĩ','ị'],
    'o':  ['o','ò','ó','ỏ','õ','ọ'],
    'ô':  ['ô','ồ','ố','ổ','ỗ','ộ'],
    'ơ':  ['ơ','ờ','ớ','ở','ỡ','ợ'],
    'u':  ['u','ù','ú','ủ','ũ','ụ'],
    'ư':  ['ư','ừ','ứ','ử','ữ','ự'],
    'y':  ['y','ỳ','ý','ỷ','ỹ','ỵ'],
  };
  // All toned vowels to base vowel map
  const toBase = {};
  for (const [b, variants] of Object.entries(toneGroups)) {
    variants.forEach(v => { toBase[v] = b; });
  }

  // Find which toned vowel(s) are in `viet` and generate 3 variants with different tones
  // Strategy: find the toned vowel in viet, get its base group, pick 3 other tone indices
  const chars = [...viet];
  let toneVowelIdx = -1;
  let toneGroup = null;
  let currentToneIdx = -1;
  // scan last syllable first (work backwards)
  for (let i = chars.length - 1; i >= 0; i--) {
    const b = toBase[chars[i]];
    if (b && toneGroups[b]) {
      toneVowelIdx = i;
      toneGroup = toneGroups[b];
      currentToneIdx = toneGroup.indexOf(chars[i]);
      break;
    }
  }
  if (toneVowelIdx === -1 || toneGroup === null) {
    // No toned vowel found — word has no tone (ngang), pick from base vowel in base string
    for (let i = base.length - 1; i >= 0; i--) {
      const b = base[i];
      if (toneGroups[b]) {
        // Find this char in viet
        toneGroup = toneGroups[b];
        currentToneIdx = 0;
        // Find position in viet
        const vietChars = [...viet];
        for (let j = vietChars.length - 1; j >= 0; j--) {
          if (toBase[vietChars[j]] === b || vietChars[j] === b) { toneVowelIdx = j; break; }
        }
        break;
      }
    }
  }
  if (toneVowelIdx === -1 || !toneGroup) return [viet]; // fallback: no variants possible

  // Generate 3 variants with different tone indices
  const variants = new Set();
  const otherTones = [0,1,2,3,4,5].filter(i => i !== currentToneIdx);
  // pick 3 shuffled
  const picked = shuffleArr(otherTones).slice(0, 3);
  for (const toneIdx of picked) {
    const newViet = [...chars];
    newViet[toneVowelIdx] = toneGroup[toneIdx];
    variants.add(newViet.join(''));
  }
  return shuffleArr([viet, ...variants]);
}
function stripVietnameseTones(str) {
  const map = {
    'à':'a','á':'a','ả':'a','ã':'a','ạ':'a',
    'ầ':'â','ấ':'â','ẩ':'â','ẫ':'â','ậ':'â',
    'ằ':'ă','ắ':'ă','ẳ':'ă','ẵ':'ă','ặ':'ă',
    'è':'e','é':'e','ẻ':'e','ẽ':'e','ẹ':'e',
    'ề':'ê','ế':'ê','ể':'ê','ễ':'ê','ệ':'ê',
    'ì':'i','í':'i','ỉ':'i','ĩ':'i','ị':'i',
    'ò':'o','ó':'o','ỏ':'o','õ':'o','ọ':'o',
    'ồ':'ô','ố':'ô','ổ':'ô','ỗ':'ô','ộ':'ô',
    'ờ':'ơ','ớ':'ơ','ở':'ơ','ỡ':'ơ','ợ':'ơ',
    'ù':'u','ú':'u','ủ':'u','ũ':'u','ụ':'u',
    'ừ':'ư','ứ':'ư','ử':'ư','ữ':'ư','ự':'ư',
    'ỳ':'y','ý':'y','ỷ':'y','ỹ':'y','ỵ':'y',
    'À':'A','Á':'A','Ả':'A','Ã':'A','Ạ':'A',
    'Ầ':'Â','Ấ':'Â','Ẩ':'Â','Ẫ':'Â','Ậ':'Â',
    'Ằ':'Ă','Ắ':'Ă','Ẳ':'Ă','Ẵ':'Ă','Ặ':'Ă',
    'È':'E','É':'E','Ẻ':'E','Ẽ':'E','Ẹ':'E',
    'Ề':'Ê','Ế':'Ê','Ể':'Ê','Ễ':'Ê','Ệ':'Ê',
    'Ì':'I','Í':'I','Ỉ':'I','Ĩ':'I','Ị':'I',
    'Ò':'O','Ó':'O','Ỏ':'O','Õ':'O','Ọ':'O',
    'Ồ':'Ô','Ố':'Ô','Ổ':'Ô','Ỗ':'Ô','Ộ':'Ô',
    'Ờ':'Ơ','Ớ':'Ơ','Ở':'Ơ','Ỡ':'Ơ','Ợ':'Ơ',
    'Ù':'U','Ú':'U','Ủ':'U','Ũ':'U','Ụ':'U',
    'Ừ':'Ư','Ứ':'Ư','Ử':'Ư','Ữ':'Ư','Ự':'Ư',
    'Ỳ':'Y','Ý':'Y','Ỷ':'Y','Ỹ':'Y','Ỵ':'Y'
  };
  return str.split('').map(c => map[c] || c).join('');
}

// Build vocabulary quiz from lessons
function buildVocabQuiz() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  const allVocab = [];
  for (const lessonNum in LESSONS) {
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter), ln = Number(lessonNum);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    LESSONS[lessonNum].vocabulary.forEach(word => allVocab.push({...word}));
  }
  const shuffled = allVocab.sort(() => Math.random() - 0.5);
  const questions = [];
  for (let i = 0; i < Math.min(state.practiceCount, shuffled.length); i++) {
    const correct = shuffled[i];
    if (state.practiceDirection === 'vn-en') {
      const wrongOptions = allVocab.filter(w => w.en !== correct.en).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [...wrongOptions, correct].sort(() => Math.random() - 0.5);
      questions.push({
        question: correct.vn,
        correct: correct.en,
        options: options.map(o => o.en),
        // No phases for VN→EN
        phase: 'single'
      });
    } else {
      // EN→VN: two phases — word (base, no accent) then tone
      const correctBase = stripVietnameseTones(correct.vn);
      const wrongWords = allVocab.filter(w => stripVietnameseTones(w.vn) !== correctBase).sort(() => Math.random() - 0.5).slice(0, 3);
      const wordOptions = shuffleArr([correctBase, ...wrongWords.map(w => stripVietnameseTones(w.vn))]);
      // Tone options: correct + 3 variants with different tones on the same base word
      const toneOptions = generateToneVariants(correct.vn, correctBase);
      questions.push({
        question: correct.en,
        correct: correct.vn,
        correctBase,
        wordOptions,
        toneOptions,
        options: toneOptions, // fallback
        phase: 'word' // starts at word phase
      });
    }
  }
  state.quizQuestions = questions;
  state.currentQuestion = 0; state.score = 0; state.answered = false;
  state.quizPhase = 'word'; state.quizSelectedWord = null; state.selectedAnswer = null;
}

  let filteredQuestions = [...GRAMMAR_QUESTIONS];
  
  if (lessonFilter !== 'all') {
    const num = Number(lessonFilter);
    filteredQuestions = GRAMMAR_QUESTIONS.filter(q => {
      if (scope === 'single') return q.lesson === num;
      if (scope === 'up-to') return q.lesson <= num;
      return true;
    });
  }
  
  if (filteredQuestions.length === 0) {
    // Fallback: use all questions
    filteredQuestions = [...GRAMMAR_QUESTIONS];
  }
  
  const shuffled = filteredQuestions.sort(() => Math.random() - 0.5);
  state.grammarQuestions = shuffled.slice(0, Math.min(state.practiceCount, shuffled.length));
  state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false;
}

function startQuiz(type) {
  state.quizType = type;
  if (type === 'vocab') buildVocabQuiz();
  else if (type === 'audio') {
    state.thView = 'audio';
    state.thDeck = getFilteredAudioQuestions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else if (type === 'conversation') {
    state.thView = 'conversation';
    state.thDeck = getFilteredConvQuestions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else buildGrammarQuiz();
  if (type !== 'audio' && type !== 'conversation') state.view = 'quiz';
  render();
}

// ==================== THEMATIC QUIZ HELPERS ====================
function thInitDeck(words) {
  state.thDeck = shuffleArr(words);
  state.thIndex = 0; state.thScore = 0; state.thPhase = 'word';
  state.thSelected = null; state.thSelectedWord = null; state.thDone = false;
  thSetWordToneOptions();
}

function thSetWordToneOptions() {
  const q = state.thDeck[state.thIndex];
  if (!q) return;
  const allWords = state.thDeck;
  const others = allWords.filter(w => w.viet !== q.viet).sort(() => Math.random() - 0.5).slice(0, 3).map(w => ({viet: w.viet, base: w.base}));
  state.thWordOptions = shuffleArr([{viet: q.viet, base: q.base}, ...others]);
  state.thToneOptions = shuffleArr([...q.toneOptions]);
}

function thSetAdjOptions() {
  const q = state.thDeck[state.thIndex];
  if (!q || !state.thAdjMode) return;
  if (state.thAdjMode === 'viet-to-en') {
    const others = shuffleArr(ADJECTIVES_WORDS.filter(w => w.english !== q.english)).slice(0, 3);
    state.thAdjOptions = shuffleArr([q, ...others]).map(w => w.english);
  } else {
    // en-to-viet: phase 'word' options = base (no accent)
    const others = shuffleArr(ADJECTIVES_WORDS.filter(w => w.base !== q.base)).slice(0, 3);
    state.thAdjOptions = shuffleArr([q, ...others]).map(w => w.base);
    // tone options for phase 2
    state.thToneOptions = shuffleArr([...q.toneOptions]);
  }
}

function thAddMistake(m) {
  const key = m.type + '|' + m.question;
  if (!state.thMistakes.find(x => x.type + '|' + x.question === key)) state.thMistakes.push(m);
}

function thInitReview() {
  state.thReviewDeck = shuffleArr([...state.thMistakes]);
  state.thIndex = 0; state.thScore = 0; state.thDone = false;
  state.thReviewSelected = null;
  thSetReviewOptions();
}

function thSetReviewOptions() {
  const q = state.thReviewDeck[state.thIndex];
  if (!q) return;
  const pool = state.thMistakes.filter(m => m.correct !== q.correct).map(m => m.correct);
  state.thReviewOptions = shuffleArr([q.correct, ...shuffleArr(pool).slice(0, 3)]);
}

function thStartColors(mode) {
  state.colorsMode = mode;
  state.colorsIndex = 0;
  state.colorsScore = 0;
  state.colorsSelected = null;
  state.colorsAnswered = false;
  if (mode === 'tone') {
    state.thDeck = shuffleArr(COLORS_WORDS);
    state.thView = 'colors_tone';
    state.thPhase = 'word';
    state.thSelected = null;
    state.thSelectedWord = null;
    state.thDone = false;
    thSetWordToneOptions();
  } else if (mode === 'match') {
    state.colorsQuestions = shuffleArr([...COLOR_MATCH_QUESTIONS]);
    state.thView = 'colors_match';
  }
  render();
}

// Helper: filter by lesson and scope
function getFilteredAudioQuestions() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  let allQ = [];
  for (const lessonNum in AUDIO_QUESTIONS_BY_LESSON) {
    const ln = Number(lessonNum);
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    AUDIO_QUESTIONS_BY_LESSON[lessonNum].forEach(q => allQ.push({...q, lesson: ln}));
  }
  return shuffleArr(allQ).slice(0, state.practiceCount);
}

function getFilteredConvQuestions() {
  const lessonFilter = state.practiceLesson;
  const scope = state.practiceScope;
  let allQ = [];
  for (const lessonNum in MINI_CONVERSATIONS_BY_LESSON) {
    const ln = Number(lessonNum);
    if (lessonFilter !== 'all') {
      const num = Number(lessonFilter);
      if (scope === 'single' && ln !== num) continue;
      if (scope === 'up-to' && ln > num) continue;
    }
    MINI_CONVERSATIONS_BY_LESSON[lessonNum].forEach(q => allQ.push({...q, lesson: ln}));
  }
  return shuffleArr(allQ).slice(0, state.practiceCount);
}

// Helper to shuffle options for a single question (used in audio and conversation quizzes)
function shuffleQuestionOptions(q) {
  const shuffledOptions = shuffleArr([...q.options]);
  return {
    ...q,
    options: shuffledOptions
  };
}

// Override the getFiltered functions to shuffle options for each question
function getFilteredAudioQuestionsWithShuffledOptions() {
  const questions = getFilteredAudioQuestions();
  return questions.map(q => shuffleQuestionOptions(q));
}

function getFilteredConvQuestionsWithShuffledOptions() {
  const questions = getFilteredConvQuestions();
  return questions.map(q => shuffleQuestionOptions(q));
}

// Update the startQuiz function to use shuffled options
function startQuizWithShuffledOptions(type) {
  state.quizType = type;
  if (type === 'vocab') buildVocabQuiz();
  else if (type === 'audio') {
    state.thView = 'audio';
    state.thDeck = getFilteredAudioQuestionsWithShuffledOptions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else if (type === 'conversation') {
    state.thView = 'conversation';
    state.thDeck = getFilteredConvQuestionsWithShuffledOptions();
    state.thIndex = 0; state.thScore = 0; state.thSelected = null; state.thDone = false;
    state.view = 'thematic';
  } else buildGrammarQuiz();
  if (type !== 'audio' && type !== 'conversation') state.view = 'quiz';
  render();
}

// Override the global startQuiz function
window.startQuiz = startQuizWithShuffledOptions;

// ==================== WORKBOOK RENDER ====================
function renderWorkbookMenu() {
  const lessons = Array.from({length: 16}, (_, i) => i + 1);
  let h = `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>
<h1 style="font-size:1.8rem">📓 Workbook</h1>
<p class="subtitle">Exercises from the 123 Vietnamese Workbook</p>`;
  lessons.forEach(num => {
    const wb = WORKBOOK[String(num)];
    const hasContent = !!wb;
    h += `<button class="lesson-btn" ${hasContent ? `onclick="window.openWorkbookLesson(${num})"` : 'style="opacity:0.4;cursor:not-allowed;"'}>
  <div class="lesson-num" style="${hasContent?'':'background:#444;'}">${num}</div>
  <div style="flex:1;text-align:left">
    <div style="font-weight:600;font-size:1rem;margin-bottom:3px">${hasContent ? LESSONS[num].title : 'Lesson '+num}</div>
    <div style="font-size:0.85rem;color:#7a7570">${hasContent ? wb.exercises.length+' exercises' : 'Coming soon'}</div>
  </div>
  ${hasContent ? '<div style="color:#f0c04a;font-size:1.2rem;">→</div>' : '<div style="color:#444;font-size:0.8rem;">🔒</div>'}
</button>`;
  });
  return h;
}

function renderWorkbookLesson() {
  const wb = WORKBOOK[state.wbLesson];
  if (!wb) return `<button class="back" onclick="window.goToWorkbook()">← Back</button><p>Not available yet.</p>`;
  let h = `<button class="back" onclick="window.goToWorkbook()">← Back</button>
<div style="font-size:1.5rem;font-weight:600;color:#f0c04a;margin-bottom:5px">Lesson ${state.wbLesson} — Workbook</div>
<div style="font-size:1rem;margin-bottom:25px;color:#7a7570">${esc(wb.title)} · ${esc(wb.title_en)}</div>`;

  wb.exercises.forEach((ex, exIdx) => {
    h += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:20px;margin-bottom:18px;">`;
    h += `<div style="font-weight:700;font-size:1rem;color:#f0c04a;margin-bottom:6px;">${esc(ex.title)}</div>`;
    if (ex.instruction) h += `<div style="font-size:0.85rem;color:#7a7570;font-style:italic;margin-bottom:10px;">${esc(ex.instruction)}</div>`;
    if (ex.example) h += `<div style="background:rgba(240,192,74,0.07);border-left:3px solid #f0c04a;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:0.9rem;">${esc(ex.example)}</div>`;

    if (ex.type === 'speaking_prompt') {
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const checked = state.wbChecked;
        h += `<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;font-size:0.95rem;">
          <div style="margin-bottom:${checked?'6px':'0'}">${esc(item)}</div>
          ${checked ? `<div style="color:#5ec97c;font-size:0.85rem;font-style:italic;">${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
      h += `</div>`;
    }

    else if (ex.type === 'question_formation') {
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = (state.wbAnswers[key] || '');
        const checked = state.wbChecked;
        let borderColor = 'rgba(255,255,255,0.09)';
        if (checked) {
          const correct = ex.answers[i];
          // simple similarity check: just show correct
          borderColor = 'rgba(240,192,74,0.4)';
        }
        h += `<div style="margin-bottom:14px;">
          <div style="margin-bottom:6px;font-size:0.9rem;">– <span>${item.answer_sentence}</span></div>
          <input type="text" value="${esc(userVal)}" placeholder="Write your question here…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${borderColor};border-radius:8px;padding:10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked ? `<div style="margin-top:6px;color:#5ec97c;font-size:0.85rem;">✓ ${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
    }

    else if (ex.type === 'matching') {
      const checked = state.wbChecked;
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
        <div><div style="font-weight:600;color:#f0c04a;margin-bottom:8px;text-align:center;">A</div>`;
      ex.columnA.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = ex.answers[i];
        let bg = 'rgba(255,255,255,0.04)';
        if (checked && userVal) bg = userVal === correct ? 'rgba(94,201,124,0.12)' : 'rgba(224,90,90,0.12)';
        h += `<div style="background:${bg};border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.9rem;">
          ${esc(item)}
          <input type="text" value="${esc(userVal)}" placeholder="→ ?" maxlength="1"
            oninput="window.wbSetAnswer('${key}', this.value.toLowerCase())"
            style="width:40px;margin-left:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 6px;color:#f0c04a;font-size:0.9rem;text-align:center;outline:none;">
          ${checked ? `<span style="color:${userVal===correct?'#5ec97c':'#e05a5a'};margin-left:4px;">${userVal===correct?'✓':'✗ '+correct}</span>` : ''}
        </div>`;
      });
      h += `</div><div><div style="font-weight:600;color:#f0c04a;margin-bottom:8px;text-align:center;">B</div>`;
      ex.columnB.forEach(item => {
        h += `<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.9rem;">${esc(item)}</div>`;
      });
      h += `</div></div>`;
    }

    else if (ex.type === 'true_false') {
      h += `<div style="background:rgba(240,192,74,0.06);border:1px solid rgba(240,192,74,0.15);border-radius:10px;padding:14px;margin-bottom:14px;font-size:0.9rem;line-height:1.7;">${esc(ex.passage)}</div>`;
      h += `<table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="text-align:left;padding:8px;color:#7a7570;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);"></th>
          <th style="padding:8px;color:#5ec97c;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);text-align:center;">Đúng</th>
          <th style="padding:8px;color:#e05a5a;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);text-align:center;">Sai</th>
        </tr></thead><tbody>`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = ex.answers[i];
        const checked = state.wbChecked;
        let rowBg = 'transparent';
        if (checked) rowBg = userVal === correct ? 'rgba(94,201,124,0.06)' : 'rgba(224,90,90,0.06)';
        h += `<tr style="background:${rowBg};">
          <td style="padding:10px 8px;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.05);">${i+1}. ${esc(item)}</td>
          <td style="text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
            <input type="radio" name="${key}" value="Đúng" ${userVal==='Đúng'?'checked':''} onchange="window.wbSetAnswer('${key}','Đúng')" style="accent-color:#5ec97c;width:18px;height:18px;">
          </td>
          <td style="text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
            <input type="radio" name="${key}" value="Sai" ${userVal==='Sai'?'checked':''} onchange="window.wbSetAnswer('${key}','Sai')" style="accent-color:#e05a5a;width:18px;height:18px;">
          </td>
        </tr>`;
        if (checked && userVal && userVal !== correct) {
          h += `<tr><td colspan="3" style="padding:0 8px 8px;color:#e05a5a;font-size:0.82rem;">✗ Correct answer: ${correct}</td></tr>`;
        }
      });
      h += `</tbody></table>`;
    }

    else if (ex.type === 'ordering') {
      const checked = state.wbChecked;
      const correctOrder = [7,5,1,6,2,4,3]; // 1-indexed positions
      h += `<p style="font-size:0.85rem;color:#7a7570;margin-bottom:12px;">Write the order number (1 = first) next to each sentence.</p>`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = String(correctOrder[i]);
        let borderColor = 'rgba(255,255,255,0.15)';
        if (checked && userVal) borderColor = userVal === correct ? '#5ec97c' : '#e05a5a';
        h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:28px;height:28px;border:2px dashed rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:#7a7570;">${i+1}</div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;font-size:0.9rem;">${esc(item)}</div>
          <input type="number" min="1" max="${ex.items.length}" value="${esc(userVal)}" placeholder="#"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:52px;background:rgba(255,255,255,0.05);border:2px solid ${borderColor};border-radius:8px;padding:8px;color:#f0c04a;font-size:1rem;text-align:center;outline:none;">
          ${checked && userVal && userVal !== correct ? `<span style="color:#e05a5a;font-size:0.85rem;">→${correct}</span>` : ''}
          ${checked && userVal === correct ? `<span style="color:#5ec97c;">✓</span>` : ''}
        </div>`;
      });
      if (checked) {
        h += `<div style="margin-top:14px;padding:12px;background:rgba(240,192,74,0.08);border-radius:8px;font-size:0.88rem;">
          <div style="color:#f0c04a;font-weight:600;margin-bottom:8px;">✓ Correct order:</div>`;
        // Build ordered list
        const ordered = ex.items.map((item, i) => ({item, pos: correctOrder[i]}))
          .sort((a, b) => a.pos - b.pos);
        ordered.forEach((x, i) => {
          h += `<div style="margin-bottom:4px;">${i+1}. ${esc(x.item)}</div>`;
        });
        h += `</div>`;
      }
    }

    else if (ex.type === 'mcq') {
      ex.questions.forEach((q, qi) => {
        const key = `${ex.id}_${qi}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        h += `<div style="margin-bottom:16px;">
          <div style="font-weight:600;font-size:0.95rem;margin-bottom:8px;">${esc(q.question)}</div>`;
        q.options.forEach(opt => {
          const letter = opt.charAt(0);
          const isSelected = userVal === letter;
          const isCorrect = q.answer === letter;
          let bg = 'rgba(255,255,255,0.04)';
          let border = '1px solid rgba(255,255,255,0.09)';
          if (isSelected && !checked) { bg = 'rgba(240,192,74,0.15)'; border = '1px solid #f0c04a'; }
          if (checked && isCorrect) { bg = 'rgba(94,201,124,0.12)'; border = '1px solid #5ec97c'; }
          if (checked && isSelected && !isCorrect) { bg = 'rgba(224,90,90,0.12)'; border = '1px solid #e05a5a'; }
          h += `<div onclick="window.wbSetAnswer('${key}','${letter}');window.render()"
            style="cursor:pointer;background:${bg};border:${border};border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:0.9rem;display:flex;align-items:center;gap:10px;">
            <span style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;">${letter}</span>
            ${esc(opt.slice(3))}
            ${checked && isCorrect ? '<span style="margin-left:auto;color:#5ec97c;">✓</span>' : ''}
            ${checked && isSelected && !isCorrect ? '<span style="margin-left:auto;color:#e05a5a;">✗</span>' : ''}
          </div>`;
        });
        h += `</div>`;
      });
    }

    else if (ex.type === 'mcq_inline') {
      ex.questions.forEach((q, qi) => {
        const key = `${ex.id}_${qi}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal === q.answer;
        h += `<div style="margin-bottom:14px;">
          <div style="font-size:0.95rem;margin-bottom:8px;">${esc(q.question)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
        q.options.forEach(opt => {
          const isSelected = userVal === opt;
          let bg = 'rgba(255,255,255,0.04)'; let border = '1px solid rgba(255,255,255,0.09)';
          if (isSelected && !checked) { bg = 'rgba(240,192,74,0.15)'; border = '1px solid #f0c04a'; }
          if (checked && opt === q.answer) { bg = 'rgba(94,201,124,0.12)'; border = '1px solid #5ec97c'; }
          if (checked && isSelected && opt !== q.answer) { bg = 'rgba(224,90,90,0.12)'; border = '1px solid #e05a5a'; }
          h += `<div onclick="window.wbSetAnswer('${key}','${opt}');window.render()"
            style="cursor:pointer;background:${bg};border:${border};border-radius:8px;padding:8px 14px;font-size:0.9rem;">${esc(opt)}</div>`;
        });
        h += `</div></div>`;
      });
    }

    else if (ex.type === 'fill_blank_grammar') {
      const cols = ex.items.length > 6 ? 'grid-template-columns:1fr 1fr' : 'grid-template-columns:1fr';
      h += `<div style="display:grid;${cols};gap:10px;">`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal.trim().toLowerCase() === item.answer.toLowerCase();
        let border = 'rgba(255,255,255,0.15)';
        if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
        const displayed = item.sentence.replace('___', `<span style="color:#f0c04a;font-weight:600;">[  ]</span>`);
        h += `<div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;">
          <div style="font-size:0.9rem;margin-bottom:6px;">${displayed}</div>
          <input type="text" value="${esc(userVal)}" placeholder="…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${border};border-radius:6px;padding:6px 10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked && userVal ? `<div style="margin-top:4px;font-size:0.82rem;color:${isCorrect?'#5ec97c':'#e05a5a'};">${isCorrect?'✓':'✗ '+item.answer}</div>` : ''}
        </div>`;
      });
      h += `</div>`;
    }

    else if (ex.type === 'fill_blank_dialogue') {
      ex.dialogues.forEach((dlg, di) => {
        if (dlg.label) h += `<div style="font-weight:600;color:#f0c04a;font-size:0.9rem;margin-bottom:8px;">${esc(dlg.label)}</div>`;
        // Replace each (N)___ with an input
        let html = esc(dlg.text);
        let blankIdx = 0;
        html = html.replace(/\((\d+)\)___/g, (_, num) => {
          const key = `${ex.id}_${di}_${blankIdx}`;
          const answer = dlg.blanks[blankIdx];
          const userVal = state.wbAnswers[key] || '';
          const checked = state.wbChecked;
          const isCorrect = userVal.trim().toLowerCase() === answer.toLowerCase();
          let border = 'rgba(255,255,255,0.3)';
          if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
          const result = `<span style="display:inline-flex;align-items:center;gap:4px;">
            <span style="color:#7a7570;font-size:0.8rem;">(${num})</span>
            <input type="text" value="${esc(userVal)}" placeholder="___"
              oninput="window.wbSetAnswer('${key}', this.value)"
              style="width:80px;background:rgba(255,255,255,0.07);border-bottom:2px solid ${border};border-top:none;border-left:none;border-right:none;padding:2px 4px;color:#e8e4dc;font-size:0.9rem;outline:none;text-align:center;">
            ${checked && userVal ? `<span style="font-size:0.8rem;color:${isCorrect?'#5ec97c':'#e05a5a'};">${isCorrect?'✓':'✗'+answer}</span>` : ''}
          </span>`;
          blankIdx++;
          return result;
        });
        h += `<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:0.92rem;line-height:2.2;">${html}</div>`;
      });
    }

    else if (ex.type === 'word_ordering') {
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal.trim().toLowerCase() === ex.answers[i].toLowerCase();
        let border = 'rgba(255,255,255,0.12)';
        if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
        h += `<div style="margin-bottom:14px;">
          <div style="background:rgba(240,192,74,0.07);border-radius:8px;padding:8px 12px;font-size:0.88rem;color:#c4a84a;margin-bottom:6px;">🔀 ${esc(item)}</div>
          <input type="text" value="${esc(userVal)}" placeholder="Rewrite as a correct sentence…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${border};border-radius:8px;padding:10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked ? `<div style="margin-top:6px;font-size:0.85rem;color:${isCorrect&&userVal?'#5ec97c':'#f0c04a'};">${isCorrect&&userVal?'✓':''} ${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
    }

    else if (ex.type === 'writing_prompt') {
      const key = `${ex.id}_write`;
      const userVal = state.wbAnswers[key] || '';
      h += `<textarea rows="8" placeholder="${esc(ex.placeholder)}"
        oninput="window.wbSetAnswer('${key}', this.value)"
        style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:14px;color:#e8e4dc;font-size:0.95rem;line-height:1.7;outline:none;resize:vertical;">${esc(userVal)}</textarea>
      <div style="font-size:0.82rem;color:#7a7570;margin-top:6px;">Tip : Introduisez les membres, leur âge, leur profession, et ce qu'ils aiment.</div>`;
    }

    // Close exercise card
    h += `</div>`;
  });

  // Global check button
  const allAnswered = wb.exercises.some(ex => ex.type !== 'speaking_prompt');
  h += `<div style="display:flex;gap:10px;margin-top:10px;">
    <button class="big-btn" onclick="window.wbCheckAnswers()" style="flex:1;">${state.wbChecked ? '✓ Answers shown' : '✅ Check Answers'}</button>
    <button class="ghost-btn" onclick="window.wbReset()" style="flex:1;">↺ Reset</button>
  </div>`;

  return h;
}

    <div style="font-weight:600;font-size:1rem;margin-bottom:3px">${esc(l.title)}</div>

  </div>

function renderLesson() {
  const l = LESSONS[state.lesson];
  let h = `<button class="back" onclick="window.goToLessons()">← Back</button>
<div style="font-size:1.5rem;font-weight:600;color:#f0c04a;margin-bottom:5px">Lesson ${state.lesson}</div>
<div style="font-size:1.1rem;margin-bottom:5px">${esc(l.title)}</div>
<div style="font-size:0.95rem;color:#7a7570;margin-bottom:25px">${esc(l.title_en)}</div>

  <button class="tab ${state.tab==='vocabulary'?'active':''}" onclick="window.switchTab('vocabulary')">📖 Vocabulary</button>
  <button class="tab ${state.tab==='grammar'?'active':''}" onclick="window.switchTab('grammar')">📝 Grammar</button>

  else if (state.tab === 'vocabulary') h += renderVocabulary(l);

  return h;
}

function renderDialogue(l) {
  let h = '';
  if (TRANSLATIONS[state.lesson]) {
    h += `<button class="toggle-btn" onclick="window.toggleTranslation()">${state.showTranslation?'Hide':'Show'} Translation</button>`;
  }
  h += '<div class="content">';
  if (l.dialogue) {
    const vocabMap = {};
    l.vocabulary.forEach(w => { vocabMap[w.vn.toLowerCase()] = w.en; });
    l.dialogue.split('\n').forEach(line => {
      if (!line.trim()) return;
      h += '<div class="dialogue-line"><div class="dialogue-text">';
      line.split(' ').forEach(word => {
        const clean = word.replace(/[.,!?]/g,'').toLowerCase();
        const meaning = vocabMap[clean] || GLOBAL_WORD_MAP[clean] || '';
        if (meaning) {
          h += `<span class="word-hover" data-meaning="${esc(meaning)}">${esc(word)}</span> `;
        } else {
          h += `<span>${esc(word)}</span> `;
        }
      });
      h += `</div><button class="audio-btn" onclick="window.speak('${esc(line)}')">🔊</button></div>`;
    });
  }
  h += '</div>';
  if (state.showTranslation && TRANSLATIONS[state.lesson]) {
    h += `<div class="translation">${esc(TRANSLATIONS[state.lesson])}</div>`;
  }
  h += '<p class="hint">💡 Hover over underlined words to see meaning • Click 🔊 to hear pronunciation</p>';
  return h;
}

function renderVocabulary(l) {
  let h = '<div>';
  l.vocabulary.forEach(w => {
    h += `<div class="vocab">
  <div class="vocab-vn"><span>${esc(w.vn)}</span><button class="audio-btn" onclick="window.speak('${esc(w.vn)}')">🔊</button></div>
  <span class="vocab-en">${esc(w.en)}</span>
</div>`;
  });
  return h + '</div>';
}

function renderGrammar(l) {
  const grammar = GRAMMAR_ENHANCED[state.lesson] || l.grammar;
  let h = '<div>';
  grammar.forEach(g => { h += `<div class="grammar">${g}</div>`; });
  return h + '</div>';
}

function renderQuiz() {
  if (state.quizType === 'vocab') {
    if (state.quizQuestions.length === 0) buildVocabQuiz();
    if (state.currentQuestion >= state.quizQuestions.length) {
      return `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>
<div class="quiz-card">
  <h1 style="color:#f0c04a;margin-bottom:20px">🎉 Vocabulary Quiz Complete!</h1>
  <div class="quiz-score">Score: ${state.score} / ${state.quizQuestions.length}</div>
  <div style="margin-top:30px;display:flex;flex-direction:column;gap:15px;">
    <button class="big-btn" onclick="window.restartQuiz()">Try Again</button>
    <button class="ghost-btn" onclick="window.goToMenu()">← Back to Menu</button>
  </div>
</div>`;
    }
    const q = state.quizQuestions[state.currentQuestion];
    // EN→VN two-phase quiz
    if (q.phase !== 'single' && state.practiceDirection === 'en-vn') {
      const phase = state.quizPhase || 'word';
      let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div style="text-align:center;margin-bottom:20px;color:#7a7570">${state.currentQuestion+1} / ${state.quizQuestions.length}</div>
<div class="quiz-card">
  <div class="quiz-question">${esc(q.question)}</div>
  <div class="phase-label">${phase==='word'?'Choose the word (without tones):':'Choose the correct tone:'}</div>
  <div class="quiz-options">`;
      if (phase === 'word') {
        q.wordOptions.forEach(opt => {
          let cls = '';
          if (state.quizSelectedWord) {
            if (opt === q.correctBase) cls = 'correct';
            else if (opt === state.quizSelectedWord) cls = 'wrong';
            else cls = 'disabled';
          }
          h += `<button class="quiz-option ${cls}" onclick="window.vocabWordSelect('${esc(opt)}')" ${state.quizSelectedWord?'disabled':''}>[${esc(opt)}]</button>`;
        });
      } else {

  <span>${state.thIndex+1} / ${state.thDeck.length}</span><span>✓ ${state.thScore}</span>
</div>
<div class="question-box" style="font-size:2rem;">${esc(q.item)}</div>
<div class="option-grid">`;
  q.options.forEach(opt => {
    let cls = '';
    if (state.thSelected) {
      if (opt === q.correct) cls = 'correct';
      else if (opt === state.thSelected) cls = 'wrong';
      else cls = 'disabled';
    }
    h += `<button class="th-option ${cls}" onclick="window.thDirectionsSelect('${esc(opt)}')" ${state.thSelected?'disabled':''}>${esc(opt)}</button>`;
  });
  h += '</div>';
  if (state.thSelected) {
    const ok = state.thSelected === q.correct;
    h += `<div class="explanation-box" style="margin-top:14px;">${ok ? '✓ ' : '✗ '}${esc(q.explanation)}</div>`;
    h += `<button class="big-btn" style="margin-top:16px;" onclick="window.thNext()">${state.thIndex+1>=state.thDeck.length?'See Results →':'Next →'}</button>`;
  }
  return h;
}

function renderWearingQuiz() {
  if (state.thDone) return thDoneScreen('👗 WEARING THINGS');
  const q = state.thDeck[state.thIndex];
  if (!q) return '';
  let h = `<button class="back" onclick="window.thBack()">← Back</button>
<div class="section-title">👗 WEARING THINGS</div>
<div style="text-align:center;margin-bottom:8px;font-size:0.85rem;color:#7a7570;">mặc · đi · đeo · đội</div>
<div style="display:flex;justify-content:space-between;font-size:0.95rem;color:#7a7570;margin-bottom:20px;">
  <span>${state.thIndex+1} / ${state.thDeck.length}</span><span>✓ ${state.thScore}</span>
</div>
<div style="font-size:3.5rem;text-align:center;margin-bottom:10px;">${q.emoji}</div>
<div class="question-box" style="font-size:2rem;">${esc(q.item)}</div>
<div style="text-align:center;color:#7a7570;margin-bottom:20px;font-size:1rem;">${esc(q.translation)}</div>
<div style="text-align:center;color:#e8e4dc;margin-bottom:16px;font-size:1rem;">Which verb to use?</div>
<div class="option-grid-2">`;
  q.options.forEach(opt => {
    let cls = '';
    if (state.thSelected) {
      if (opt === q.correct) cls = 'correct';
      else if (opt === state.thSelected) cls = 'wrong';
      else cls = 'disabled';
    }
    h += `<button class="th-option ${cls}" onclick="window.thWearingSelect('${esc(opt)}')" ${state.thSelected?'disabled':''}>${esc(opt)}</button>`;
  });
  h += '</div>';
  if (state.thSelected) {
    const ok = state.thSelected === q.correct;
    h += `<div class="explanation-box" style="margin-top:14px;">${ok ? '✓ ' : '✗ '}${esc(q.explanation)}</div>`;
    h += `<button class="big-btn" style="margin-top:16px;" onclick="window.thNext()">${state.thIndex+1>=state.thDeck.length?'See Results →':'Next →'}</button>`;
  }
  return h;
}

function renderReviewQuiz() {
  if (state.thDone) return thDoneScreen('📋 REVIEW MISTAKES');
  const q = state.thReviewDeck[state.thIndex];
  if (!q) return `<button class="back" onclick="window.thBack()">← Back</button><p style="text-align:center;color:#7a7570;margin-top:30px;">No mistakes to review!</p>`;
  const typeLabel = {'vocab-word':'Vocabulary','vocab-tone':'Vocabulary (tone)','classifier':'Classifier','adjective':'Adjective','numbers-word':'Numbers','numbers-tone':'Numbers (tone)','demonstratives-word':'Demonstratives','demonstratives-tone':'Demonstratives (tone)'};
  let h = `<button class="back" onclick="window.thBack()">← Back</button>
<div class="section-title">📋 REVIEW MISTAKES</div>
<div style="text-align:center;color:#7a7570;font-size:0.9rem;margin-bottom:16px;">${typeLabel[q.type]||q.type}</div>
<div style="display:flex;justify-content:space-between;font-size:0.95rem;color:#7a7570;margin-bottom:20px;">
  <span>${state.thIndex+1} / ${state.thReviewDeck.length}</span><span>✓ ${state.thScore}</span>
</div>
<div class="question-box">${esc(q.question)}</div>
<div class="option-grid">`;
  state.thReviewOptions.forEach(opt => {
    let cls = '';
    if (state.thReviewSelected) {
      if (opt === q.correct) cls = 'correct';
      else if (opt === state.thReviewSelected) cls = 'wrong';
      else cls = 'disabled';
    }
    h += `<button class="th-option ${cls}" onclick="window.thReviewSelect('${esc(opt)}')">${esc(opt)}</button>`;
  });
  h += '</div>';
  if (state.thReviewSelected) {
    h += `<button class="big-btn" style="margin-top:16px;" onclick="window.thReviewNext()">${state.thIndex+1>=state.thReviewDeck.length?'See Results →':'Next →'}</button>`;
  }
  return h;
}

function renderMistakesList() {
  const mc = state.thMistakes.length;
  let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div class="section-title">📋 MISTAKES LIST</div>
<p style="text-align:center;color:#7a7570;font-size:0.9rem;margin-bottom:20px;">Uncheck to dismiss a mistake permanently</p>`;
  if (mc === 0) {
    h += `<p style="text-align:center;color:#5ec97c;margin-top:30px;">✓ No mistakes saved!</p>`;
    return h;
  }
  state.thMistakes.forEach((m, i) => {
    h += `<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:14px;margin-bottom:10px;">
      <input type="checkbox" checked id="mk_${i}" onchange="window.dismissMistake(${i})" style="width:20px;height:20px;cursor:pointer;accent-color:#f0c04a;">
      <div style="flex:1;">
        <div style="color:#f0c04a;font-weight:600;font-size:1rem;">${esc(m.question)}</div>
        <div style="color:#7a7570;font-size:0.85rem;margin-top:3px;">Correct: <span style="color:#5ec97c;">${esc(m.correct)}</span> · Your answer: <span style="color:#e05a5a;">${esc(m.userAnswer)}</span></div>
        <div style="color:#555;font-size:0.75rem;margin-top:2px;">${esc(m.type)}</div>
      </div>
    </div>`;
  });
  h += `<button class="ghost-btn" style="margin-top:10px;" onclick="window.clearAllMistakes()">🗑️ Clear all mistakes</button>`;
  return h;
}

function thDoneScreen(title) {
  const total = state.thView === 'review' ? state.thReviewDeck.length : state.thDeck.length;
  const pct = total > 0 ? Math.round(state.thScore/total*100) : 0;
  const emoji = pct>=80?'🏆':pct>=50?'👏':'📖';
  return `<button class="back" onclick="window.thBack()">← Back</button>
<div class="quiz-card" style="text-align:center;">
  <div class="section-title">${title} — DONE</div>
  <div style="font-size:3rem;margin-bottom:10px;">${emoji}</div>
  <div class="result-score">${state.thScore}/${total} (${pct}%)</div>
  <button class="big-btn" onclick="window.thRestart()">↺ Play Again</button>
  <button class="ghost-btn" onclick="window.thBack()">← Back to Practice</button>
</div>`;
}

// ==================== EVENT HANDLERS ====================
window.speak = speak;
window.goToMistakesList = () => { state.view = 'mistakesList'; render(); };
window.dismissMistake = (i) => {
  state.thMistakes.splice(i, 1);
  render();
};
window.clearAllMistakes = () => {
  state.thMistakes = [];
  render();
};
window.goToMenu = () => { state.view = 'menu'; render(); };
window.goToLessons = () => { state.view = 'lessons'; render(); };
window.goToThematic = () => { state.view = 'menu'; render(); };
window.goToWorkbook = () => { state.view = 'workbook'; render(); };
window.openWorkbookLesson = (n) => { state.view = 'workbookLesson'; state.wbLesson = String(n); state.wbAnswers = {}; state.wbChecked = false; render(); };
window.wbSetAnswer = (key, val) => { state.wbAnswers[key] = val; };
window.wbCheckAnswers = () => { state.wbChecked = true; render(); };
window.wbReset = () => { state.wbAnswers = {}; state.wbChecked = false; render(); };
window.render = render;
window.openLesson = (n) => { state.view = 'lesson'; state.lesson = String(n); state.tab = 'dialogue'; state.showTranslation = false; render(); };
window.switchTab = (t) => { state.tab = t; render(); };
window.toggleTranslation = () => { state.showTranslation = !state.showTranslation; render(); };
window.setPracticeLesson = (v) => { state.practiceLesson = v; render(); };
window.setPracticeScope = (v) => { state.practiceScope = v; render(); };
window.setPracticeDirection = (v) => { state.practiceDirection = v; render(); };
window.setPracticeCount = (v) => { state.practiceCount = parseInt(v); render(); };
window.vocabWordSelect = (base) => {
  if (state.quizSelectedWord) return;
  state.quizSelectedWord = base;
  render();
  setTimeout(() => { state.quizPhase = 'tone'; render(); }, 800);
};
window.answerVocabQuiz = (answer) => {
  if (state.answered) return;
  state.answered = true;
  state.selectedAnswer = answer;
  if (answer === state.quizQuestions[state.currentQuestion].correct) state.score++;
  render();
  setTimeout(() => {
    state.currentQuestion++;
    state.answered = false;
    state.quizPhase = 'word';
    state.quizSelectedWord = null;
    state.selectedAnswer = null;
    render();
  }, 1200);
};
window.answerGrammarQuiz = (answer) => {
  if (state.grammarAnswered) return;
  state.grammarAnswered = true;
  state.grammarSelectedAnswer = answer;
  if (answer === state.grammarQuestions[state.grammarCurrent].correct) state.grammarScore++;
  render();
  setTimeout(() => { state.grammarCurrent++; state.grammarAnswered = false; render(); }, 1200);
};
window.restartQuiz = () => {
  if (state.quizType === 'vocab') { buildVocabQuiz(); state.currentQuestion = 0; state.score = 0; state.answered = false; state.quizPhase = 'word'; state.quizSelectedWord = null; state.selectedAnswer = null; render(); }
  else { buildGrammarQuiz(); state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false; render(); }
};
window.restartGrammarQuiz = () => { buildGrammarQuiz(); state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false; render(); };

// Thematic handlers

window.thGenericSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  const ok = Array.isArray(q.correct) ? q.correct.includes(opt) : q.correct === opt;
  if (ok) state.thScore++;
  render();
};

window.thStart = (key) => {
  state.view = 'thematic';
  state.thView = key;
  state.thAdjMode = null; state.thDone = false;
  state.thSelected = null; state.thSelectedWord = null;
  state.thScore = 0; state.thIndex = 0;
  if (key === 'vocab') thInitDeck(VOCABULARY_WORDS);
  else if (key === 'numbers') thInitDeck(NUMBERS_WORDS);
  else if (key === 'demonstratives') thInitDeck(DEMONSTRATIVES_WORDS);
  else if (key === 'time') thInitDeck(TIME_WORDS);
  else if (key === 'weather') thInitDeck(WEATHER_WORDS);
  else if (key === 'family') thInitDeck(FAMILY_WORDS);
  else if (key === 'food') thInitDeck(FOOD_WORDS);
  else if (key === 'classifiers') { state.thDeck = shuffleArr(CLASSIFIERS_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'adjectives') { state.thDeck = shuffleArr(ADJECTIVES_WORDS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'thisthat_context') { state.thDeck = shuffleArr(THIS_THAT_CONTEXT); }
  else if (key === 'audio') { state.thDeck = getFilteredAudioQuestionsWithShuffledOptions(); }
  else if (key === 'conversation') { state.thDeck = getFilteredConvQuestionsWithShuffledOptions(); }
  else if (key === 'directions') { state.thDeck = shuffleArr(DIRECTIONS_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'wearing') { state.thDeck = shuffleArr(WEARING_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'review') { thInitReview(); }
  render();
};

window.thStartColors = (mode) => {
  state.view = 'thematic';
  if (mode === 'tone') {
    state.thView = 'colors_tone';
    state.thDeck = shuffleArr(COLORS_WORDS);
    state.thIndex = 0; state.thScore = 0; state.thPhase = 'word';
    state.thSelected = null; state.thSelectedWord = null; state.thDone = false;
    thSetWordToneOptions();
    render();
  } else if (mode === 'match') {
    state.thView = 'colors_match';
    state.colorsMode = 'match';
    state.colorsQuestions = shuffleArr([...COLOR_MATCH_QUESTIONS]);
    state.colorsIndex = 0;
    state.colorsScore = 0;
    state.colorsSelected = null;
    state.colorsAnswered = false;
    render();
  }
};

window.answerColorsMatch = (answer) => {
  if (state.colorsAnswered) return;
  state.colorsAnswered = true;
  state.colorsSelected = answer;
  const q = state.colorsQuestions[state.colorsIndex];
  if (answer === q.correct) state.colorsScore++;
  render();
};

window.nextColorsMatch = () => {
  state.colorsIndex++;
  state.colorsSelected = null;
  state.colorsAnswered = false;
  render();
};

window.thDirectionsSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) state.thScore++;
  else thAddMistake({type:'directions', question: q.item+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thWearingSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) state.thScore++;
  else thAddMistake({type:'wearing', question: q.item+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thBack = () => {
  state.view = 'menu';
  state.thView = 'menu';
  render();
};

window.thRestart = () => {
  const key = state.thView;
  window.thStart(key);
};

window.thAdjSetMode = (mode) => {
  state.thAdjMode = mode;
  state.thDone = false; state.thIndex = 0; state.thScore = 0;
  state.thSelected = null; state.thSelectedWord = null; state.thPhase = 'word';
  state.thDeck = shuffleArr(ADJECTIVES_WORDS);
  thSetAdjOptions();
  render();
};

window.thAdjWordSelect = (base) => {
  if (state.thSelectedWord) return;
  state.thSelectedWord = base;
  const q = state.thDeck[state.thIndex];
  if (base !== q.base) thAddMistake({type:'adjective-word', question: q.english, correct: q.viet, userAnswer: base});
  render();
  setTimeout(() => { state.thPhase = 'tone'; render(); }, 800);
};

window.thAdjToneSelect = (tone) => {
  if (state.thSelected) return;
  state.thSelected = tone;
  const q = state.thDeck[state.thIndex];
  if (tone === q.viet) state.thScore++;
  else thAddMistake({type:'adjective-tone', question: q.english, correct: q.viet, userAnswer: tone});
  render();
};

window.thWordSelect = (viet) => {
  if (state.thSelectedWord) return;
  state.thSelectedWord = viet;
  const q = state.thDeck[state.thIndex];
  if (viet !== q.viet) thAddMistake({type: state.thView+'-word', question: q.en, correct: q.viet, userAnswer: viet});
  render();
  setTimeout(() => { state.thPhase = 'tone'; render(); }, 800);
};

window.thToneSelect = (tone) => {
  if (state.thSelected) return;
  state.thSelected = tone;
  const q = state.thDeck[state.thIndex];
  if (tone === q.viet) state.thScore++;
  else thAddMistake({type: state.thView+'-tone', question: q.en, correct: q.viet, userAnswer: tone});
  render();
};

window.thNext = () => {
  if (state.thIndex + 1 >= state.thDeck.length) { state.thDone = true; render(); return; }
  state.thIndex++;
  state.thSelected = null;
  state.thSelectedWord = null;
  state.thPhase = 'word';

  if (['vocab','numbers','demonstratives','colors_tone','time','weather','family','food'].includes(state.thView)) {
    thSetWordToneOptions();
  } else if (state.thView === 'adjectives') {
    thSetAdjOptions();
  }
  render();
};

window.thClassSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) state.thScore++;
  else thAddMistake({type:'classifier', question: q.word+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thAdjSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  const correct = state.thAdjMode === 'viet-to-en' ? q.english : q.viet;
  if (opt === correct) state.thScore++;
  else thAddMistake({type:'adjective', question: state.thAdjMode==='viet-to-en'?q.viet:q.english, correct: correct, userAnswer: opt});
  render();
};

window.thReviewSelect = (opt) => {
  if (state.thReviewSelected) return;
  state.thReviewSelected = opt;
  const q = state.thReviewDeck[state.thIndex];
  if (opt === q.correct) {
    state.thScore++;
    // Mistakes remain until manually dismissed by user
  }
  render();
};

window.thReviewNext = () => {
  if (state.thIndex + 1 >= state.thReviewDeck.length) { state.thDone = true; render(); return; }
  state.thIndex++;
  state.thReviewSelected = null;
  thSetReviewOptions();
  render();
};

render();
})();
  </script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(registration => {
        console.log('✅ Service Worker registered:', registration.scope);
      })
      .catch(error => {
        console.log('❌ SW registration failed:', error);
      });
  });
}
</script>
</body>
</html>
