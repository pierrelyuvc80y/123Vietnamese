      { id:"l14ex1", type:"matching", title:"Bài 1. Nối các kiểu thời tiết và mùa với tranh tương ứng:", instruction:"(Match the words about kinds of weather and seasons with the correct pictures — Mẫu: 1-g)", columnA:["1. nhiều mây","2. nắng","3. mùa xuân","4. mùa thu","5. mưa","6. bão","7. mùa đông","8. mùa hè","9. tuyết","10. nóng"], columnB:["a. hình ảnh mùa xuân (hoa anh đào)","b. hình ảnh bãi biển nắng","c. hình ảnh mùa thu (lá đỏ)","d. hình ảnh mưa","e. hình ảnh mùa đông (tuyết)","g. hình ảnh nhiều mây (bầu trời xanh)","h. hình ảnh trẻ em chơi tuyết","i. hình ảnh mặt trời","k. hình ảnh bão","l. hình ảnh người nóng"], answers:["g","i","a","c","d","k","h","b","e","l"] },
      { id:"l14ex2", type:"question_formation", title:"Bài 2. Trả lời các câu hỏi sau:", instruction:"(Answer the following questions)", example:"", items:[{answer_sentence:"1. Trong gia đình bạn, ai là người cao nhất?",hint:""},{answer_sentence:"2. Trong một năm, bạn thích mùa nào nhất?",hint:""},{answer_sentence:"3. Thời tiết ở nước bạn hay ở Việt Nam dễ chịu hơn?",hint:""},{answer_sentence:"4. Ở nước bạn, mùa hè và mùa xuân, mùa nào mọi người đi du lịch nhiều hơn?",hint:""},{answer_sentence:"5. Ở nước bạn, một năm có mấy mùa? Mùa nào lạnh nhất? Mùa nào nóng nhất?",hint:""},{answer_sentence:"6. Ở Hà Nội, bạn thích mùa nào nhất? Không thích mùa nào nhất?",hint:""},{answer_sentence:"7. Bạn thích đi du lịch ở biển hơn hay ở núi hơn?",hint:""},{answer_sentence:"8. Bây giờ, bạn thích làm gì nhất?",hint:""}], answers:["(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)","(Personal answer)"] },
      { id:"l14ex3", type:"word_ordering", title:'Bài 3. Dùng cấu trúc "cả...lẫn" để viết lại các câu sau:', instruction:'(Use the structure "cả...lẫn" to rewrite the sentences)', items:["1. Con gái Hà Nội hiền. Con gái Sài Gòn cũng hiền.","2. Người Thái Lan thích ăn cay. Người Hàn cũng thích ăn cay.","3. Nhiều người nước ngoài thích ăn phở và bún chả.","4. Vợ anh ấy gầy. Anh ấy cũng gầy.","5. Tôi thích uống trà và cà phê.","6. Chị Maya có thể nói tiếng Anh và tiếng Pháp.","7. Tivi của hãng Samsung tốt và bền. Tivi của Sony cũng vậy.","8. Tôi không thích chó và mèo."], answers:["Cả con gái Hà Nội lẫn con gái Sài Gòn đều hiền.","Cả người Thái Lan lẫn người Hàn đều thích ăn cay.","Nhiều người nước ngoài thích ăn cả phở lẫn bún chả.","Cả vợ lẫn chồng đều gầy.","Tôi thích uống cả trà lẫn cà phê.","Chị Maya có thể nói cả tiếng Anh lẫn tiếng Pháp.","Cả tivi Samsung lẫn tivi Sony đều tốt và bền.","Tôi không thích cả chó lẫn mèo."] },
      { id:"l14ex4", type:"word_ordering", title:'Bài 4. Dùng các từ so sánh "bằng/hơn/nhất" để viết lại các câu sau:', instruction:'(Use the word "bằng/hơn/nhất" to rewrite the sentences)', items:["1. Sách tiếng Anh dày 69 trang. Sách tiếng Nhật dày 156 trang.","2. Hôm nay nhiệt độ Hà Nội là 6°C. Ngày mai nhiệt độ Hà Nội là 12°C.","3. Tôi cao 1m75. Anh trai tôi cao 1m75.","4. Nho Mỹ 350.000đ/kg. Nho Úc 450.000đ/kg. Nho Việt Nam 75.000đ/kg.","5. Ở Hà Nội bây giờ là 4 giờ. Ở Băng Cốc bây giờ cũng là 4 giờ.","6. Hành lý của tôi nặng 7kg. Hành lý của anh ấy nặng 12kg. Hành lý của chị ấy nặng 9kg.","7. Cái bàn màu đen dài 2 mét. Cái bàn màu nâu dài 1,5 mét."], answers:["Sách tiếng Nhật dày hơn sách tiếng Anh.","Ngày mai nhiệt độ Hà Nội cao hơn hôm nay.","Tôi cao bằng anh trai tôi.","Nho Việt Nam rẻ nhất. Nho Úc đắt nhất.","Giờ ở Hà Nội bằng giờ ở Băng Cốc.","Hành lý của anh ấy nặng nhất.","Cái bàn màu đen dài hơn cái bàn màu nâu."] },
      { id:"l14ex5", type:"word_ordering", title:'Bài 5. Dùng cấu trúc "giống/giống nhau/khác/khác nhau" để viết lại các câu sau:', instruction:'(Use the structure "giống/giống nhau/khác/khác nhau" to rewrite the sentences)', items:["1. Tôi thích ăn cay còn người yêu tôi thích ăn ngọt.","2. Anh ấy thích uống bia 333. Em trai anh ấy thích bia Hà Nội.","3. Hà Nội có 4 mùa nhưng thành phố Hồ Chí Minh chỉ có 2 mùa.","4. Buổi sáng tôi luôn luôn thích ăn phở còn anh ấy chỉ thích ăn bún.","5. Tóc cô ấy màu nâu. Tóc em gái cô ấy màu đỏ.","6. Ông Minh thích đi máy bay nhưng vợ ông ấy thích đi tàu."], answers:["Tôi và người yêu tôi khác nhau về sở thích ăn uống.","Anh ấy và em trai không uống bia giống nhau.","Hà Nội và thành phố Hồ Chí Minh khác nhau về số mùa.","Tôi và anh ấy khác nhau về sở thích bữa sáng.","Tóc cô ấy và tóc em gái khác nhau về màu sắc.","Ông Minh và vợ khác nhau về phương tiện đi lại."] },
      { id:"l14ex6", type:"word_ordering", title:"Bài 6. Sắp xếp các từ sau thành câu đúng:", instruction:"(Arrange the given words to make meaningful sentences)", items:["1. ghét / Hà Nội / vì / có / tôi / mùa xuân / ở / mưa phùn / .","2. giá phòng / khách sạn / khác / giá phòng / khách sạn / kia / này / .","3. trời / đi / biển / nắng / và / nóng / nên / vì / gia đình / tôi / .","4. con mèo / hơn / con mèo / này / kia / béo / .","5. trong / dễ tính / gia đình / mẹ / em / nhất / .","6. màu mắt / chị / màu mắt / giống / mẹ / không / ?","7. và / Thùy / cả / muốn / đi du lịch / Thu / ở / Đà Nẵng / đều / .","8. cái áo / của / đắt / của / cái áo / tôi / bằng / anh Hải / ."], answers:["Tôi ghét mùa xuân ở Hà Nội vì có mưa phùn.","Giá phòng khách sạn này khác giá phòng khách sạn kia.","Vì trời nắng và nóng nên gia đình tôi đi biển.","Con mèo này béo hơn con mèo kia.","Mẹ em dễ tính nhất trong gia đình.","Màu mắt chị có giống màu mắt mẹ không?","Cả Thùy và Thu đều muốn đi du lịch ở Đà Nẵng.","Cái áo của tôi đắt bằng cái áo của anh Hải."] },
      { id:"l14ex7", type:"true_false", title:"Bài 7. Đọc và chọn đúng hoặc sai cho mỗi câu sau:", instruction:"(Read the following paragraph and choose the sentences are true or false)", passage:"Xin chào quý vị và các bạn. Sáng sớm hôm nay, một số tỉnh miền Bắc và thủ đô Hà Nội vẫn có sương mù. Gió đông nam thổi mạnh, nhiệt độ khoảng 18 độ, trời rét nhẹ. Tuy nhiên, đến trưa nắng sẽ xuất hiện trở lại, nhiệt độ tăng lên 2 độ. Từ Thanh Hóa đến Thừa Thiên Huế buổi trưa và chiều trời có nắng, ấm, nhiệt độ tăng nhẹ từ 24 đến 27 độ. Từ Đà Nẵng đến Nha Trang mặc dù nắng nhiều nhưng trời vẫn mát mẻ, nhiệt độ khoảng 30 độ. Ở Nam Bộ, nắng và nóng ngày càng tăng. Dự báo nhiệt độ ở đây đều từ 32 đến 34 độ. Ở thành phố Hồ Chí Minh, nhiều nơi nhiệt độ là 35 độ.", items:["1. Vào sáng sớm hôm nay, Hà Nội vẫn có sương mù.","2. Thời tiết một vài các tỉnh miền Bắc buổi sáng hơi rét, nhiệt độ 28 độ.","3. Thủ đô Hà Nội nhiệt độ cao nhất chỉ 16 độ.","4. Ở Huế, buổi chiều trời sẽ có nắng, nhiệt độ tăng lên.","5. Khu vực Nam Bộ nhiệt độ tăng cao, càng ngày càng nắng nóng."], answers:["Đúng","Sai","Sai","Đúng","Đúng"] }
    ]
  },
  "15": {
    title: "Cho chúng tôi một phòng đơn",
    title_en: "Give us a single room",
    exercises: [
      { id:"l15ex1", type:"word_ordering", title:'Bài 1. Dùng cấu trúc "thế nào... cũng" để đặt câu theo mẫu:', instruction:'(Use the structure "thế nào...cũng" to rewrite the sentences)', items:["1. mưa","2. chia tay","3. đỗ đại học","4. đi du lịch","5. bị công an phạt vì không đội mũ bảo hiểm","6. kinh tế Việt Nam phát triển vì có nhiều vốn đầu tư nước ngoài","7. mua nhà"], answers:["Thế nào hè này tôi cũng mưa (trời cũng mưa).","Thế nào tôi cũng chia tay anh ấy.","Thế nào con cũng đỗ đại học.","Thế nào hè này tôi cũng đi du lịch.","Thế nào anh ấy cũng bị công an phạt vì không đội mũ bảo hiểm.","Thế nào kinh tế Việt Nam cũng phát triển.","Thế nào năm nay tôi cũng mua nhà."] },
      { id:"l15ex2", type:"matching", title:'Bài 2. Nối các từ/cụm từ ở cột A với từ và cụm từ ở cột B, sau đó dùng kết cấu "càng ngày càng"/"ngày càng" để thực hành nói theo mẫu:', instruction:'(Match A with B and practice speaking with "càng ngày càng"/"ngày càng")', columnA:["1. Thời tiết","2. Đường phố Hà Nội","3. Gia đình cô ấy","4. Chị ấy","5. Anh ấy nói tiếng Việt","6. Xe máy ở Việt Nam","7. Công ty Nhật","8. Siêu thị mở cửa"], columnB:["a. đông","b. muộn","c. giỏi","d. nóng","e. rẻ","f. xinh gái","g. giàu","h. có nhiều nhân viên Việt Nam"], answers:["d","a","g","f","c","e","h","b"] },
      { id:"l15ex3", type:"word_ordering", title:'Bài 3. Dùng cấu trúc "tuy/mặc dù...nhưng...vẫn" để viết lại câu theo mẫu:', instruction:'(Use the structure "tuy/mặc dù...nhưng...vẫn" to rewrite the sentences)', items:["1. Em ấy cố gắng học. Em ấy thi trượt kỳ thi IELTS.","2. Anh ấy học giỏi. Anh ấy khiêm tốn.","3. Tôi nhắc anh ấy đi học. Anh ấy quên.","4. Nhà hàng này đắt. Đồ ăn không ngon.","5. Cô ấy ăn rất nhiều. Cô ấy gầy.","6. Nhà tôi không rộng. Nhà tôi đẹp.","7. Cô Lan rất mệt. Cô ấy đi dạy.","8. Con tôi bị sốt. Nó đi bơi."], answers:["Mặc dù em ấy cố gắng học nhưng vẫn thi trượt kỳ thi IELTS.","Tuy anh ấy học giỏi nhưng vẫn khiêm tốn.","Mặc dù tôi nhắc anh ấy đi học nhưng anh ấy vẫn quên.","Mặc dù nhà hàng này đắt nhưng đồ ăn vẫn không ngon.","Mặc dù cô ấy ăn rất nhiều nhưng vẫn gầy.","Tuy nhà tôi không rộng nhưng vẫn đẹp.","Mặc dù cô Lan rất mệt nhưng vẫn đi dạy.","Mặc dù con tôi bị sốt nhưng vẫn đi bơi."] },
      { id:"l15ex4", type:"mcq_inline", title:"Bài 4. Chọn đáp án đúng cho những câu sau:", instruction:"(Choose the correct answers)", questions:[{question:"1. Tuy trời không đẹp nhưng tôi ___ đi chơi.",options:["cũng","vừa","đều","vẫn"],answer:"vẫn"},{question:"2. Tôi vẫn đến dự đám cưới anh ấy ___ bận.",options:["khi","nếu","dù","không"],answer:"dù"},{question:"3. Em ấy ___ lười.",options:["ngày càng","càng","ngày","càng ngày"],answer:"ngày càng"},{question:"4. Tôi rất bận nhưng ___ tôi cũng đến dự sinh nhật anh.",options:["thế","khi nào","thế nào","thế nào cũng"],answer:"thế nào"},{question:"5. Chị ơi, tôi muốn đặt phòng ___ hai người.",options:["cho","cùng","với","về"],answer:"cho"},{question:"6. ___ em hỏi khách sạn còn phòng không?",options:["cho","cùng","với","để"],answer:"để"},{question:"7. Em ấy ___ đi Ấn Độ tháng sau.",options:["thế nào","đã","thế nào cũng","b & c đúng"],answer:"thế nào cũng"},{question:"8. Phòng có ___ tiện nghi không hả chị?",options:["hết","mất","đủ","được"],answer:"đủ"},{question:"9. Khách sạn ___ phòng rồi phải không hả chị?",options:["hết","không","hơn","được"],answer:"hết"},{question:"10. Chồng em ___ đi làm về muộn.",options:["cùng","càng ngày càng","và","sắp"],answer:"càng ngày càng"}] },
      { id:"l15ex5", type:"question_formation", title:"Bài 5. Hoàn thành các câu sau:", instruction:"(Complete the following sentences)", example:"", items:[{answer_sentence:"1. Tuy anh ấy học chăm chỉ...",hint:""},{answer_sentence:"2. Mặc dù anh ấy có nhiều tiền...",hint:""},{answer_sentence:"3. Tuy cô ấy ăn nhiều...",hint:""},{answer_sentence:"4. Mặc dù anh ấy nghèo...",hint:""},{answer_sentence:"5. Dù trời mưa...",hint:""},{answer_sentence:"6. Dù bố mẹ anh ấy phản đối...",hint:""},{answer_sentence:"7. Mặc dù công ty trả lương cao cho cô ấy...",hint:""}], answers:["...nhưng anh ấy vẫn không hiểu bài.","...nhưng anh ấy vẫn không hạnh phúc.","...nhưng cô ấy vẫn gầy.","...nhưng anh ấy vẫn hạnh phúc.","...tôi vẫn đi làm.","...anh ấy vẫn cưới cô ấy.","...cô ấy vẫn xin nghỉ việc."] },
      { id:"l15ex6", type:"question_formation", title:"Bài 6. Sửa lỗi sai của các câu sau:", instruction:"(Correct the following sentences)", example:"", items:[{answer_sentence:"1. Trên phòng có không điều hòa?",hint:""},{answer_sentence:"2. Thế nào cũng tôi đưa nó tiền.",hint:""},{answer_sentence:"3. Chị muốn phòng loại nào không?",hint:""},{answer_sentence:"4. Mặc dù phòng khách sạn đắt nên anh ấy vẫn thuê 5 ngày.",hint:""},{answer_sentence:"5. Chị giữ phòng cho em không được?",hint:""},{answer_sentence:"6. Giá phòng đã bao gồm ăn sáng?",hint:""},{answer_sentence:"7. Dù không uống được rượu nên cô ấy vẫn uống.",hint:""},{answer_sentence:"8. Vì không có thời gian nhưng tôi vẫn đến thăm anh ấy.",hint:""}], answers:["Trong phòng có điều hòa không?","Thế nào tôi cũng đưa nó tiền.","Chị muốn phòng loại nào?","Mặc dù phòng khách sạn đắt nhưng anh ấy vẫn thuê 5 ngày.","Chị có thể giữ phòng cho em không?","Giá phòng đã bao gồm ăn sáng chưa?","Dù không uống được rượu nhưng cô ấy vẫn uống.","Mặc dù không có thời gian nhưng tôi vẫn đến thăm anh ấy."] },
      { id:"l15ex7", type:"ordering", title:"Bài 7. Nghe và sắp xếp lại các câu sau thành đoạn hội thoại đúng:", instruction:"(Listen and rearrange the following sentences in correct order — hotel booking call)", items:["Anh ơi, phòng đơn là 500.000 đồng một ngày.","Vâng, anh muốn phòng đơn hay phòng đôi?","Phòng đơn chị nhé.","Cho tôi hỏi điện thoại trong phòng có thể gọi đi quốc tế không?","Xin chào. Tôi là Minh. Tôi muốn đặt phòng.","Vâng, anh sẽ ở trong bao lâu ạ?","Có rồi anh ạ.","4 ngày từ 20 đến 23 tháng này. Chị ơi giá phòng thế nào?","Tốt rồi. Cảm ơn chị. Nhớ giữ phòng cho tôi nhé.","Alo. Khách sạn Hòa Bình xin nghe ạ.","Giá trên đã bao gồm ăn sáng chưa chị?","Vâng, được anh ạ.","Vâng, chắc chắn rồi. Cảm ơn anh. Hẹn gặp lại."], answers:[10,5,2,6,8,1,11,7,4,12,9,13,3] },
      { id:"l15ex9", type:"writing_prompt", title:"Bài 9. Bạn có thích cuộc sống ở Việt Nam không? Vì sao?", instruction:"(Do you like the life in Vietnam? Why?)", placeholder:"Viết bài của bạn ở đây... / Write your paragraph here..." }
    ]
  },
  "16": {
    title: "Hôm nay trông anh có vẻ mệt",
    title_en: "You look tired today",

// ==================== WORKBOOK RENDER ====================
function renderWorkbookMenu() {
  const lessons = Array.from({length: 16}, (_, i) => i + 1);
  let h = `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>
<h1 style="font-size:1.8rem">📓 Workbook</h1>
<p class="subtitle">Exercises from the 123 Vietnamese Workbook</p>`;
  lessons.forEach(num => {
    const wb = WORKBOOK[String(num)];
    const hasContent = !!wb;
    h += `<button class="lesson-btn" ${hasContent ? `onclick="window.openWorkbookLesson(${num})"` : 'style="opacity:0.4;cursor:not-allowed;"'}>
  <div class="lesson-num" style="${hasContent?'':'background:#444;'}">${num}</div>
  <div style="flex:1;text-align:left">
    <div style="font-weight:600;font-size:1rem;margin-bottom:3px">${hasContent ? LESSONS[num].title : 'Lesson '+num}</div>
    <div style="font-size:0.85rem;color:#7a7570">${hasContent ? wb.exercises.length+' exercises' : 'Coming soon'}</div>
  </div>
  ${hasContent ? '<div style="color:#f0c04a;font-size:1.2rem;">→</div>' : '<div style="color:#444;font-size:0.8rem;">🔒</div>'}
</button>`;
  });
  return h;
}

function renderWorkbookLesson() {
  const wb = WORKBOOK[state.wbLesson];
  if (!wb) return `<button class="back" onclick="window.goToWorkbook()">← Back</button><p>Not available yet.</p>`;
  let h = `<button class="back" onclick="window.goToWorkbook()">← Back</button>
<div style="font-size:1.5rem;font-weight:600;color:#f0c04a;margin-bottom:5px">Lesson ${state.wbLesson} — Workbook</div>
<div style="font-size:1rem;margin-bottom:25px;color:#7a7570">${esc(wb.title)} · ${esc(wb.title_en)}</div>`;

  wb.exercises.forEach((ex, exIdx) => {
    h += `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:20px;margin-bottom:18px;">`;
    h += `<div style="font-weight:700;font-size:1rem;color:#f0c04a;margin-bottom:6px;">${esc(ex.title)}</div>`;
    if (ex.instruction) h += `<div style="font-size:0.85rem;color:#7a7570;font-style:italic;margin-bottom:10px;">${esc(ex.instruction)}</div>`;
    if (ex.example) h += `<div style="background:rgba(240,192,74,0.07);border-left:3px solid #f0c04a;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;font-size:0.9rem;">${esc(ex.example)}</div>`;

    if (ex.type === 'speaking_prompt') {
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const checked = state.wbChecked;
        h += `<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;font-size:0.95rem;">
          <div style="margin-bottom:${checked?'6px':'0'}">${esc(item)}</div>
          ${checked ? `<div style="color:#5ec97c;font-size:0.85rem;font-style:italic;">${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
      h += `</div>`;
    }

    else if (ex.type === 'question_formation') {
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = (state.wbAnswers[key] || '');
        const checked = state.wbChecked;
        let borderColor = 'rgba(255,255,255,0.09)';
        if (checked) {
          const correct = ex.answers[i];
          // simple similarity check: just show correct
          borderColor = 'rgba(240,192,74,0.4)';
        }
        h += `<div style="margin-bottom:14px;">
          <div style="margin-bottom:6px;font-size:0.9rem;">– <span>${item.answer_sentence}</span></div>
          <input type="text" value="${esc(userVal)}" placeholder="Write your question here…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${borderColor};border-radius:8px;padding:10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked ? `<div style="margin-top:6px;color:#5ec97c;font-size:0.85rem;">✓ ${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
    }

    else if (ex.type === 'matching') {
      const checked = state.wbChecked;
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
        <div><div style="font-weight:600;color:#f0c04a;margin-bottom:8px;text-align:center;">A</div>`;
      ex.columnA.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = ex.answers[i];
        let bg = 'rgba(255,255,255,0.04)';
        if (checked && userVal) bg = userVal === correct ? 'rgba(94,201,124,0.12)' : 'rgba(224,90,90,0.12)';
        h += `<div style="background:${bg};border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.9rem;">
          ${esc(item)}
          <input type="text" value="${esc(userVal)}" placeholder="→ ?" maxlength="1"
            oninput="window.wbSetAnswer('${key}', this.value.toLowerCase())"
            style="width:40px;margin-left:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:4px 6px;color:#f0c04a;font-size:0.9rem;text-align:center;outline:none;">
          ${checked ? `<span style="color:${userVal===correct?'#5ec97c':'#e05a5a'};margin-left:4px;">${userVal===correct?'✓':'✗ '+correct}</span>` : ''}
        </div>`;
      });
      h += `</div><div><div style="font-weight:600;color:#f0c04a;margin-bottom:8px;text-align:center;">B</div>`;
      ex.columnB.forEach(item => {
        h += `<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.9rem;">${esc(item)}</div>`;
      });
      h += `</div></div>`;
    }

    else if (ex.type === 'true_false') {
      h += `<div style="background:rgba(240,192,74,0.06);border:1px solid rgba(240,192,74,0.15);border-radius:10px;padding:14px;margin-bottom:14px;font-size:0.9rem;line-height:1.7;">${esc(ex.passage)}</div>`;
      h += `<table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="text-align:left;padding:8px;color:#7a7570;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);"></th>
          <th style="padding:8px;color:#5ec97c;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);text-align:center;">Đúng</th>
          <th style="padding:8px;color:#e05a5a;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.09);text-align:center;">Sai</th>
        </tr></thead><tbody>`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = ex.answers[i];
        const checked = state.wbChecked;
        let rowBg = 'transparent';
        if (checked) rowBg = userVal === correct ? 'rgba(94,201,124,0.06)' : 'rgba(224,90,90,0.06)';
        h += `<tr style="background:${rowBg};">
          <td style="padding:10px 8px;font-size:0.9rem;border-bottom:1px solid rgba(255,255,255,0.05);">${i+1}. ${esc(item)}</td>
          <td style="text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
            <input type="radio" name="${key}" value="Đúng" ${userVal==='Đúng'?'checked':''} onchange="window.wbSetAnswer('${key}','Đúng')" style="accent-color:#5ec97c;width:18px;height:18px;">
          </td>
          <td style="text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);">
            <input type="radio" name="${key}" value="Sai" ${userVal==='Sai'?'checked':''} onchange="window.wbSetAnswer('${key}','Sai')" style="accent-color:#e05a5a;width:18px;height:18px;">
          </td>
        </tr>`;
        if (checked && userVal && userVal !== correct) {
          h += `<tr><td colspan="3" style="padding:0 8px 8px;color:#e05a5a;font-size:0.82rem;">✗ Correct answer: ${correct}</td></tr>`;
        }
      });
      h += `</tbody></table>`;
    }

    else if (ex.type === 'ordering') {
      const checked = state.wbChecked;
      const correctOrder = [7,5,1,6,2,4,3]; // 1-indexed positions
      h += `<p style="font-size:0.85rem;color:#7a7570;margin-bottom:12px;">Write the order number (1 = first) next to each sentence.</p>`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const correct = String(correctOrder[i]);
        let borderColor = 'rgba(255,255,255,0.15)';
        if (checked && userVal) borderColor = userVal === correct ? '#5ec97c' : '#e05a5a';
        h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:28px;height:28px;border:2px dashed rgba(255,255,255,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:#7a7570;">${i+1}</div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;font-size:0.9rem;">${esc(item)}</div>
          <input type="number" min="1" max="${ex.items.length}" value="${esc(userVal)}" placeholder="#"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:52px;background:rgba(255,255,255,0.05);border:2px solid ${borderColor};border-radius:8px;padding:8px;color:#f0c04a;font-size:1rem;text-align:center;outline:none;">
          ${checked && userVal && userVal !== correct ? `<span style="color:#e05a5a;font-size:0.85rem;">→${correct}</span>` : ''}
          ${checked && userVal === correct ? `<span style="color:#5ec97c;">✓</span>` : ''}
        </div>`;
      });
      if (checked) {
        h += `<div style="margin-top:14px;padding:12px;background:rgba(240,192,74,0.08);border-radius:8px;font-size:0.88rem;">
          <div style="color:#f0c04a;font-weight:600;margin-bottom:8px;">✓ Correct order:</div>`;
        // Build ordered list
        const ordered = ex.items.map((item, i) => ({item, pos: correctOrder[i]}))
          .sort((a, b) => a.pos - b.pos);
        ordered.forEach((x, i) => {
          h += `<div style="margin-bottom:4px;">${i+1}. ${esc(x.item)}</div>`;
        });
        h += `</div>`;
      }
    }

    else if (ex.type === 'mcq') {
      ex.questions.forEach((q, qi) => {
        const key = `${ex.id}_${qi}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        h += `<div style="margin-bottom:16px;">
          <div style="font-weight:600;font-size:0.95rem;margin-bottom:8px;">${esc(q.question)}</div>`;
        q.options.forEach(opt => {
          const letter = opt.charAt(0);
          const isSelected = userVal === letter;
          const isCorrect = q.answer === letter;
          let bg = 'rgba(255,255,255,0.04)';
          let border = '1px solid rgba(255,255,255,0.09)';
          if (isSelected && !checked) { bg = 'rgba(240,192,74,0.15)'; border = '1px solid #f0c04a'; }
          if (checked && isCorrect) { bg = 'rgba(94,201,124,0.12)'; border = '1px solid #5ec97c'; }
          if (checked && isSelected && !isCorrect) { bg = 'rgba(224,90,90,0.12)'; border = '1px solid #e05a5a'; }
          h += `<div onclick="window.wbSetAnswer('${key}','${letter}');window.render()"
            style="cursor:pointer;background:${bg};border:${border};border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:0.9rem;display:flex;align-items:center;gap:10px;">
            <span style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;">${letter}</span>
            ${esc(opt.slice(3))}
            ${checked && isCorrect ? '<span style="margin-left:auto;color:#5ec97c;">✓</span>' : ''}
            ${checked && isSelected && !isCorrect ? '<span style="margin-left:auto;color:#e05a5a;">✗</span>' : ''}
          </div>`;
        });
        h += `</div>`;
      });
    }

    else if (ex.type === 'mcq_inline') {
      ex.questions.forEach((q, qi) => {
        const key = `${ex.id}_${qi}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal === q.answer;
        h += `<div style="margin-bottom:14px;">
          <div style="font-size:0.95rem;margin-bottom:8px;">${esc(q.question)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">`;
        q.options.forEach(opt => {
          const isSelected = userVal === opt;
          let bg = 'rgba(255,255,255,0.04)'; let border = '1px solid rgba(255,255,255,0.09)';
          if (isSelected && !checked) { bg = 'rgba(240,192,74,0.15)'; border = '1px solid #f0c04a'; }
          if (checked && opt === q.answer) { bg = 'rgba(94,201,124,0.12)'; border = '1px solid #5ec97c'; }
          if (checked && isSelected && opt !== q.answer) { bg = 'rgba(224,90,90,0.12)'; border = '1px solid #e05a5a'; }
          h += `<div onclick="window.wbSetAnswer('${key}','${opt}');window.render()"
            style="cursor:pointer;background:${bg};border:${border};border-radius:8px;padding:8px 14px;font-size:0.9rem;">${esc(opt)}</div>`;
        });
        h += `</div></div>`;
      });
    }

    else if (ex.type === 'fill_blank_grammar') {
      const cols = ex.items.length > 6 ? 'grid-template-columns:1fr 1fr' : 'grid-template-columns:1fr';
      h += `<div style="display:grid;${cols};gap:10px;">`;
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal.trim().toLowerCase() === item.answer.toLowerCase();
        let border = 'rgba(255,255,255,0.15)';
        if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
        const displayed = item.sentence.replace('___', `<span style="color:#f0c04a;font-weight:600;">[  ]</span>`);
        h += `<div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;">
          <div style="font-size:0.9rem;margin-bottom:6px;">${displayed}</div>
          <input type="text" value="${esc(userVal)}" placeholder="…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${border};border-radius:6px;padding:6px 10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked && userVal ? `<div style="margin-top:4px;font-size:0.82rem;color:${isCorrect?'#5ec97c':'#e05a5a'};">${isCorrect?'✓':'✗ '+item.answer}</div>` : ''}
        </div>`;
      });
      h += `</div>`;
    }

    else if (ex.type === 'fill_blank_dialogue') {
      ex.dialogues.forEach((dlg, di) => {
        if (dlg.label) h += `<div style="font-weight:600;color:#f0c04a;font-size:0.9rem;margin-bottom:8px;">${esc(dlg.label)}</div>`;
        // Replace each (N)___ with an input
        let html = esc(dlg.text);
        let blankIdx = 0;
        html = html.replace(/\((\d+)\)___/g, (_, num) => {
          const key = `${ex.id}_${di}_${blankIdx}`;
          const answer = dlg.blanks[blankIdx];
          const userVal = state.wbAnswers[key] || '';
          const checked = state.wbChecked;
          const isCorrect = userVal.trim().toLowerCase() === answer.toLowerCase();
          let border = 'rgba(255,255,255,0.3)';
          if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
          const result = `<span style="display:inline-flex;align-items:center;gap:4px;">
            <span style="color:#7a7570;font-size:0.8rem;">(${num})</span>
            <input type="text" value="${esc(userVal)}" placeholder="___"
              oninput="window.wbSetAnswer('${key}', this.value)"
              style="width:80px;background:rgba(255,255,255,0.07);border-bottom:2px solid ${border};border-top:none;border-left:none;border-right:none;padding:2px 4px;color:#e8e4dc;font-size:0.9rem;outline:none;text-align:center;">
            ${checked && userVal ? `<span style="font-size:0.8rem;color:${isCorrect?'#5ec97c':'#e05a5a'};">${isCorrect?'✓':'✗'+answer}</span>` : ''}
          </span>`;
          blankIdx++;
          return result;
        });
        h += `<div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:0.92rem;line-height:2.2;">${html}</div>`;
      });
    }

    else if (ex.type === 'word_ordering') {
      ex.items.forEach((item, i) => {
        const key = `${ex.id}_${i}`;
        const userVal = state.wbAnswers[key] || '';
        const checked = state.wbChecked;
        const isCorrect = userVal.trim().toLowerCase() === ex.answers[i].toLowerCase();
        let border = 'rgba(255,255,255,0.12)';
        if (checked && userVal) border = isCorrect ? '#5ec97c' : '#e05a5a';
        h += `<div style="margin-bottom:14px;">
          <div style="background:rgba(240,192,74,0.07);border-radius:8px;padding:8px 12px;font-size:0.88rem;color:#c4a84a;margin-bottom:6px;">🔀 ${esc(item)}</div>
          <input type="text" value="${esc(userVal)}" placeholder="Rewrite as a correct sentence…"
            oninput="window.wbSetAnswer('${key}', this.value)"
            style="width:100%;background:rgba(255,255,255,0.05);border:1px solid ${border};border-radius:8px;padding:10px;color:#e8e4dc;font-size:0.9rem;outline:none;">
          ${checked ? `<div style="margin-top:6px;font-size:0.85rem;color:${isCorrect&&userVal?'#5ec97c':'#f0c04a'};">${isCorrect&&userVal?'✓':''} ${esc(ex.answers[i])}</div>` : ''}
        </div>`;
      });
    }

    else if (ex.type === 'writing_prompt') {
      const key = `${ex.id}_write`;
      const userVal = state.wbAnswers[key] || '';
      h += `<textarea rows="8" placeholder="${esc(ex.placeholder)}"
        oninput="window.wbSetAnswer('${key}', this.value)"
        style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:14px;color:#e8e4dc;font-size:0.95rem;line-height:1.7;outline:none;resize:vertical;">${esc(userVal)}</textarea>
      <div style="font-size:0.82rem;color:#7a7570;margin-top:6px;">Tip : Introduisez les membres, leur âge, leur profession, et ce qu'ils aiment.</div>`;
    }

    // Close exercise card
    h += `</div>`;
  });

  // Global check button
  const allAnswered = wb.exercises.some(ex => ex.type !== 'speaking_prompt');
  h += `<div style="display:flex;gap:10px;margin-top:10px;">
    <button class="big-btn" onclick="window.wbCheckAnswers()" style="flex:1;">${state.wbChecked ? '✓ Answers shown' : '✅ Check Answers'}</button>
    <button class="ghost-btn" onclick="window.wbReset()" style="flex:1;">↺ Reset</button>
  </div>`;

  return h;
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  if (state.view === 'menu') app.innerHTML = renderMenu();
  else if (state.view === 'lessons') app.innerHTML = renderLessons();
  else if (state.view === 'lesson') app.innerHTML = renderLesson();
  else if (state.view === 'quiz') app.innerHTML = renderQuiz();
  else if (state.view === 'thematic') app.innerHTML = renderThematic();
  else if (state.view === 'mistakesList') app.innerHTML = renderMistakesList();
  else if (state.view === 'workbook') app.innerHTML = renderWorkbookMenu();
  else if (state.view === 'workbookLesson') app.innerHTML = renderWorkbookLesson();
  else if (state.thView === 'colors_tone') app.innerHTML = renderWordToneQuiz();
  else if (state.thView === 'colors_match') app.innerHTML = renderColorsMatchQuiz();
}

function renderLessons() {
  let h = `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>
<h1 style="font-size:1.8rem">Choose a Lesson</h1>
<p class="subtitle">16 lessons • Dialogue, Vocabulary, Grammar</p>`;
  for (const num in LESSONS) {

function renderDialogue(l) {
  const lessonNum = parseInt(state.lesson);
  const mp3Url = (lessonNum >= 1 && lessonNum <= 16)
    ? `https://123vietnamese.com/wp-content/uploads/2019/01/2018_hn_studentbook${lessonNum}.mp3`
    : null;

  let h = '';

  // Official audio player (giọng Bắc — northern accent)
  if (mp3Url) {
    h += `<div style="background:rgba(240,192,74,0.08);border:1px solid rgba(240,192,74,0.25);border-radius:12px;padding:14px;margin-bottom:16px;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
    <span style="font-size:1.1rem;">🎙️</span>
    <span style="color:#f0c04a;font-weight:600;font-size:0.9rem;">Official Recording — Giọng Bắc (Northern accent)</span>
  </div>
  <audio controls style="width:100%;border-radius:8px;" preload="none">
    <source src="${mp3Url}" type="audio/mpeg">
  </audio>
  <p style="color:#7a7570;font-size:0.75rem;margin-top:8px;margin-bottom:0;">Source: 123Vietnamese.com · Tiếng Việt 123 Student Book 2018</p>
</div>`;
  }

  if (TRANSLATIONS[state.lesson]) {
    h += `<button class="toggle-btn" onclick="window.toggleTranslation()">${state.showTranslation?'Hide':'Show'} Translation</button>`;
  }
  h += '<div class="content">';
  if (l.dialogue) {
    const vocabMap = {};
    l.vocabulary.forEach(w => { vocabMap[w.vn.toLowerCase()] = w.en; });
    l.dialogue.split('\n').forEach(line => {
      if (!line.trim()) return;
      h += '<div class="dialogue-line"><div class="dialogue-text">';
      line.split(' ').forEach(word => {
        const clean = word.replace(/[.,!?]/g,'').toLowerCase();
        const meaning = vocabMap[clean] || GLOBAL_WORD_MAP[clean] || '';
        if (meaning) {
          h += `<span class="word-hover" data-meaning="${esc(meaning)}">${esc(word)}</span> `;
        } else {
          h += `<span>${esc(word)}</span> `;
        }
      });
      h += `</div><button class="audio-btn" onclick="window.speak('${esc(line)}')">🔊</button></div>`;
    });
  }
  h += '</div>';
  if (state.showTranslation && TRANSLATIONS[state.lesson]) {
    h += `<div class="translation">${esc(TRANSLATIONS[state.lesson])}</div>`;
  }
  h += '<p class="hint">💡 Hover over underlined words to see meaning • Click 🔊 to hear each line</p>';
  return h;
}

function renderQuiz() {
  if (state.quizType === 'vocab') {
    if (state.quizQuestions.length === 0) buildVocabQuiz();
    if (state.currentQuestion >= state.quizQuestions.length) {
      return `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>

  <h1 style="color:#f0c04a;margin-bottom:20px">🎉 Vocabulary Quiz Complete!</h1>

    <button class="big-btn" onclick="window.restartQuiz()">Try Again</button>
    <button class="ghost-btn" onclick="window.goToMenu()">← Back to Menu</button>
  </div>
</div>`;
    }
    const q = state.quizQuestions[state.currentQuestion];
    // EN→VN two-phase quiz
    if (q.phase !== 'single' && state.practiceDirection === 'en-vn') {
      const phase = state.quizPhase || 'word';
      let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div style="text-align:center;margin-bottom:20px;color:#7a7570">${state.currentQuestion+1} / ${state.quizQuestions.length}</div>
<div class="quiz-card">

  <div class="phase-label">${phase==='word'?'Choose the word (without tones):':'Choose the correct tone:'}</div>
  <div class="quiz-options">`;
      if (phase === 'word') {
        q.wordOptions.forEach(opt => {
          let cls = '';
          if (state.quizSelectedWord) {
            if (opt === q.correctBase) cls = 'correct';
            else if (opt === state.quizSelectedWord) cls = 'wrong';
            else cls = 'disabled';
          }
          h += `<button class="quiz-option ${cls}" onclick="window.vocabWordSelect('${esc(opt)}')" ${state.quizSelectedWord?'disabled':''}>[${esc(opt)}]</button>`;
        });
      } else {
        if (state.quizSelectedWord === q.correctBase) h += `<div style="text-align:center;color:#4caf50;font-size:1rem;margin-bottom:10px;">✓ Correct word!</div>`;
        else h += `<div style="text-align:center;color:#f44336;font-size:0.95rem;margin-bottom:10px;">✗ Word was: [${esc(q.correctBase)}]</div>`;
        q.toneOptions.forEach(opt => {
          let cls = '';
          if (state.answered) {
            if (opt === q.correct) cls = 'correct';
            else if (opt === state.selectedAnswer && opt !== q.correct) cls = 'wrong';
          }
          h += `<button class="quiz-option ${cls}" onclick="window.answerVocabQuiz('${esc(opt)}')" ${state.answered?'disabled':''}>${esc(opt)}</button>`;
        });
      }
      h += `</div><div class="quiz-score">Score: ${state.score} / ${state.quizQuestions.length}</div></div>`;
      return h;
    }
    // VN→EN (single phase)
    let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div style="text-align:center;margin-bottom:20px;color:#7a7570">${state.currentQuestion+1} / ${state.quizQuestions.length}</div>
<div class="quiz-card">
  <div class="quiz-question">${esc(q.question)}</div>
  <button class="audio-btn" onclick="window.speak('${esc(q.question)}')" style="margin:0 auto 20px;display:block;">🔊 Listen</button>
  <div class="quiz-options">`;
    q.options.forEach(opt => {
      let cls = '';
      if (state.answered) {
        if (opt === q.correct) cls = 'correct';
        else if (opt === state.selectedAnswer && opt !== q.correct) cls = 'wrong';
      }
      h += `<button class="quiz-option ${cls}" onclick="window.answerVocabQuiz('${esc(opt)}')" ${state.answered?'disabled':''}>${esc(opt)}</button>`;
    });
    h += `</div><div class="quiz-score">Score: ${state.score} / ${state.quizQuestions.length}</div></div>`;
    return h;
  } else {
    if (state.grammarQuestions.length === 0) buildGrammarQuiz();
    if (state.grammarCurrent >= state.grammarQuestions.length) {
      return `<button class="back" onclick="window.goToMenu()">← Back to Menu</button>
<div class="quiz-card">
  <h1 style="color:#f0c04a;margin-bottom:20px">📝 Grammar Quiz Complete!</h1>
  <div class="quiz-score">Score: ${state.grammarScore} / ${state.grammarQuestions.length}</div>
  <div style="margin-top:30px;display:flex;flex-direction:column;gap:15px;">
    <button class="big-btn" onclick="window.restartGrammarQuiz()">Try Again</button>
    <button class="ghost-btn" onclick="window.goToMenu()">← Back to Menu</button>
  </div>
</div>`;
    }
    const q = state.grammarQuestions[state.grammarCurrent];
    let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div style="text-align:center;margin-bottom:20px;color:#7a7570">📝 Grammar (Lesson ${q.lesson}) • ${state.grammarCurrent+1} / ${state.grammarQuestions.length}</div>
<div class="quiz-card">
  <div class="quiz-question" style="font-size:1.3rem;">${esc(q.question)}</div>
  <div class="quiz-options">`;
    q.options.forEach(opt => {
      let cls = '';
      if (state.grammarAnswered) {
        if (opt === q.correct) cls = 'correct';
        else if (opt === state.grammarSelectedAnswer && opt !== q.correct) cls = 'wrong';
      }
      h += `<button class="quiz-option ${cls}" onclick="window.answerGrammarQuiz('${esc(opt)}')" ${state.grammarAnswered?'disabled':''}>${esc(opt)}</button>`;
    });
    h += `</div><div class="quiz-score">Score: ${state.grammarScore} / ${state.grammarQuestions.length}</div></div>`;
    return h;
  }
}

  const prompt = isEnToViet ? q.english : `[${q.base}]`;

<div class="question-box" style="font-size:2rem;">${esc(prompt)}</div>`;

  if (!isEnToViet) {

    });

// Strip Vietnamese tone marks (keep base letters incl. đ/ơ/ư shape, only remove tone diacritics)
function stripTones(str) {
  const toneMap = {
    'à':'a','á':'a','ả':'a','ã':'a','ạ':'a','ă':'ă','ằ':'ă','ắ':'ă','ẳ':'ă','ẵ':'ă','ặ':'ă',
    'â':'â','ầ':'â','ấ':'â','ẩ':'â','ẫ':'â','ậ':'â',
    'è':'e','é':'e','ẻ':'e','ẽ':'e','ẹ':'e','ê':'ê','ề':'ê','ế':'ê','ể':'ê','ễ':'ê','ệ':'ê',
    'ì':'i','í':'i','ỉ':'i','ĩ':'i','ị':'i',
    'ò':'o','ó':'o','ỏ':'o','õ':'o','ọ':'o','ô':'ô','ồ':'ô','ố':'ô','ổ':'ô','ỗ':'ô','ộ':'ô','ơ':'ơ','ờ':'ơ','ớ':'ơ','ở':'ơ','ỡ':'ơ','ợ':'ơ',
    'ù':'u','ú':'u','ủ':'u','ũ':'u','ụ':'u','ư':'ư','ừ':'ư','ứ':'ư','ử':'ư','ữ':'ư','ự':'ư',
    'ỳ':'y','ý':'y','ỷ':'y','ỹ':'y','ỵ':'y'
  };
  return str.split('').map(ch => toneMap[ch] || ch).join('');
}

// ============================================================
// Vietnamese tone variant generator
// Always places the tone on the correct vowel nucleus position
// Returns 3 variants with different tones (never invalid placements)
// ============================================================
const VN_VOWEL_TONES = {
  'a': ['a','à','á','ả','ã','ạ'],
  'ă': ['ă','ằ','ắ','ẳ','ẵ','ặ'],
  'â': ['â','ầ','ấ','ẩ','ẫ','ậ'],
  'e': ['e','è','é','ẻ','ẽ','ẹ'],
  'ê': ['ê','ề','ế','ể','ễ','ệ'],
  'i': ['i','ì','í','ỉ','ĩ','ị'],
  'o': ['o','ò','ó','ỏ','õ','ọ'],
  'ô': ['ô','ồ','ố','ổ','ỗ','ộ'],
  'ơ': ['ơ','ờ','ớ','ở','ỡ','ợ'],
  'u': ['u','ù','ú','ủ','ũ','ụ'],
  'ư': ['ư','ừ','ứ','ử','ữ','ự'],
  'y': ['y','ỳ','ý','ỷ','ỹ','ỵ'],
};
// Build reverse map: toned char → {base, toneIdx}
const VN_CHAR_TO_TONE = {};
for (const base in VN_VOWEL_TONES) {
  VN_VOWEL_TONES[base].forEach((ch, idx) => { VN_CHAR_TO_TONE[ch] = {base, idx}; });
}

// Find the tone-bearing nucleus position in a single Vietnamese syllable
function findToneNucleus(word) {
  // First: find any character that already has a non-zero tone
  for (let i = 0; i < word.length; i++) {
    const info = VN_CHAR_TO_TONE[word[i]];
    if (info && info.idx !== 0) return i;
  }
  // No tone yet: find the best vowel position to place the tone
  // Priority: compound vowels (ô,ơ,ê,â,ă) over plain (a,e,i,o,u,y)
  const priority = 'ôơêâăaeiouywW';
  let bestPos = -1, bestPri = 999;
  for (let i = 0; i < word.length; i++) {
    const p = priority.indexOf(word[i]);
    if (p !== -1 && p < bestPri) { bestPri = p; bestPos = i; }
  }
  return bestPos;
}

// Given a correct Vietnamese word/phrase, return 3 wrong tone variants
// (same nucleus position, different tone marks, all valid placements)
function makeToneVariants(correct) {
  const words = correct.split(' ');
  // Find which word has the tone nucleus (last word with a tone, or last word)
  let targetWordIdx = words.length - 1;
  for (let wi = words.length - 1; wi >= 0; wi--) {
    for (const ch of words[wi]) {
      const info = VN_CHAR_TO_TONE[ch];
      if (info && info.idx !== 0) { targetWordIdx = wi; break; }
    }
    if (targetWordIdx !== words.length - 1) break;
  }

  const targetWord = words[targetWordIdx];
  const nucleusPos = findToneNucleus(targetWord);
  if (nucleusPos === -1) return [correct, correct, correct]; // fallback

  const currentChar = targetWord[nucleusPos];
  const info = VN_CHAR_TO_TONE[currentChar] || { base: currentChar, idx: 0 };
  const tones = VN_VOWEL_TONES[info.base] || [currentChar];
  const currentIdx = info.idx;

  // Pick 3 other tone indices, spread across the 6 tones
  const otherIndices = [0,1,2,3,4,5].filter(i => i !== currentIdx);
  // Choose 3 well-spread ones: e.g. if current=2(sắc): pick 0,1,3 or 0,3,5
  const picks = [];
  const step = Math.floor(otherIndices.length / 3);
  for (let i = 0; i < 3 && i < otherIndices.length; i++) {
    picks.push(otherIndices[Math.min(i * step, otherIndices.length - 1)]);
  }
  // Fill remaining if needed (shouldn't happen with 6 tones)
  while (picks.length < 3) picks.push(otherIndices[picks.length % otherIndices.length]);

  const variants = [];
  for (const toneIdx of picks) {
    if (toneIdx >= tones.length) continue;
    const newChar = tones[toneIdx];
    const newWord = targetWord.slice(0, nucleusPos) + newChar + targetWord.slice(nucleusPos + 1);
    const newWords = [...words];
    newWords[targetWordIdx] = newWord;
    const candidate = newWords.join(' ');
    if (candidate !== correct && !variants.includes(candidate)) variants.push(candidate);
  }

  // Fallback (very rare)
  let pad = 1;
  while (variants.length < 3) { variants.push(correct + '\u200B'.repeat(pad)); pad++; }
  return variants;
}

  if (!q) return `<button class="back" onclick="window.thBack()">← Back</button><p style="text-align:center;color:#7a7570;margin-top:30px;">No mistakes to review!</p>`;
  const typeLabel = {'vocab-word':'Vocabulary','vocab-tone':'Vocabulary (tone)','classifier':'Classifier','adjective':'Adjective','numbers-word':'Numbers','numbers-tone':'Numbers (tone)','demonstratives-word':'Demonstratives','demonstratives-tone':'Demonstratives (tone)'};
  let h = `<button class="back" onclick="window.thBack()">← Back</button>
<div class="section-title">📋 REVIEW MISTAKES</div>
<div style="text-align:center;color:#7a7570;font-size:0.9rem;margin-bottom:16px;">${typeLabel[q.type]||q.type}</div>
<div style="display:flex;justify-content:space-between;font-size:0.95rem;color:#7a7570;margin-bottom:20px;">
  <span>${state.thIndex+1} / ${state.thReviewDeck.length}</span><span>✓ ${state.thScore}</span>
</div>
<div class="question-box">${esc(q.question)}</div>
<div class="option-grid">`;
  state.thReviewOptions.forEach(opt => {
    let cls = '';
    if (state.thReviewSelected) {
      if (opt === q.correct) cls = 'correct';
      else if (opt === state.thReviewSelected) cls = 'wrong';
      else cls = 'disabled';
    }
    h += `<button class="th-option ${cls}" onclick="window.thReviewSelect('${esc(opt)}')">${esc(opt)}</button>`;
  });
  h += '</div>';
  if (state.thReviewSelected) {
    h += `<button class="big-btn" style="margin-top:16px;" onclick="window.thReviewNext()">${state.thIndex+1>=state.thReviewDeck.length?'See Results →':'Next →'}</button>`;
  }
  return h;
}

function renderMistakesList() {
  const mc = state.thMistakes.length;
  let h = `<button class="back" onclick="window.goToMenu()">← Back</button>
<div class="section-title">📋 MISTAKES LIST</div>
<p style="text-align:center;color:#7a7570;font-size:0.9rem;margin-bottom:20px;">Uncheck to dismiss a mistake permanently</p>`;
  if (mc === 0) {
    h += `<p style="text-align:center;color:#5ec97c;margin-top:30px;">✓ No mistakes saved!</p>`;
    return h;
  }
  state.thMistakes.forEach((m, i) => {
    h += `<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:14px;margin-bottom:10px;">
      <input type="checkbox" checked id="mk_${i}" onchange="window.dismissMistake(${i})" style="width:20px;height:20px;cursor:pointer;accent-color:#f0c04a;">
      <div style="flex:1;">
        <div style="color:#f0c04a;font-weight:600;font-size:1rem;">${esc(m.question)}</div>
        <div style="color:#7a7570;font-size:0.85rem;margin-top:3px;">Correct: <span style="color:#5ec97c;">${esc(m.correct)}</span> · Your answer: <span style="color:#e05a5a;">${esc(m.userAnswer)}</span></div>
        <div style="color:#555;font-size:0.75rem;margin-top:2px;">${esc(m.type)}</div>
      </div>
    </div>`;
  });
  h += `<button class="ghost-btn" style="margin-top:10px;" onclick="window.clearAllMistakes()">🗑️ Clear all mistakes</button>`;
  return h;
}

function thDoneScreen(title) {
  const total = state.thView === 'review' ? state.thReviewDeck.length : state.thDeck.length;
  const pct = total > 0 ? Math.round(state.thScore/total*100) : 0;
  const emoji = pct>=80?'🏆':pct>=50?'👏':'📖';
  return `<button class="back" onclick="window.thBack()">← Back</button>
<div class="quiz-card" style="text-align:center;">
  <div class="section-title">${title} — DONE</div>
  <div style="font-size:3rem;margin-bottom:10px;">${emoji}</div>
  <div class="result-score">${state.thScore}/${total} (${pct}%)</div>
  <button class="big-btn" onclick="window.thRestart()">↺ Play Again</button>
  <button class="ghost-btn" onclick="window.thBack()">← Back to Practice</button>
</div>`;
}

// ==================== EVENT HANDLERS ====================
window.speak = speak;
window.goToMistakesList = () => { state.view = 'mistakesList'; render(); };
window.dismissMistake = (i) => {
  state.thMistakes.splice(i, 1);
  render();
};
window.clearAllMistakes = () => {
  state.thMistakes = [];
  render();
};
window.goToMenu = () => { state.view = 'menu'; render(); };
window.goToLessons = () => { state.view = 'lessons'; render(); };
window.goToThematic = () => { state.view = 'menu'; render(); };
window.goToWorkbook = () => { state.view = 'workbook'; render(); };
window.openWorkbookLesson = (n) => { state.view = 'workbookLesson'; state.wbLesson = String(n); state.wbAnswers = {}; state.wbChecked = false; render(); };
window.wbSetAnswer = (key, val) => { state.wbAnswers[key] = val; };
window.wbCheckAnswers = () => { state.wbChecked = true; render(); };
window.wbReset = () => { state.wbAnswers = {}; state.wbChecked = false; render(); };
window.render = render;
window.openLesson = (n) => { state.view = 'lesson'; state.lesson = String(n); state.tab = 'dialogue'; state.showTranslation = false; render(); };
window.switchTab = (t) => { state.tab = t; render(); };
window.toggleTranslation = () => { state.showTranslation = !state.showTranslation; render(); };
window.setPracticeLesson = (v) => { state.practiceLesson = v; render(); };
window.setPracticeScope = (v) => { state.practiceScope = v; render(); };
window.setPracticeDirection = (v) => { state.practiceDirection = v; render(); };
window.setPracticeCount = (v) => { state.practiceCount = parseInt(v); render(); };
window.vocabWordSelect = (base) => {
  if (state.quizSelectedWord) return;
  state.quizSelectedWord = base;
  render();
  setTimeout(() => { state.quizPhase = 'tone'; render(); }, 800);
};
window.answerVocabQuiz = (answer) => {
  if (state.answered) return;
  state.answered = true;
  state.selectedAnswer = answer;
  if (answer === state.quizQuestions[state.currentQuestion].correct) state.score++;
  render();
  setTimeout(() => {
    state.currentQuestion++;
    state.answered = false;
    state.quizPhase = 'word';
    state.quizSelectedWord = null;
    state.selectedAnswer = null;
    render();
  }, 1200);
};
window.answerGrammarQuiz = (answer) => {
  if (state.grammarAnswered) return;
  state.grammarAnswered = true;
  state.grammarSelectedAnswer = answer;
  if (answer === state.grammarQuestions[state.grammarCurrent].correct) state.grammarScore++;
  render();
  setTimeout(() => { state.grammarCurrent++; state.grammarAnswered = false; render(); }, 1200);
};
window.restartQuiz = () => {
  if (state.quizType === 'vocab') { buildVocabQuiz(); state.currentQuestion = 0; state.score = 0; state.answered = false; state.quizPhase = 'word'; state.quizSelectedWord = null; state.selectedAnswer = null; render(); }
  else { buildGrammarQuiz(); state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false; render(); }
};
window.restartGrammarQuiz = () => { buildGrammarQuiz(); state.grammarCurrent = 0; state.grammarScore = 0; state.grammarAnswered = false; render(); };

// Thematic handlers

window.thGenericSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  const ok = Array.isArray(q.correct) ? q.correct.includes(opt) : q.correct === opt;
  if (ok) {
    state.thScore++;
    if (state.thView !== 'audio') window.speak(opt);
  }
  render();
};

window.thStart = (key) => {
  state.view = 'thematic';
  state.thView = key;
  state.thAdjMode = null; state.thDone = false;
  state.thSelected = null; state.thSelectedWord = null;
  state.thScore = 0; state.thIndex = 0;
  if (key === 'vocab') thInitDeck(VOCABULARY_WORDS);
  else if (key === 'numbers') thInitDeck(NUMBERS_WORDS);
  else if (key === 'demonstratives') thInitDeck(DEMONSTRATIVES_WORDS);
  else if (key === 'time') thInitDeck(TIME_WORDS);
  else if (key === 'weather') thInitDeck(WEATHER_WORDS);
  else if (key === 'family') thInitDeck(FAMILY_WORDS);
  else if (key === 'food') thInitDeck(FOOD_WORDS);
  else if (key === 'classifiers') { state.thDeck = shuffleArr(CLASSIFIERS_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'adjectives') { state.thDeck = shuffleArr(ADJECTIVES_WORDS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'thisthat_context') { state.thDeck = shuffleArr(THIS_THAT_CONTEXT); }
  else if (key === 'audio') { state.thDeck = getFilteredAudioQuestionsWithShuffledOptions(); }
  else if (key === 'conversation') { state.thDeck = getFilteredConvQuestionsWithShuffledOptions(); }
  else if (key === 'dates_days') { state.thDeck = buildDatesFlashcards(); state.thFlipShown=false; state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'time_markers') { state.thDeck = shuffleArr(TIME_MARKERS_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; state.thMarkerPhase=1; state.thMarkerToneSelected=null; state.thMarkerToneOptions=[]; }
  else if (key === 'time_ref_table') { state.thDeck = shuffleArr(TIME_REF_TABLE_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; state.thMarkerPhase=1; state.thMarkerToneSelected=null; state.thMarkerToneOptions=[]; }
  else if (key === 'sap_se_da') { state.thDeck = shuffleArr(SAP_SE_DA_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'directions') { state.thDeck = shuffleArr(DIRECTIONS_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'wearing') { state.thDeck = shuffleArr(WEARING_QUESTIONS); state.thScore=0; state.thIndex=0; state.thSelected=null; state.thDone=false; }
  else if (key === 'review') { thInitReview(); }
  render();
};

window.thStartColors = (mode) => {
  state.view = 'thematic';
  if (mode === 'tone') {
    state.thView = 'colors_tone';
    state.thDeck = shuffleArr(COLORS_WORDS);
    state.thIndex = 0; state.thScore = 0; state.thPhase = 'word';
    state.thSelected = null; state.thSelectedWord = null; state.thDone = false;
    thSetWordToneOptions();
    render();
  } else if (mode === 'match') {
    state.thView = 'colors_match';
    state.colorsMode = 'match';
    state.colorsQuestions = shuffleArr([...COLOR_MATCH_QUESTIONS]);
    state.colorsIndex = 0;
    state.colorsScore = 0;
    state.colorsSelected = null;
    state.colorsAnswered = false;
    render();
  }
};

window.answerColorsMatch = (answer) => {
  if (state.colorsAnswered) return;
  state.colorsAnswered = true;
  state.colorsSelected = answer;
  const q = state.colorsQuestions[state.colorsIndex];
  if (answer === q.correct) state.colorsScore++;
  render();
};

window.nextColorsMatch = () => {
  state.colorsIndex++;
  state.colorsSelected = null;
  state.colorsAnswered = false;
  render();
};

window.thDirectionsSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) state.thScore++;
  else thAddMistake({type:'directions', question: q.item+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thFlip = () => {
  state.thFlipShown = true;
  render();
};

window.thDatesResult = (correct) => {
  if (correct) { state.thScore++; window.speak(state.thDeck[state.thIndex].back); }
  else thAddMistake({type:'dates-days', question: state.thDeck[state.thIndex].front, correct: state.thDeck[state.thIndex].back, userAnswer:'(self-reported wrong)'});
  state.thFlipShown = false;
  if (state.thIndex + 1 >= state.thDeck.length) {
    state.thDone = true;
  } else {
    state.thIndex++;
  }
  render();
};

window.thTimeMarkersSelectPhase1 = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) window.speak(opt);
  render();
};

window.thMarkerGoToPhase2 = () => {
  const q = state.thDeck[state.thIndex];
  const wrongTones = makeToneVariants(q.correct);
  state.thMarkerToneOptions = shuffleArr([q.correct, ...wrongTones]);
  state.thMarkerPhase = 2;
  state.thMarkerToneSelected = null;
  render();
};

window.thTimeMarkersSelectPhase2 = (opt) => {
  if (state.thMarkerToneSelected) return;
  state.thMarkerToneSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) { state.thScore++; window.speak(opt); }
  else thAddMistake({type:'time-markers', question: q.q, correct: q.correct, userAnswer: opt});
  render();
};

window.thSapSeDaSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) { state.thScore++; window.speak(opt); }
  else thAddMistake({type:'sap-se-da', question: q.sentence, correct: q.correct, userAnswer: opt});
  render();
};

window.thWearingSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) { state.thScore++; window.speak(opt); }
  else thAddMistake({type:'wearing', question: q.item+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thBack = () => {
  state.view = 'menu';
  state.thView = 'menu';
  render();
};

window.thRestart = () => {
  const key = state.thView;
  window.thStart(key);
};

window.thAdjSetMode = (mode) => {
  state.thAdjMode = mode;
  state.thDone = false; state.thIndex = 0; state.thScore = 0;
  state.thSelected = null; state.thSelectedWord = null; state.thPhase = 'word';
  state.thDeck = shuffleArr(ADJECTIVES_WORDS);
  thSetAdjOptions();
  render();
};

window.thAdjWordSelect = (base) => {
  if (state.thSelectedWord) return;
  state.thSelectedWord = base;
  const q = state.thDeck[state.thIndex];
  if (base !== q.base) thAddMistake({type:'adjective-word', question: q.english, correct: q.viet, userAnswer: base});
  render();
  setTimeout(() => { state.thPhase = 'tone'; render(); }, 800);
};

window.thAdjToneSelect = (tone) => {
  if (state.thSelected) return;
  state.thSelected = tone;
  const q = state.thDeck[state.thIndex];
  if (tone === q.viet) { state.thScore++; window.speak(tone); }
  else thAddMistake({type:'adjective-tone', question: q.english, correct: q.viet, userAnswer: tone});
  render();
};

window.thWordSelect = (viet) => {
  if (state.thSelectedWord) return;
  state.thSelectedWord = viet;
  const q = state.thDeck[state.thIndex];
  if (viet !== q.viet) thAddMistake({type: state.thView+'-word', question: q.en, correct: q.viet, userAnswer: viet});
  render();
  setTimeout(() => { state.thPhase = 'tone'; render(); }, 800);
};

window.thToneSelect = (tone) => {
  if (state.thSelected) return;
  state.thSelected = tone;
  const q = state.thDeck[state.thIndex];
  if (tone === q.viet) { state.thScore++; window.speak(tone); }
  else thAddMistake({type: state.thView+'-tone', question: q.en, correct: q.viet, userAnswer: tone});
  render();
};

window.thNext = () => {
  if (state.thIndex + 1 >= state.thDeck.length) { state.thDone = true; render(); return; }
  state.thIndex++;
  state.thSelected = null;
  state.thSelectedWord = null;
  state.thFlipShown = false;
  state.thPhase = 'word';
  state.thMarkerPhase = 1;
  state.thMarkerToneSelected = null;
  state.thMarkerToneOptions = [];

  if (['vocab','numbers','demonstratives','colors_tone','time','weather','family','food'].includes(state.thView)) {
    thSetWordToneOptions();
  } else if (state.thView === 'adjectives') {
    thSetAdjOptions();
  }
  render();
};

window.thClassSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  if (opt === q.correct) { state.thScore++; window.speak(opt); }
  else thAddMistake({type:'classifier', question: q.word+' ('+q.translation+')', correct: q.correct, userAnswer: opt});
  render();
};

window.thAdjSelect = (opt) => {
  if (state.thSelected) return;
  state.thSelected = opt;
  const q = state.thDeck[state.thIndex];
  const correct = state.thAdjMode === 'viet-to-en' ? q.english : q.viet;
  if (opt === correct) {
    state.thScore++;
    if (state.thAdjMode !== 'viet-to-en') window.speak(opt);
  } else thAddMistake({type:'adjective', question: state.thAdjMode==='viet-to-en'?q.viet:q.english, correct: correct, userAnswer: opt});
  render();
};

window.thReviewSelect = (opt) => {
  if (state.thReviewSelected) return;
  state.thReviewSelected = opt;
  const q = state.thReviewDeck[state.thIndex];
  if (opt === q.correct) {
    state.thScore++;
    // Mistakes remain until manually dismissed by user
  }
  render();
};

window.thReviewNext = () => {
  if (state.thIndex + 1 >= state.thReviewDeck.length) { state.thDone = true; render(); return; }
  state.thIndex++;
  state.thReviewSelected = null;
  thSetReviewOptions();
  render();
};

render();
})();
  </script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(registration => {
        console.log('✅ Service Worker registered:', registration.scope);
      })
      .catch(error => {
        console.log('❌ SW registration failed:', error);
      });
  });
}
</script>
</body>
</html>
